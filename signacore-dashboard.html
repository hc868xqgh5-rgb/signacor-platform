/* ═══════════════════════════════════════════════════════════════
   VINYL CALCULATOR  — section-based with checkboxes
═══════════════════════════════════════════════════════════════ */
const VINYL_WASTE   = { flat:1.10, curved:1.20, contour:1.35 };
const VINYL_HRS_M2  = { flat:0.35, curved:0.55, contour:0.75 }; // hrs per gross m²
const DEFAULT_ROLL_W = 1.37;

const DEFAULT_VINYL_SECTIONS = [
  { id:1, name:'Main Fascia Panel',   w:4.0, h:0.8, surface:'flat',    qty:1, selected:true  },
  { id:2, name:'Window Graphic',      w:1.2, h:0.6, surface:'flat',    qty:2, selected:true  },
  { id:3, name:'Door Panel',          w:0.9, h:2.1, surface:'flat',    qty:1, selected:false },
  { id:4, name:'Curved Column',       w:0.6, h:1.5, surface:'curved',  qty:2, selected:false },
  { id:5, name:'Contour Surface',     w:1.0, h:0.8, surface:'contour', qty:1, selected:false },
];

function VinylCalc() {
  const [sections,   setSections]   = useState(DEFAULT_VINYL_SECTIONS.map(s=>({...s})));
  const [rollW,      setRollW]      = useState(String(DEFAULT_ROLL_W));
  const [matRate,    setMatRate]    = useState('285');
  const [labRate,    setLabRate]    = useState('220');
  const [manualHrs,  setManualHrs]  = useState('');
  const [hrsLocked,  setHrsLocked]  = useState(false);
  const [sellPrice,  setSellPrice]  = useState('');
  const [result,     setResult]     = useState(null);
  const selectAllRef = useRef(null);
  const nextId       = useRef(6);

  const rw       = parseFloat(rollW)||DEFAULT_ROLL_W;
  const selected = sections.filter(s=>s.selected);
  const allSel   = selected.length===sections.length;

  // Per-section computed values
  const sectionData = sections.map(s=>{
    const netArea  = s.w * s.h * s.qty;
    const waste    = VINYL_WASTE[s.surface]||1.10;
    const grossArea= netArea * waste;
    const ppr      = s.w>0 ? Math.max(1,Math.floor(rw/s.w)) : 1;
    const rollLen  = s.qty>0 ? Math.ceil(s.qty/ppr)*s.h*waste : 0;
    const autoH    = grossArea * (VINYL_HRS_M2[s.surface]||0.35);
    return {...s, netArea, grossArea, ppr, rollLen, autoH};
  });

  const selData        = sectionData.filter(s=>s.selected);
  const totalNet       = selData.reduce((s,x)=>s+x.netArea,   0);
  const totalGross     = selData.reduce((s,x)=>s+x.grossArea, 0);
  const totalRollLen   = selData.reduce((s,x)=>s+x.rollLen,   0);
  const autoHrs        = selData.reduce((s,x)=>s+x.autoH,     0);

  // Keep auto hours updated when selection changes (unless locked)
  useEffect(()=>{
    if(!hrsLocked) setManualHrs(autoHrs.toFixed(1));
  },[totalGross, hrsLocked]);

  useEffect(()=>{
    if(selectAllRef.current) selectAllRef.current.indeterminate = selected.length>0 && selected.length<sections.length;
  },[selected.length, sections.length]);

  const toggleAll  = e => { setSections(prev=>prev.map(s=>({...s,selected:e.target.checked}))); setResult(null); };
  const toggleOne  = id => { setSections(prev=>prev.map(s=>s.id===id?{...s,selected:!s.selected}:s)); setResult(null); };
  const updateSec  = (id,f,v) => { setSections(prev=>prev.map(s=>s.id===id?{...s,[f]:f==='name'||f==='surface'?v:(parseFloat(v)||0)}:s)); setResult(null); };
  const addSection = () => { setSections(prev=>[...prev,{id:nextId.current++,name:'New Section',w:1.0,h:1.0,surface:'flat',qty:1,selected:true}]); };
  const removeSection = id => { setSections(prev=>prev.filter(s=>s.id!==id)); setResult(null); };

  function calculate() {
    if(selected.length===0) return;
    const mat  = parseFloat(matRate)||0;
    const lab  = parseFloat(labRate)||0;
    const hrs  = parseFloat(manualHrs)||autoHrs;
    const sell = parseFloat(sellPrice)||0;
    const matCost  = totalRollLen * mat;
    const labCost  = hrs * lab;
    const total    = matCost + labCost;
    const profit   = sell - total;
    const margin   = sell>0 ? profit/sell*100 : null;
    setResult({ totalNet, totalGross, totalRollLen, matCost, labCost, hrs, total, profit, margin, sections:selData });
  }

  const surfOpts = [['flat','Flat +10%'],['curved','Curved +20%'],['contour','Contour +35%']];

  return (
    <div className="space-y-4">
      {/* Top bar */}
      <div className="bg-white rounded-2xl border p-5 space-y-4">
        <div className="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h3 className="font-bold text-gray-700">Architectural Film Calculator</h3>
            <p className="text-xs text-gray-400 mt-0.5">Add sections, tick what's included, edit any dimension or surface type</p>
          </div>
          <button onClick={addSection} className="flex items-center gap-1.5 bg-gray-800 hover:bg-gray-900 text-white rounded-xl px-3 py-2 text-xs font-bold transition-colors">＋ Add Section</button>
        </div>

        {/* Section table */}
        <div className="border border-gray-200 rounded-xl overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-xs min-w-[680px]">
              <thead className="bg-gray-50 border-b border-gray-200">
                <tr>
                  <th className="px-3 py-2.5 text-left w-8">
                    <input ref={selectAllRef} type="checkbox" checked={allSel} onChange={toggleAll} className="w-4 h-4 rounded accent-orange-500 cursor-pointer"/>
                  </th>
                  <th className="px-2 py-2.5 text-left font-semibold text-gray-500">Section Name</th>
                  <th className="px-2 py-2.5 text-center font-semibold text-gray-500 w-20">Width (m)</th>
                  <th className="px-2 py-2.5 text-center font-semibold text-gray-500 w-20">Height (m)</th>
                  <th className="px-2 py-2.5 text-center font-semibold text-gray-500 w-12">Qty</th>
                  <th className="px-2 py-2.5 text-center font-semibold text-gray-500 w-32">Surface Type</th>
                  <th className="px-2 py-2.5 text-right font-semibold text-gray-500 w-20">Net m²</th>
                  <th className="px-2 py-2.5 text-right font-semibold text-gray-500 w-20">Gross m²</th>
                  <th className="px-2 py-2.5 text-right font-semibold text-gray-500 w-20">Roll (m)</th>
                  <th className="px-2 py-2.5 w-8"></th>
                </tr>
              </thead>
              <tbody>
                {sections.map(s=>{
                  const sd=sectionData.find(x=>x.id===s.id)||{netArea:0,grossArea:0,rollLen:0};
                  return (
                    <tr key={s.id} className={`border-b border-gray-50 transition-opacity ${s.selected?'':'opacity-35'}`}>
                      <td className="px-3 py-1.5">
                        <input type="checkbox" checked={s.selected} onChange={()=>toggleOne(s.id)} className="w-4 h-4 rounded accent-orange-500 cursor-pointer"/>
                      </td>
                      <td className="px-2 py-1.5">
                        <input type="text" value={s.name} onChange={e=>updateSec(s.id,'name',e.target.value)} disabled={!s.selected}
                          className="w-full border border-gray-200 rounded-lg px-2 py-1 text-xs focus:ring-1 focus:ring-brand-400 disabled:bg-transparent disabled:border-transparent disabled:text-gray-400"/>
                      </td>
                      <td className="px-2 py-1.5 text-center"><input type="number" value={s.w} onChange={e=>updateSec(s.id,'w',e.target.value)} disabled={!s.selected} step="0.01" min="0" className="w-16 border border-gray-200 rounded-lg px-2 py-1 text-center text-xs focus:ring-1 focus:ring-brand-400 disabled:bg-gray-50 disabled:text-gray-300"/></td>
                      <td className="px-2 py-1.5 text-center"><input type="number" value={s.h} onChange={e=>updateSec(s.id,'h',e.target.value)} disabled={!s.selected} step="0.01" min="0" className="w-16 border border-gray-200 rounded-lg px-2 py-1 text-center text-xs focus:ring-1 focus:ring-brand-400 disabled:bg-gray-50 disabled:text-gray-300"/></td>
                      <td className="px-2 py-1.5 text-center"><input type="number" value={s.qty} onChange={e=>updateSec(s.id,'qty',e.target.value)} disabled={!s.selected} min="1" className="w-12 border border-gray-200 rounded-lg px-2 py-1 text-center text-xs focus:ring-1 focus:ring-brand-400 disabled:bg-gray-50 disabled:text-gray-300"/></td>
                      <td className="px-2 py-1.5">
                        <select value={s.surface} onChange={e=>updateSec(s.id,'surface',e.target.value)} disabled={!s.selected}
                          className="w-full border border-gray-200 rounded-lg px-2 py-1 text-xs bg-white focus:ring-1 focus:ring-brand-400 disabled:bg-gray-50 disabled:text-gray-300">
                          {surfOpts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                        </select>
                      </td>
                      <td className={`px-2 py-1.5 text-right font-mono ${s.selected?'text-gray-600':'text-gray-300'}`}>{sd.netArea.toFixed(2)}</td>
                      <td className={`px-2 py-1.5 text-right font-mono font-semibold ${s.selected?'text-brand-600':'text-gray-300'}`}>{sd.grossArea.toFixed(2)}</td>
                      <td className={`px-2 py-1.5 text-right font-mono ${s.selected?'text-gray-600':'text-gray-300'}`}>{sd.rollLen.toFixed(2)}</td>
                      <td className="px-2 py-1.5">
                        <button onClick={()=>removeSection(s.id)} className="text-red-300 hover:text-red-500 font-bold text-base leading-none" title="Remove">✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot className="bg-gray-50 border-t border-gray-200">
                <tr>
                  <td colSpan={6} className="px-3 py-2 text-xs font-bold text-gray-500">{selected.length} of {sections.length} sections selected</td>
                  <td className="px-2 py-2 text-right text-xs font-black text-gray-700">{totalNet.toFixed(2)}</td>
                  <td className="px-2 py-2 text-right text-xs font-black text-brand-600">{totalGross.toFixed(2)}</td>
                  <td className="px-2 py-2 text-right text-xs font-black text-gray-700">{totalRollLen.toFixed(2)}</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        {/* Pricing & settings */}
        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
          <div>
            <label className="text-xs text-gray-500 mb-1 block">Roll Width (m)</label>
            <input type="number" value={rollW} onChange={e=>{setRollW(e.target.value);setResult(null);}} step="0.01"
              className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 mb-1 block">Material Rate (R/m)</label>
            <input type="number" value={matRate} onChange={e=>setMatRate(e.target.value)}
              className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 mb-1 block">Labour Rate (R/hr)</label>
            <input type="number" value={labRate} onChange={e=>setLabRate(e.target.value)}
              className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 mb-1 block">
              Labour Hours {hrsLocked?<span className="text-brand-500 font-semibold">(manual)</span>:<span className="text-gray-400">(auto: {autoHrs.toFixed(1)}h)</span>}
            </label>
            <div className="flex gap-1.5">
              <input type="number" value={manualHrs} step="0.5"
                onChange={e=>{setManualHrs(e.target.value);setHrsLocked(true);}}
                className="flex-1 border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400"/>
              {hrsLocked&&<button onClick={()=>{setHrsLocked(false);setManualHrs(autoHrs.toFixed(1));}} title="Reset to auto" className="px-2 border border-gray-200 rounded-xl text-xs text-gray-500 hover:bg-gray-50">↺</button>}
            </div>
          </div>
          <div>
            <label className="text-xs text-gray-500 mb-1 block">Sell Price (R)</label>
            <input type="number" value={sellPrice} onChange={e=>setSellPrice(e.target.value)}
              className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400"/>
          </div>
        </div>

        <button onClick={calculate} disabled={selected.length===0}
          className="w-full bg-brand-500 hover:bg-brand-600 disabled:opacity-40 disabled:cursor-not-allowed text-white font-bold rounded-xl py-3 text-sm transition-colors">
          {selected.length>0?`Calculate (${selected.length} section${selected.length!==1?'s':''})`:'Select at least one section'}
        </button>
      </div>

      {/* Results */}
      {result&&(
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div className="bg-red-50 rounded-2xl border border-red-200 p-5 space-y-3">
            <h3 className="font-bold text-brand-700">Results</h3>
            {[
              ['Total Net Area',           result.totalNet.toFixed(2)+' m²'],
              ['Total Gross Area (waste)',  result.totalGross.toFixed(2)+' m²'],
              ['Total Roll Length',         result.totalRollLen.toFixed(2)+' m'],
              ['Labour Hours',              result.hrs.toFixed(1)+' hrs'],
              ['Material Cost',             zar(result.matCost)],
              ['Labour Cost',               zar(result.labCost)],
              ['Total Cost',                zar(result.total)],
            ].map(([k,v])=>(
              <div key={k} className={`flex justify-between text-sm border-b border-red-100 pb-2 ${k==='Total Cost'?'font-bold':''}`}>
                <span className="text-gray-600">{k}</span><span className="text-gray-800">{v}</span>
              </div>
            ))}
            {result.margin!==null&&(
              <div className={`rounded-xl p-4 text-center mt-2 ${result.margin>40?'bg-emerald-100 text-emerald-700':result.margin>20?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-700'}`}>
                <p className="text-3xl font-black">{result.margin.toFixed(1)}%</p>
                <p className="text-sm font-semibold">Gross Margin · Profit: {zar(result.profit)}</p>
              </div>
            )}
          </div>
          <div className="bg-white rounded-2xl border p-5 space-y-2">
            <h4 className="text-sm font-bold text-gray-700 mb-3">Section Breakdown</h4>
            {result.sections.map(s=>(
              <div key={s.id} className="flex items-center justify-between text-xs border-b border-gray-50 pb-1.5">
                <div>
                  <span className="font-semibold text-gray-700">{s.name}</span>
                  <span className="text-gray-400 ml-2">{s.qty}× {s.w}m×{s.h}m · {s.surface}</span>
                </div>
                <div className="text-right ml-2 flex-shrink-0">
                  <span className="font-mono text-brand-600">{s.grossArea.toFixed(2)} m²</span>
                  <span className="text-gray-400 ml-2">{s.rollLen.toFixed(2)} m roll</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   VEHICLE WRAP CALCULATOR  — proportional hours, manual override
═══════════════════════════════════════════════════════════════ */
const ALL_PANELS = [
  { name:'Hood',                 w:1.50, h:1.20 },
  { name:'Roof',                 w:1.40, h:1.80 },
  { name:'Trunk / Boot',         w:1.40, h:0.90 },
  { name:'Front Left Door',      w:0.90, h:1.30 },
  { name:'Front Right Door',     w:0.90, h:1.30 },
  { name:'Rear Left Door',       w:0.90, h:1.30 },
  { name:'Rear Right Door',      w:0.90, h:1.30 },
  { name:'Left Fender',          w:0.60, h:0.90 },
  { name:'Right Fender',         w:0.60, h:0.90 },
  { name:'Front + Rear Bumpers', w:1.40, h:0.70 },
];
const BASE_HOURS = 24; // full 10-panel wrap

function VehicleCalc() {
  const [panels,    setPanels]    = useState(ALL_PANELS.map((p,i)=>({...p,id:i,selected:true})));
  const [matRate,   setMatRate]   = useState('');
  const [labRate,   setLabRate]   = useState('220');
  const [manualHrs, setManualHrs] = useState('');
  const [hrsLocked, setHrsLocked] = useState(false);
  const [sellPrice, setSellPrice] = useState('');
  const [result,    setResult]    = useState(null);
  const selectAllRef = useRef(null);

  const selected     = panels.filter(p=>p.selected);
  const selectedCount= selected.length;
  const allSelected  = selectedCount===panels.length;
  const selectedTotal= selected.reduce((s,p)=>s+p.w*p.h, 0);
  const autoHrs      = selectedCount>0 ? Math.round((selectedCount/ALL_PANELS.length)*BASE_HOURS*10)/10 : 0;

  useEffect(()=>{
    if(!hrsLocked) setManualHrs(autoHrs.toFixed(1));
  },[selectedCount, hrsLocked]);

  useEffect(()=>{
    if(selectAllRef.current) selectAllRef.current.indeterminate = selectedCount>0 && selectedCount<panels.length;
  },[selectedCount, panels.length]);

  const toggleAll = e  => { setPanels(prev=>prev.map(p=>({...p,selected:e.target.checked}))); setResult(null); };
  const toggleOne = id => { setPanels(prev=>prev.map(p=>p.id===id?{...p,selected:!p.selected}:p)); setResult(null); };
  const updateDim = (id,f,v) => { setPanels(prev=>prev.map(p=>p.id===id?{...p,[f]:parseFloat(v)||0}:p)); setResult(null); };
  const applyPreset = n => { setPanels(prev=>prev.map((p,i)=>({...p,selected:i<n}))); setResult(null); };

  function calculate() {
    if(selectedCount===0) return;
    const totalArea = selectedTotal;
    const grossArea = totalArea * 1.15;
    const hrs       = parseFloat(manualHrs)||autoHrs;
    const mat       = parseFloat(matRate)||0;
    const lab       = parseFloat(labRate)||0;
    const sell      = parseFloat(sellPrice)||0;
    const cost      = grossArea*mat + hrs*lab;
    const profit    = sell - cost;
    const margin    = sell>0 ? profit/sell*100 : null;
    setResult({ total:totalArea.toFixed(2), gross:grossArea.toFixed(2), hrs:hrs.toFixed(1), cost, profit, margin, count:selectedCount });
  }

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
      {/* Left */}
      <div className="bg-white rounded-2xl border p-5 space-y-4">
        <div>
          <h3 className="font-bold text-gray-700">Vehicle Wrap Calculator</h3>
          <p className="text-xs text-gray-400 mt-0.5">Tick panels · Edit sizes · 15% waste · 24 hrs for full wrap, scales down by panel count</p>
        </div>

        {/* Presets */}
        <div>
          <label className="text-xs font-semibold text-gray-500 mb-2 block">Quick Select Preset</label>
          <div className="grid grid-cols-3 gap-2">
            {[['Full Wrap',10],['Partial',6],['Custom',4]].map(([l,n])=>(
              <button key={l} onClick={()=>applyPreset(n)}
                className="py-1.5 rounded-xl text-xs font-semibold border border-gray-200 text-gray-600 hover:border-brand-400 hover:text-brand-600 hover:bg-brand-50 transition-all">
                {l}<br/><span className="font-normal opacity-60">{n} panels</span>
              </button>
            ))}
          </div>
        </div>

        {/* Panel table */}
        <div className="border border-gray-200 rounded-xl overflow-hidden">
          <table className="w-full text-xs">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr>
                <th className="px-3 py-2.5 text-left w-8"><input ref={selectAllRef} type="checkbox" checked={allSelected} onChange={toggleAll} className="w-4 h-4 rounded accent-orange-500 cursor-pointer"/></th>
                <th className="px-2 py-2.5 text-left font-semibold text-gray-500">Panel</th>
                <th className="px-2 py-2.5 text-center font-semibold text-gray-500 w-20">Width (m)</th>
                <th className="px-2 py-2.5 text-center font-semibold text-gray-500 w-20">Height (m)</th>
                <th className="px-2 py-2.5 text-right font-semibold text-gray-500 w-16">Area m²</th>
              </tr>
            </thead>
            <tbody>
              {panels.map(p=>(
                <tr key={p.id} className={`border-b border-gray-50 transition-opacity ${p.selected?'':'opacity-35'}`}>
                  <td className="px-3 py-2"><input type="checkbox" checked={p.selected} onChange={()=>toggleOne(p.id)} className="w-4 h-4 rounded accent-orange-500 cursor-pointer"/></td>
                  <td className={`px-2 py-1.5 font-medium ${p.selected?'text-gray-700':'text-gray-400'}`}>{p.name}</td>
                  <td className="px-2 py-1.5 text-center"><input type="number" value={p.w} min="0" step="0.01" onChange={e=>updateDim(p.id,'w',e.target.value)} disabled={!p.selected} className="w-16 border border-gray-200 rounded-lg px-2 py-1 text-center text-xs focus:ring-1 focus:ring-brand-400 disabled:bg-gray-50 disabled:text-gray-300"/></td>
                  <td className="px-2 py-1.5 text-center"><input type="number" value={p.h} min="0" step="0.01" onChange={e=>updateDim(p.id,'h',e.target.value)} disabled={!p.selected} className="w-16 border border-gray-200 rounded-lg px-2 py-1 text-center text-xs focus:ring-1 focus:ring-brand-400 disabled:bg-gray-50 disabled:text-gray-300"/></td>
                  <td className={`px-2 py-2 text-right font-mono ${p.selected?'text-gray-600 font-semibold':'text-gray-300'}`}>{(p.w*p.h).toFixed(2)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot className="bg-gray-50 border-t border-gray-200">
              <tr>
                <td colSpan={4} className="px-3 py-2 text-xs font-bold text-gray-600">{selectedCount} of {panels.length} panels · Auto hours: <span className="text-brand-600">{autoHrs.toFixed(1)} hrs</span></td>
                <td className="px-2 py-2 text-right text-xs font-black text-brand-600">{selectedTotal.toFixed(2)}</td>
              </tr>
            </tfoot>
          </table>
        </div>

        {/* Pricing */}
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-xs text-gray-500 mb-1 block">Material Rate (R/m²)</label>
            <input type="number" value={matRate} onChange={e=>setMatRate(e.target.value)} className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400" placeholder="e.g. 450"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 mb-1 block">Labour Rate (R/hr)</label>
            <input type="number" value={labRate} onChange={e=>setLabRate(e.target.value)} className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400"/>
          </div>
        </div>

        {/* Labour hours with manual override */}
        <div>
          <div className="flex items-center justify-between mb-1">
            <label className="text-xs text-gray-500">
              Labour Hours
              {hrsLocked
                ? <span className="ml-1 text-brand-500 font-semibold">(manually set)</span>
                : <span className="ml-1 text-gray-400">(auto from panel count)</span>}
            </label>
            {hrsLocked&&<button onClick={()=>{setHrsLocked(false);setManualHrs(autoHrs.toFixed(1));}} className="text-xs text-gray-400 hover:text-brand-500 font-semibold">↺ Reset to auto ({autoHrs.toFixed(1)}h)</button>}
          </div>
          <input type="number" value={manualHrs} step="0.5" min="0"
            onChange={e=>{setManualHrs(e.target.value);setHrsLocked(true);}}
            className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400"/>
          <p className="text-xs text-gray-400 mt-1">Formula: {selectedCount} panels ÷ 10 × 24 hrs = <strong>{autoHrs.toFixed(1)} hrs</strong>. Edit above to override.</p>
        </div>

        <div>
          <label className="text-xs text-gray-500 mb-1 block">Sell Price (R)</label>
          <input type="number" value={sellPrice} onChange={e=>setSellPrice(e.target.value)} className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400" placeholder="0.00"/>
        </div>

        <button onClick={calculate} disabled={selectedCount===0}
          className="w-full bg-brand-500 hover:bg-brand-600 disabled:opacity-40 disabled:cursor-not-allowed text-white font-bold rounded-xl py-3 text-sm transition-colors">
          {selectedCount>0?`Calculate (${selectedCount} panel${selectedCount!==1?'s':''}, ${parseFloat(manualHrs)||autoHrs}h)`:'Select at least one panel'}
        </button>
      </div>

      {/* Right / Results */}
      {result ? (
        <div className="bg-red-50 rounded-2xl border border-red-200 p-5 space-y-3">
          <h3 className="font-bold text-brand-700">Wrap Results</h3>
          {[
            ['Panels Selected',                 result.count+' panels'      ],
            ['Total Panel Area',                result.total+' m²'          ],
            ['Gross Area (15% waste)',           result.gross+' m²'          ],
            ['Labour Hours Used',               result.hrs+' hrs @ R '+labRate+'/hr'],
            ['Material Cost',                   zar(parseFloat(result.gross)*(parseFloat(matRate)||0))],
            ['Labour Cost',                     zar(parseFloat(result.hrs)*(parseFloat(labRate)||0))  ],
            ['Total Cost',                      zar(result.cost)             ],
          ].map(([k,v])=>(
            <div key={k} className={`flex justify-between text-sm border-b border-red-100 pb-2 ${k==='Total Cost'?'font-bold':''}`}>
              <span className="text-gray-600">{k}</span><span className="text-gray-800">{v}</span>
            </div>
          ))}
          {result.margin!==null&&(
            <div className={`rounded-xl p-4 text-center mt-2 ${result.margin>40?'bg-emerald-100 text-emerald-700':result.margin>20?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-700'}`}>
              <p className="text-3xl font-black">{result.margin.toFixed(1)}%</p>
              <p className="text-sm font-semibold">Gross Margin · Profit: {zar(result.profit)}</p>
              <p className="text-xs mt-1 opacity-70">{result.margin>40?'✅ Excellent':result.margin>20?'⚡ Acceptable':'⚠️ Low — consider repricing'}</p>
            </div>
          )}
          <div className="bg-white rounded-xl border border-red-100 p-3">
            <p className="text-xs font-semibold text-gray-500 mb-2">Panels included:</p>
            {panels.filter(p=>p.selected).map(p=>(
              <div key={p.id} className="flex justify-between text-xs py-0.5 text-gray-600">
                <span>{p.name}</span>
                <span className="font-mono text-gray-400">{p.w}m × {p.h}m = {(p.w*p.h).toFixed(2)} m²</span>
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className="bg-gray-50 rounded-2xl border border-dashed border-gray-300 flex flex-col items-center justify-center p-10 text-gray-400 text-center">
          <span className="text-4xl mb-3">🚗</span>
          <p className="text-sm font-medium text-gray-500">Tick panels, adjust sizes if needed</p>
          <p className="text-xs mt-1">Enter pricing and click Calculate</p>
        </div>
      )}
    </div>
  );
}

// ── Modal: Save a calculator result as a named Complete Product ──
function SaveAsProductModal({ calcData, completeProducts, setCompleteProducts, onClose }) {
  const { items, markup, costTotal, sellExVat, vatAmt, sellIncVat, defaultName } = calcData;
  const [cpName, setCpName] = useState(defaultName||'');
  const [cpDesc, setCpDesc] = useState('');
  const [msg,    setMsg]    = useState('');
  function doSave(){
    if(!cpName.trim()){alert('Please enter a product name.');return;}
    const now = new Date().toISOString();
    const cp = {
      id: Date.now(), cpNum: getNextCPNum(completeProducts),
      name: cpName.trim(), description: cpDesc.trim(),
      markup, items: items.map(it=>({...it})),
      costTotal, sellExVat, vatAmt, sellIncVat,
      createdAt: now, updatedAt: now,
    };
    setCompleteProducts(prev=>[cp,...prev]);
    setMsg('✅ '+cp.cpNum+' saved to Complete Products!');
    setTimeout(()=>{setMsg('');onClose();},1800);
  }
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 modal-backdrop">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4">
        <div className="px-5 py-4 flex items-center justify-between" style={{background:'#06065c',borderRadius:'1rem 1rem 0 0'}}>
          <p className="text-white font-bold" style={{fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'0.06em',fontSize:'1rem'}}>SAVE AS COMPLETE PRODUCT</p>
          <button onClick={onClose} className="text-white/60 hover:text-white text-lg">✕</button>
        </div>
        <div className="p-5 space-y-4">
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
            A named assembly saved to Inventory → Complete Products. Pull it into any quotation as a live-linked item or clone it to customise for a similar job.
          </div>
          <div>
            <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">Product Name *</label>
            <input value={cpName} onChange={e=>setCpName(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="e.g. 3×2m Aluminium Composite Fascia Sign" autoFocus/>
          </div>
          <div>
            <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">Description (optional)</label>
            <textarea value={cpDesc} onChange={e=>setCpDesc(e.target.value)} rows="2" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none" placeholder="Brief notes for the product catalogue…"/>
          </div>
          <div className="bg-gray-50 rounded-xl p-3 grid grid-cols-3 gap-3 text-center text-xs">
            <div><p className="text-gray-400 mb-0.5">Components</p><p className="font-black text-gray-800">{items.length}</p></div>
            <div><p className="text-gray-400 mb-0.5">Sell (ex VAT)</p><p className="font-black" style={{color:'#0000ff'}}>R {Number(sellExVat).toFixed(2)}</p></div>
            <div><p className="text-gray-400 mb-0.5">Markup</p><p className="font-black text-gray-800">{markup}%</p></div>
          </div>
          {msg&&<p className="text-center text-sm font-bold text-green-600">{msg}</p>}
          {!msg&&(
            <div className="flex gap-3 pt-1">
              <button onClick={doSave} className="flex-1 text-white font-bold py-2.5 rounded-xl text-sm" style={{background:'#06065c'}}>📦 Save Complete Product</button>
              <button onClick={onClose} className="px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600">Cancel</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Modal: Edit a Complete Product (full calc embedded) ──
function EditCompleteProductModal({ cp, completeProducts, setCompleteProducts, setQuotes, onClose }) {
  const [name,    setName]    = useState(cp.name);
  const [desc,    setDesc]    = useState(cp.description||'');
  const [markup,  setMarkup]  = useState(cp.markup||35);
  const [items,   setItems]   = useState((cp.items||[]).map((it,i)=>({...it,id:i+1})));
  const nextId = useRef((cp.items||[]).length+1);
  const iCls = 'border border-gray-200 rounded px-2 py-1 text-xs text-gray-800 bg-white w-full';

  function updItem(id,field,val){
    setItems(prev=>prev.map(it=>{
      if(it.id!==id) return it;
      return {...it,[field]:(field==='desc'||field==='unit')?val:(parseFloat(val)||0)};
    }));
  }
  function addBlank(){ setItems(prev=>[...prev,{id:nextId.current++,cat:'labour',desc:'',qty:1,unit:'unit',unitCost:0}]); }
  function removeItem(id){ setItems(prev=>prev.filter(it=>it.id!==id)); }

  const costTotal  = items.reduce((s,it)=>s+(it.qty||0)*(it.unitCost||0),0);
  const markupAmt  = costTotal*markup/100;
  const sellExVat  = costTotal+markupAmt;
  const vatAmt     = sellExVat*0.15;
  const sellIncVat = sellExVat+vatAmt;
  const fmt = n => 'R '+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');

  function handleSave(){
    if(!name.trim()){alert('Product name is required.');return;}
    const now = new Date().toISOString();
    const updated = {...cp, name:name.trim(), description:desc.trim(), markup, items:items.map(it=>({...it})),
      costTotal, sellExVat, vatAmt, sellIncVat, updatedAt:now};
    setCompleteProducts(prev=>prev.map(p=>p.id===cp.id?updated:p));
    // Auto-update any quote lines linked to this product
    if(setQuotes){
      setQuotes(prev=>prev.map(q=>({
        ...q,
        lines:(q.lines||[]).map(l=>
          l.cpId===cp.id && l.cpLinked
            ? {...l, desc:updated.name, unitPrice:updated.sellExVat, subtotal:(l.qty||1)*updated.sellExVat}
            : l
        )
      })));
    }
    onClose();
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 modal-backdrop p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
        <div className="px-5 py-4 flex items-center justify-between flex-shrink-0" style={{background:'#06065c',borderRadius:'1rem 1rem 0 0'}}>
          <div>
            <p className="text-white font-bold" style={{fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'0.06em',fontSize:'1rem'}}>EDIT COMPLETE PRODUCT</p>
            <p className="text-blue-300 text-xs">{cp.cpNum}</p>
          </div>
          <button onClick={onClose} className="text-white/60 hover:text-white text-lg">✕</button>
        </div>
        <div className="overflow-y-auto flex-1 p-5 space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">Product Name *</label>
              <input value={name} onChange={e=>setName(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm"/>
            </div>
            <div>
              <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">Markup %</label>
              <input type="number" value={markup} onChange={e=>setMarkup(parseFloat(e.target.value)||0)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" min="0"/>
            </div>
            <div className="col-span-2">
              <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">Description</label>
              <input value={desc} onChange={e=>setDesc(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="Optional description…"/>
            </div>
          </div>
          {/* Items table */}
          <div>
            <div className="flex items-center justify-between mb-2">
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Components</p>
              <button onClick={addBlank} className="text-xs font-bold px-3 py-1 rounded-lg text-white" style={{background:'#0000ff'}}>＋ Add Row</button>
            </div>
            <div className="border border-gray-200 rounded-xl overflow-hidden">
              <table className="w-full text-xs">
                <thead>
                  <tr style={{background:'#06065c'}}>
                    <th className="text-left px-3 py-2 text-white font-semibold">Description</th>
                    <th className="px-3 py-2 text-white font-semibold w-16">Qty</th>
                    <th className="px-3 py-2 text-white font-semibold w-20">Unit</th>
                    <th className="px-3 py-2 text-white font-semibold w-24 text-right">Unit Cost</th>
                    <th className="px-3 py-2 text-white font-semibold w-24 text-right">Subtotal</th>
                    <th className="w-8"/>
                  </tr>
                </thead>
                <tbody>
                  {items.map((it,idx)=>(
                    <tr key={it.id} className={idx%2===0?'bg-white':'bg-gray-50'}>
                      <td className="px-2 py-1.5"><input value={it.desc} onChange={e=>updItem(it.id,'desc',e.target.value)} className={iCls} placeholder="Component description"/></td>
                      <td className="px-2 py-1.5"><input type="number" value={it.qty} onChange={e=>updItem(it.id,'qty',e.target.value)} className={iCls} min="0"/></td>
                      <td className="px-2 py-1.5"><input value={it.unit} onChange={e=>updItem(it.id,'unit',e.target.value)} className={iCls} placeholder="m²"/></td>
                      <td className="px-2 py-1.5"><input type="number" value={it.unitCost} onChange={e=>updItem(it.id,'unitCost',e.target.value)} className={iCls+' text-right'} min="0"/></td>
                      <td className="px-3 py-1.5 text-right font-semibold text-gray-700">{fmt((it.qty||0)*(it.unitCost||0))}</td>
                      <td className="px-2 py-1.5 text-center"><button onClick={()=>removeItem(it.id)} className="text-gray-300 hover:text-red-500 font-bold">✕</button></td>
                    </tr>
                  ))}
                  {items.length===0&&<tr><td colSpan="6" className="px-3 py-4 text-center text-gray-400">No components. Click + Add Row.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
          {/* Totals */}
          <div className="flex justify-end">
            <div className="w-64 space-y-1 text-sm">
              {[['Cost Total',fmt(costTotal),'text-gray-700'],['Markup ('+markup+'%)',fmt(markupAmt),'text-gray-700'],['Sell Price (ex VAT)',fmt(sellExVat),'font-black text-blue-700'],['VAT (15%)',fmt(vatAmt),'text-gray-500'],['Total (incl VAT)',fmt(sellIncVat),'font-black']].map(([l,v,cls])=>(
                <div key={l} className="flex justify-between"><span className="text-gray-500">{l}</span><span className={cls}>{v}</span></div>
              ))}
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
            💡 Saving will automatically update all linked quotation line items with the new price and name.
          </div>
        </div>
        <div className="px-5 py-4 border-t flex gap-3 flex-shrink-0">
          <button onClick={handleSave} className="flex-1 text-white font-bold py-2.5 rounded-xl text-sm" style={{background:'#06065c'}}>💾 Save & Update Linked Quotes</button>
          <button onClick={onClose} className="px-5 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600">Cancel</button>
        </div>
      </div>
    </div>
  );
}

function ProductPickerModal({ completeProducts, onAdd, onClose }) {
  const [mode,      setMode]      = useState(null);  // null | 'clone' — set when a product is selected
  const [selCP,     setSelCP]     = useState(null);
  const [cloneName, setCloneName] = useState('');
  const [cloneItems,setCloneItems]= useState([]);
  const [cloneMarkup,setCloneMarkup]=useState(35);
  const nextId = useRef(1);
  const [selStock, setSelStock] = useState({});

  function addFromStock(catId) {
    const sel = selStock[catId]||{};
    const itemId = sel.invItemId;
    if(!itemId) return alert('Please select a stock item first.');
    const inv = (inventory||[]).find(i=>String(i.id)===String(itemId));
    if(!inv) return;
    setItems(prev=>[...prev,{id:nextId.current++,cat:catId,desc:inv.name,qty:1,unit:inv.unit,unitCost:Number(inv.cost)||0}]);
    setExpanded(prev=>new Set([...prev,catId]));
    // Reset item selection but keep category selected for quick multi-add
    setSelStock(p=>({...p,[catId]:{...p[catId],invItemId:''}}));
  }
  const fmt = n => 'R '+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');

  function selectProduct(cp){
    setSelCP(cp);
    setCloneName(cp.name);
    setCloneMarkup(cp.markup||35);
    setCloneItems((cp.items||[]).map((it,i)=>({...it,id:i+1})));
    nextId.current=(cp.items||[]).length+1;
    setMode(null);
  }
  function updCloneItem(id,field,val){
    setCloneItems(prev=>prev.map(it=>it.id!==id?it:{...it,[field]:(field==='desc'||field==='unit')?val:(parseFloat(val)||0)}));
  }
  const cloneCost    = cloneItems.reduce((s,it)=>s+(it.qty||0)*(it.unitCost||0),0);
  const cloneSellExV = cloneCost*(1+(cloneMarkup/100));

  function addLinked(){
    onAdd({
      desc: selCP.name, qty:1, unit:'set',
      unitPrice: selCP.sellExVat,
      subtotal: selCP.sellExVat,
      cpId: selCP.id, cpLinked: true,
    });
    onClose();
  }
  function addClone(){
    if(!cloneName.trim()){alert('Please enter a name.');return;}
    onAdd({
      desc: cloneName.trim(), qty:1, unit:'set',
      unitPrice: cloneSellExV,
      subtotal: cloneSellExV,
      cpId: null, cpLinked: false,
    });
    onClose();
  }

  const iCls='border border-gray-200 rounded px-2 py-1 text-xs bg-white w-full';

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 modal-backdrop p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[88vh] flex flex-col overflow-hidden">
        <div className="px-5 py-4 flex items-center justify-between flex-shrink-0" style={{background:'#06065c',borderRadius:'1rem 1rem 0 0'}}>
          <p className="text-white font-bold" style={{fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'0.06em',fontSize:'1rem'}}>📦 ADD COMPLETE PRODUCT</p>
          <button onClick={onClose} className="text-white/60 hover:text-white text-lg">✕</button>
        </div>

        {!selCP ? (
          /* Product list */
          <div className="overflow-y-auto flex-1 p-4 space-y-2">
            {(completeProducts||[]).length===0 ? (
              <div className="text-center py-10">
                <p className="text-3xl mb-2">📦</p>
                <p className="font-bold text-gray-600">No Complete Products yet</p>
                <p className="text-xs text-gray-400 mt-1">Build one in Calculators → Signage Costing, then click "Save as Complete Product".</p>
              </div>
            ) : (completeProducts||[]).map(cp=>(
              <button key={cp.id} onClick={()=>selectProduct(cp)}
                className="w-full text-left border border-gray-200 hover:border-blue-400 hover:bg-blue-50 rounded-xl p-4 transition-all">
                <div className="flex items-start justify-between gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs font-black px-2 py-0.5 rounded-lg" style={{background:'#e6e6ff',color:'#06065c'}}>{cp.cpNum}</span>
                      <span className="text-sm font-bold text-gray-800">{cp.name}</span>
                    </div>
                    {cp.description&&<p className="text-xs text-gray-500 mb-1">{cp.description}</p>}
                    <p className="text-xs text-gray-400">{(cp.items||[]).length} components · Markup {cp.markup}% · Updated {cp.updatedAt?new Date(cp.updatedAt).toLocaleDateString('en-ZA'):''}</p>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <p className="text-base font-black" style={{color:'#0000ff'}}>{fmt(cp.sellExVat)}</p>
                    <p className="text-xs text-gray-400">ex VAT</p>
                  </div>
                </div>
              </button>
            ))}
          </div>
        ) : mode===null ? (
          /* Add mode selector */
          <div className="p-5 space-y-4 overflow-y-auto flex-1">
            <div className="bg-gray-50 rounded-xl p-4">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-xs font-black px-2 py-0.5 rounded-lg" style={{background:'#e6e6ff',color:'#06065c'}}>{selCP.cpNum}</span>
                <span className="font-bold text-gray-800">{selCP.name}</span>
              </div>
              <p className="text-xs text-gray-500">{selCP.sellExVat?fmt(selCP.sellExVat)+' ex VAT':''}</p>
            </div>
            <p className="text-sm font-bold text-gray-700">How do you want to add this product?</p>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={addLinked}
                className="text-left border-2 rounded-xl p-4 transition-all hover:border-blue-500 hover:bg-blue-50 border-gray-200">
                <p className="text-2xl mb-2">🔗</p>
                <p className="font-bold text-gray-800 text-sm mb-1">Link to Product</p>
                <p className="text-xs text-gray-500">Adds as a linked line item. If you update the product later, the price in this quote updates automatically.</p>
              </button>
              <button onClick={()=>setMode('clone')}
                className="text-left border-2 rounded-xl p-4 transition-all hover:border-blue-500 hover:bg-blue-50 border-gray-200">
                <p className="text-2xl mb-2">✂️</p>
                <p className="font-bold text-gray-800 text-sm mb-1">Clone & Customise</p>
                <p className="text-xs text-gray-500">Creates a standalone copy. Rename it and adjust component quantities for a similar job with different sizes.</p>
              </button>
            </div>
            <button onClick={()=>setSelCP(null)} className="text-xs text-gray-400 hover:text-gray-600">← Back to product list</button>
          </div>
        ) : (
          /* Clone & Customise form */
          <div className="p-5 space-y-4 overflow-y-auto flex-1">
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">Product Name for this Quote</label>
                <input value={cloneName} onChange={e=>setCloneName(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="e.g. 4×3m Composite Fascia Sign"/>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">Markup %</label>
                <input type="number" value={cloneMarkup} onChange={e=>setCloneMarkup(parseFloat(e.target.value)||0)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" min="0"/>
              </div>
            </div>
            <div className="border border-gray-200 rounded-xl overflow-hidden">
              <table className="w-full text-xs">
                <thead>
                  <tr style={{background:'#06065c'}}>
                    <th className="text-left px-3 py-2 text-white">Description</th>
                    <th className="px-3 py-2 text-white w-16">Qty</th>
                    <th className="px-3 py-2 text-white w-16">Unit</th>
                    <th className="px-3 py-2 text-white w-24 text-right">Unit Cost</th>
                    <th className="px-3 py-2 text-white w-20 text-right">Subtotal</th>
                  </tr>
                </thead>
                <tbody>
                  {cloneItems.map((it,i)=>(
                    <tr key={it.id} className={i%2===0?'bg-white':'bg-gray-50'}>
                      <td className="px-2 py-1"><input value={it.desc} onChange={e=>updCloneItem(it.id,'desc',e.target.value)} className={iCls}/></td>
                      <td className="px-2 py-1"><input type="number" value={it.qty} onChange={e=>updCloneItem(it.id,'qty',e.target.value)} className={iCls} min="0"/></td>
                      <td className="px-2 py-1"><input value={it.unit} onChange={e=>updCloneItem(it.id,'unit',e.target.value)} className={iCls}/></td>
                      <td className="px-2 py-1"><input type="number" value={it.unitCost} onChange={e=>updCloneItem(it.id,'unitCost',e.target.value)} className={iCls+' text-right'} min="0"/></td>
                      <td className="px-2 py-1 text-right font-semibold">{fmt((it.qty||0)*(it.unitCost||0))}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="flex justify-end items-center gap-6 text-sm">
              <span className="text-gray-500">Sell ex VAT:</span>
              <span className="font-black text-lg" style={{color:'#0000ff'}}>{fmt(cloneSellExV)}</span>
            </div>
            <div className="flex gap-3">
              <button onClick={addClone} className="flex-1 text-white font-bold py-2.5 rounded-xl text-sm" style={{background:'#06065c'}}>✂️ Add Customised Version</button>
              <button onClick={()=>setMode(null)} className="px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600">Back</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════

/* Maps each calculator category to matching inventory categories */
const CAT_INV_MAP = {
  backboard:    ['Substrates','Paper & Board','Signage Faces'],
  led:          ['LED Components','Electrical Components'],
  returns:      ['Aluminium Profiles','Hardware & Fittings'],
  fronts:       ['Substrates','Signage Faces','Vinyl'],
  print:        ['Ink & Consumables','Vinyl','Laminate'],
  brackets:     ['Hardware & Fittings'],
  cnc:          ['Tools & Equipment','Consumables'],
  vinyl_sc:     ['Vinyl','Laminate','Fabric & Mesh'],
  frame:        ['Aluminium Profiles'],
  sundries:     ['Consumables','Packaging','Other'],
  installation: [],
  labour:       [],
  machining:    [],
};

function SignageCalc({ savedCalcs, setSavedCalcs, completeProducts, setCompleteProducts, inventory }) {
  const [projectName,  setProjectName]  = useState('');
  const [showSaveAsProduct, setShowSaveAsProduct] = useState(false);
  const [clientRef,    setClientRef]    = useState('');
  const [markup,       setMarkup]       = useState(35);
  const [items,        setItems]        = useState([]);
  const [expanded,     setExpanded]     = useState(new Set(['backboard']));
  const [selPreset,    setSelPreset]    = useState({});
  const [showSaved,    setShowSaved]    = useState(false);
  const [savedMsg,     setSavedMsg]     = useState('');
  const nextId = useRef(1);
  const [selStock, setSelStock] = useState({});

  function addFromStock(catId) {
    const sel = selStock[catId]||{};
    const itemId = sel.invItemId;
    if(!itemId) return alert('Please select a stock item first.');
    const inv = (inventory||[]).find(i=>String(i.id)===String(itemId));
    if(!inv) return;
    setItems(prev=>[...prev,{id:nextId.current++,cat:catId,desc:inv.name,qty:1,unit:inv.unit,unitCost:Number(inv.cost)||0}]);
    setExpanded(prev=>new Set([...prev,catId]));
    // Reset item selection but keep category selected for quick multi-add
    setSelStock(p=>({...p,[catId]:{...p[catId],invItemId:''}}));
  }

  const fmt  = n => 'R '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const fmtN = n => Number(n||0).toFixed(2);
  const iCls = 'border border-gray-200 rounded px-2 py-1 text-xs text-gray-800 bg-white focus:ring-1 focus:ring-brand-400 w-full';

  function toggleCat(id) {
    setExpanded(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  }
  function addPreset(catId) {
    const ps  = CALC_PRESETS[catId]||[];
    const idx = selPreset[catId]??0;
    const p   = ps[idx]; if(!p) return;
    setItems(prev=>[...prev,{id:nextId.current++,cat:catId,desc:p.desc,qty:1,unit:p.unit,unitCost:p.unitCost}]);
    setExpanded(prev=>new Set([...prev,catId]));
  }
  function addBlank(catId) {
    setItems(prev=>[...prev,{id:nextId.current++,cat:catId,desc:'',qty:1,unit:'unit',unitCost:0}]);
    setExpanded(prev=>new Set([...prev,catId]));
  }
  function updItem(id,field,value) {
    setItems(prev=>prev.map(it=>{
      if(it.id!==id) return it;
      return {...it,[field]:(field==='desc'||field==='unit')?value:(parseFloat(value)||0)};
    }));
  }
  function removeItem(id){ setItems(prev=>prev.filter(it=>it.id!==id)); }

  // Totals
  const catTotals = {};
  CALC_CATS.forEach(c=>{ catTotals[c.id]=items.filter(it=>it.cat===c.id).reduce((s,it)=>s+it.qty*it.unitCost,0); });
  const costTotal  = Object.values(catTotals).reduce((a,b)=>a+b,0);
  const markupAmt  = costTotal*markup/100;
  const sellExVat  = costTotal+markupAmt;
  const vatAmt     = sellExVat*0.15;
  const sellIncVat = sellExVat+vatAmt;
  const grossMargin= sellExVat>0?(markupAmt/sellExVat*100):0;

  function printSummary() {
    const rows = CALC_CATS.filter(c=>catTotals[c.id]>0).map(c=>{
      const cItems = items.filter(it=>it.cat===c.id);
      const iRows  = cItems.map(it=>'<tr><td style="padding:3px 24px;color:#374151;font-size:11px;">'+it.desc+'</td><td style="padding:3px 8px;text-align:right;font-size:11px;">'+it.qty+' '+it.unit+'</td><td style="padding:3px 8px;text-align:right;font-size:11px;">R '+fmtN(it.unitCost)+'</td><td style="padding:3px 8px;text-align:right;font-size:11px;font-weight:600;">R '+fmtN(it.qty*it.unitCost)+'</td></tr>').join('');
      return '<tr style="background:#f1f5f9;"><td style="padding:5px 8px;font-weight:700;font-size:12px;color:#1a1a1a;">'+c.icon+' '+c.label+'</td><td colspan="2" style="padding:5px 8px;"></td><td style="padding:5px 8px;text-align:right;font-weight:700;color:#0000ff;font-size:12px;">R '+fmtN(catTotals[c.id])+'</td></tr>'+iRows;
    }).join('');
    const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Signage Cost Sheet</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;color:#1a1a1a;padding:16mm 20mm;line-height:1.5}h1{font-size:20px;font-weight:900;color:#0000ff;border-bottom:3px solid #0000ff;padding-bottom:8px;margin-bottom:14px}.meta{display:flex;gap:40px;margin-bottom:18px;font-size:11px;color:#6b7280}.meta strong{color:#111}table{width:100%;border-collapse:collapse}th{background:#1a1a1a;color:#fff;padding:6px 8px;text-align:left;font-size:11px;font-weight:700}th:nth-child(n+2){text-align:right}.tot-section{width:280px;margin-left:auto;margin-top:18px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}.tot-section td{padding:5px 10px;font-size:11px}.tot-section td:last-child{text-align:right;font-weight:600}.tot-footer{background:#0000ff;color:#fff;font-weight:700;padding:7px 10px;display:flex;justify-content:space-between;font-size:13px}.tot-margin{background:#eff6ff;padding:5px 10px;display:flex;justify-content:space-between;font-size:11px;color:#1d4ed8;font-weight:700}</style></head><body>'
      +'<h1>🏷 Signage Cost Sheet</h1>'
      +'<div class="meta"><span>Project: <strong>'+(projectName||'—')+'</strong></span><span>Client / Ref: <strong>'+(clientRef||'—')+'</strong></span><span>Date: <strong>'+new Date().toLocaleDateString('en-ZA')+'</strong></span><span>Markup: <strong>'+markup+'%</strong></span></div>'
      +'<table><thead><tr><th style="width:45%">Description</th><th style="width:20%;text-align:right">Qty / Unit</th><th style="width:15%;text-align:right">Unit Cost</th><th style="width:20%;text-align:right">Subtotal</th></tr></thead><tbody>'+rows+'</tbody></table>'
      +'<div class="tot-section"><table><tbody>'
      +'<tr><td style="color:#6b7280">Cost Total (ex VAT)</td><td>R '+fmtN(costTotal)+'</td></tr>'
      +'<tr><td style="color:#6b7280">Markup ('+markup+'%)</td><td>+ R '+fmtN(markupAmt)+'</td></tr>'
      +'<tr style="border-top:1px solid #e5e7eb"><td style="font-weight:700">Sell Price (ex VAT)</td><td style="font-weight:700">R '+fmtN(sellExVat)+'</td></tr>'
      +'<tr><td style="color:#6b7280">VAT (15%)</td><td>R '+fmtN(vatAmt)+'</td></tr>'
      +'</tbody></table>'
      +'<div class="tot-footer"><span>TOTAL (incl. VAT)</span><span>R '+fmtN(sellIncVat)+'</span></div>'
      +'<div class="tot-margin"><span>Gross Margin</span><span>'+grossMargin.toFixed(1)+'%</span></div>'
      +'</div>'
      +'<script>window.onload=function(){window.print();}<\/script></body></html>';
    const w=window.open('','_blank','width=960,height=700');
    if(!w){alert('Pop-ups blocked — please allow pop-ups.');return;}
    w.document.open();w.document.write(html);w.document.close();
  }

  function saveCalculation() {
    if(items.length===0) return alert('Add at least one item before saving.');
    const num = getNextCalcNum(savedCalcs);
    const calc = {
      id: Date.now(), num,
      name:      projectName || '(Unnamed)',
      clientRef: clientRef   || '',
      date:      new Date().toISOString().slice(0,10),
      items:     items.map(it=>({...it})),
      markup, costTotal, sellExVat, vatAmt, sellIncVat,
    };
    setSavedCalcs(prev=>[calc,...prev]);
    setSavedMsg(num+' saved!');
    setTimeout(()=>setSavedMsg(''),3000);
  }

  function loadCalculation(calc) {
    if(items.length>0&&!window.confirm('Replace current items with "'+calc.name+'" ('+calc.num+')?')) return;
    setProjectName(calc.name);
    setClientRef(calc.clientRef||'');
    setMarkup(calc.markup||35);
    const loaded = calc.items.map(it=>({...it,id:nextId.current++}));
    setItems(loaded);
    setExpanded(new Set(loaded.map(it=>it.cat)));
    setShowSaved(false);
  }

  function deleteCalc(id) {
    if(!window.confirm('Delete this saved calculation?')) return;
    setSavedCalcs(prev=>prev.filter(c=>c.id!==id));
  }

  return (
    <div>
      {/* Header / project info */}
      <div className="bg-white border border-gray-200 rounded-2xl p-4 mb-4 shadow-sm">
        <div className="flex items-center gap-3 mb-3">
          <div className="w-9 h-9 bg-brand-500 rounded-xl flex items-center justify-center text-white text-lg flex-shrink-0">🏷</div>
          <div>
            <h2 className="font-black text-gray-900 text-base">Signage Cost Calculator</h2>
            <p className="text-xs text-gray-400">Build up sign cost component by component — all unit costs ex VAT</p>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs font-semibold text-gray-500 mb-1">Project Name</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs text-gray-800 focus:ring-2 focus:ring-brand-400" placeholder="e.g. Main Fascia Sign — Shopfront" value={projectName} onChange={e=>setProjectName(e.target.value)}/>
          </div>
          <div>
            <label className="block text-xs font-semibold text-gray-500 mb-1">Client / Reference</label>
            <input className="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs text-gray-800 focus:ring-2 focus:ring-brand-400" placeholder="e.g. Boer & Brit — Paarl" value={clientRef} onChange={e=>setClientRef(e.target.value)}/>
          </div>
        </div>
      </div>

      <div className="flex gap-4 items-start">

        {/* ── Left: Category Accordion ── */}
        <div className="flex-1 min-w-0 space-y-2">
          {CALC_CATS.map(cat=>{
            const st       = CALC_STYLE[cat.id]||{hd:'bg-gray-700',row:'bg-gray-50',bd:'border-gray-300'};
            const catItems = items.filter(it=>it.cat===cat.id);
            const catTotal = catTotals[cat.id]||0;
            const isOpen   = expanded.has(cat.id);
            const presets  = CALC_PRESETS[cat.id]||[];
            const pidx     = selPreset[cat.id]??0;

            return (
              <div key={cat.id} className={'rounded-xl border overflow-hidden shadow-sm '+st.bd}>

                {/* Header row */}
                <div className={'flex items-center gap-2 px-4 py-2.5 cursor-pointer select-none '+st.hd} onClick={()=>toggleCat(cat.id)}>
                  <span className="text-base leading-none">{cat.icon}</span>
                  <span className="flex-1 text-white font-bold text-sm">{cat.label}</span>
                  {catItems.length>0&&<span className="bg-white/25 text-white text-xs font-bold rounded-full px-2 py-0.5">{catItems.length} item{catItems.length!==1?'s':''}</span>}
                  {catTotal>0&&<span className="text-white/90 text-xs font-semibold tabular-nums">{fmt(catTotal)}</span>}
                  <span className="text-white/60 text-xs ml-1">{isOpen?'▲':'▼'}</span>
                </div>

                {isOpen&&(
                  <div className={'p-3 '+st.row}>

                    {/* Item rows */}
                    {catItems.length>0&&(
                      <div className="mb-3 space-y-1">
                        <div className="hidden sm:grid grid-cols-[1fr_68px_72px_78px_80px_24px] gap-1 px-1 text-xs font-semibold text-gray-400">
                          <span>Description</span><span className="text-right">Qty</span><span>Unit</span><span className="text-right">Unit Cost</span><span className="text-right">Subtotal</span><span/>
                        </div>
                        {catItems.map(it=>(
                          <div key={it.id} className="grid grid-cols-[1fr_68px_72px_78px_80px_24px] gap-1 items-center bg-white rounded-lg px-1 py-1 border border-gray-100 shadow-sm">
                            <input className={iCls} value={it.desc} onChange={e=>updItem(it.id,'desc',e.target.value)} placeholder="Description"/>
                            <input type="number" step="0.01" min="0" className={iCls+' text-right'} value={it.qty} onChange={e=>updItem(it.id,'qty',e.target.value)}/>
                            <select className={iCls} value={it.unit} onChange={e=>updItem(it.id,'unit',e.target.value)}>
                              {CALC_UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                            </select>
                            <input type="number" step="0.01" min="0" className={iCls+' text-right'} value={it.unitCost} onChange={e=>updItem(it.id,'unitCost',e.target.value)}/>
                            <div className="text-xs font-bold text-gray-800 text-right pr-1 tabular-nums">{fmt(it.qty*it.unitCost)}</div>
                            <button onClick={()=>removeItem(it.id)} className="text-gray-300 hover:text-red-500 text-lg font-bold leading-none flex items-center justify-center h-6">×</button>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* ── From Stock picker — two-level: category → item ── */}
                    {(()=>{
                      const invCats = [...new Set((inventory||[]).filter(i=>i.stock>0).map(i=>i.cat))].filter(Boolean).sort();
                      if(!invCats.length) return null;
                      const sel       = selStock[cat.id]||{};
                      const chosenCat = sel.invCat||'';
                      const chosenId  = sel.invItemId||'';
                      const catItems  = chosenCat ? (inventory||[]).filter(i=>i.cat===chosenCat&&i.stock>0) : [];
                      return (
                        <div className="mb-2 p-2 bg-emerald-50 border border-emerald-200 rounded-xl space-y-1.5">
                          <div className="flex items-center gap-1.5">
                            <span className="text-sm shrink-0">📦</span>
                            <span className="text-xs font-bold text-emerald-700">From Stock</span>
                          </div>
                          <div className="flex gap-2 items-center">
                            {/* Step 1: pick inventory category */}
                            <select
                              className="flex-1 min-w-0 text-xs border border-emerald-300 rounded-lg px-2 py-1.5 bg-white text-gray-700"
                              value={chosenCat}
                              onChange={e=>setSelStock(p=>({...p,[cat.id]:{invCat:e.target.value,invItemId:''}}))}
                            >
                              <option value="">① Select category…</option>
                              {invCats.map(c=><option key={c} value={c}>{c}</option>)}
                            </select>
                            {/* Step 2: pick item in that category */}
                            <select
                              className="flex-1 min-w-0 text-xs border border-emerald-300 rounded-lg px-2 py-1.5 bg-white text-gray-700"
                              value={chosenId}
                              onChange={e=>setSelStock(p=>({...p,[cat.id]:{...p[cat.id],invItemId:e.target.value}}))}
                              disabled={!chosenCat}
                            >

                      );

                        + Custom
                      </button>
                    </div>

                  </div>
                )}
              </div>
            );
          })}

function AddEditSupplierModal({ supplier, onClose, onSave }) {
  const isEdit = !!supplier;
  const blank = { id:null, name:'', contactPerson:'', phone:'', email:'', address:'', city:'', postalCode:'', vatNumber:'', accountNumber:'', paymentTerms:'30 days', notes:'' };
  const [f, setF] = useState(isEdit ? {...supplier} : blank);
  const upd = k => e => setF(p=>({...p,[k]:e.target.value}));
  const iCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400";
  const lCls = "block text-xs font-medium text-gray-600 mb-1";
  function handleSave() {
    if(!f.name.trim()) return alert('Supplier name is required.');
    onSave({ ...f, id: f.id||Date.now() });
  }
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-end pr-4 py-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white z-10">
          <h2 className="text-lg font-bold text-gray-800">{isEdit?'Edit Supplier':'Add Supplier'}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
        </div>
        <div className="p-6 space-y-5">
          <div>
            <h3 className="text-xs font-semibold text-brand-600 uppercase tracking-wide mb-3">Company Details</h3>
            <div className="grid grid-cols-2 gap-4">
              <div className="col-span-2"><label className={lCls}>Supplier / Company Name *</label><input className={iCls} value={f.name} onChange={upd('name')}/></div>
              <div><label className={lCls}>Contact Person</label><input className={iCls} value={f.contactPerson} onChange={upd('contactPerson')}/></div>
              <div><label className={lCls}>VAT Number</label><input className={iCls} value={f.vatNumber} onChange={upd('vatNumber')}/></div>
              <div><label className={lCls}>Account Number</label><input className={iCls} value={f.accountNumber} onChange={upd('accountNumber')}/></div>
              <div><label className={lCls}>Payment Terms</label>
                <select className={iCls} value={f.paymentTerms} onChange={upd('paymentTerms')}>
                  {['COD','7 days','14 days','30 days','60 days','90 days'].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
          </div>
          <div>
            <h3 className="text-xs font-semibold text-brand-600 uppercase tracking-wide mb-3">Contact</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><label className={lCls}>Phone</label><input className={iCls} value={f.phone} onChange={upd('phone')}/></div>
              <div><label className={lCls}>Email</label><input className={iCls} value={f.email} onChange={upd('email')}/></div>
              <div className="col-span-2"><label className={lCls}>Address</label><input className={iCls} value={f.address} onChange={upd('address')}/></div>
              <div><label className={lCls}>City</label><input className={iCls} value={f.city} onChange={upd('city')}/></div>
              <div><label className={lCls}>Postal Code</label><input className={iCls} value={f.postalCode} onChange={upd('postalCode')}/></div>
            </div>
          </div>
          <div>
            <h3 className="text-xs font-semibold text-brand-600 uppercase tracking-wide mb-3">Notes</h3>
            <textarea rows="3" className={iCls} value={f.notes} onChange={upd('notes')} placeholder="Additional notes, lead times, delivery info…"/>
          </div>
        </div>
        <div className="flex justify-end gap-3 px-6 py-4 border-t bg-gray-50 sticky bottom-0">
          <button onClick={onClose} className="px-4 py-2 rounded-lg border text-sm text-gray-600 hover:bg-gray-100">Cancel</button>
          <button onClick={handleSave} className="px-6 py-2 rounded-lg bg-brand-500 text-white text-sm font-semibold hover:bg-brand-600">Save Supplier</button>
        </div>
      </div>
    </div>
  );
}

function SuppliersPage({ suppliers, setSuppliers }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editSup, setEditSup] = useState(null);
  const [search, setSearch] = useState('');

  function saveSup(s) {
    setSuppliers(prev => prev.find(x=>x.id===s.id) ? prev.map(x=>x.id===s.id?s:x) : [s,...prev]);
    setShowAdd(false); setEditSup(null);
  }
  function delSup(id) { if(window.confirm('Delete this supplier?')) setSuppliers(prev=>prev.filter(s=>s.id!==id)); }

  const filtered = suppliers.filter(s => {
    const q = search.toLowerCase();
    return !q || `${s.name} ${s.contactPerson} ${s.city}`.toLowerCase().includes(q);
  });

  return (
    <div className="p-6 max-w-6xl mx-auto">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Suppliers</h1>
          <p className="text-sm text-gray-500 mt-0.5">{suppliers.length} supplier{suppliers.length!==1?'s':''} on record</p>
        </div>
        <button onClick={()=>setShowAdd(true)} className="px-4 py-2 rounded-xl bg-brand-500 text-white text-sm font-semibold hover:bg-brand-600 shadow-sm">+ Add Supplier</button>

      <div className="mb-4">
        <input className="w-full max-w-xs border border-gray-300 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-brand-400" placeholder="Search suppliers…" value={search} onChange={e=>setSearch(e.target.value)}/>

      {filtered.length===0 ? (
        <div className="text-center py-20 text-gray-400">
          <p className="text-4xl mb-3">🏭</p>
          <p className="font-medium">{suppliers.length===0?'No suppliers yet':'No results'}</p>
          <p className="text-sm mt-1">{suppliers.length===0?'Click "+ Add Supplier" to create your first record':''}</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map(s=>(
            <div key={s.id} className="bg-white rounded-xl border shadow-sm hover:shadow-md transition-shadow">
              <div className="p-4">
                <div className="flex items-start gap-3">
                  <div className="w-11 h-11 rounded-xl bg-brand-50 flex items-center justify-center flex-shrink-0 text-xl">🏭</div>
                  <div className="flex-1 min-w-0">
                    <p className="font-semibold text-gray-800 truncate">{s.name}</p>
                    <p className="text-xs text-gray-500">{s.contactPerson||'—'}</p>
                  </div>
                  <div className="flex gap-1 flex-shrink-0">
                    <button onClick={()=>{setEditSup(s);setShowAdd(true);}} className="p-1.5 rounded-lg text-gray-400 hover:text-brand-500 hover:bg-brand-50 text-xs">✏️</button>
                    <button onClick={()=>delSup(s.id)} className="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 text-xs">🗑️</button>
                  </div>
                </div>
                <div className="mt-3 pt-3 border-t grid grid-cols-2 gap-1.5 text-xs text-gray-500">
                  <span title="Phone">📞 {s.phone||'—'}</span>
                  <span title="Email" className="truncate">📧 {s.email||'—'}</span>
                  <span title="City">📍 {[s.city,s.postalCode].filter(Boolean).join(' ')||'—'}</span>
                  <span title="Payment Terms">💳 {s.paymentTerms||'—'}</span>
                </div>
                {s.accountNumber&&<div className="mt-2 text-xs text-gray-400">Acc: {s.accountNumber}</div>}
                {s.notes&&<div className="mt-2 text-xs text-gray-400 italic truncate">{s.notes}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {showAdd&&<AddEditSupplierModal supplier={editSup} onClose={()=>{setShowAdd(false);setEditSup(null);}} onSave={saveSup}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   GENERATE PURCHASE ORDER PDF (jsPDF)
═══════════════════════════════════════════ */
async function generatePOPdf(po, suppliers, companies) {
  const { jsPDF } = window.jspdf;
  const doc  = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
  const sup  = suppliers.find(s=>s.id===parseInt(po.supplierId))||{name:'Unknown Supplier',email:'',phone:'',address:''};
  const fmt  = n=>'R '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const W=210, LM=20, RM=190, CW=170;
  let y=20;
  const sc=arr=>doc.setTextColor(arr[0],arr[1],arr[2]);
  const sf=arr=>doc.setFillColor(arr[0],arr[1],arr[2]);
  const sd=arr=>doc.setDrawColor(arr[0],arr[1],arr[2]);

  // Header
  doc.setFont('helvetica','bold'); doc.setFontSize(20); sc(C_DARK);
  doc.text('PURCHASE ORDER', RM, y+7, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  doc.text('Signacore  ·  Hornet Honey (Pty) Ltd', RM, y+13, {align:'right'});
  doc.text('21 Voortrekker St, Mossdustria, Mossel Bay  ·  sales@signacore.co.za', RM, y+17, {align:'right'});
  y+=23; sd(C_RED); doc.setLineWidth(0.8); doc.line(LM,y,RM,y); y+=6;

  // PO reference row
  sf(C_LGREY); sd(C_MGREY); doc.setLineWidth(0.2); doc.roundedRect(LM,y,CW,20,2,2,'FD');
  const fields=[['PO Number',po.num],['Date',po.date||new Date().toISOString().slice(0,10)],['Status',(po.status||'DRAFT').toUpperCase()],['Job Ref',po.jobNum||'—']];
  fields.forEach((f,i)=>{
    const cx=LM+5+i*(CW/4);
    doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_GREY); doc.text(f[0],cx,y+7);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); sc(C_DARK); doc.text(f[1],cx,y+15);
  }); y+=26;

  // Supplier + From boxes
  const bH=28;
  sf(C_LBLUE); sd([191,219,254]); doc.setLineWidth(0.2); doc.roundedRect(LM,y,82,bH,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_BLUE); doc.text('SUPPLIER',LM+4,y+6);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); sc(C_DARK); doc.text(sup.name,LM+4,y+13);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  if(sup.contactPerson) doc.text('Attn: '+sup.contactPerson,LM+4,y+19);
  if(sup.email) doc.text(sup.email,LM+4,y+24);

  sf([242,242,242]); sd(C_MGREY); doc.roundedRect(LM+88,y,82,bH,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_GREY); doc.text('DELIVER TO',LM+92,y+6);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); sc(C_DARK); doc.text('Signacore',LM+92,y+13);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  doc.text('21 Voortrekker St, Mossdustria, Mossel Bay',LM+92,y+19);
  doc.text('Tel: 040-940-5555',LM+92,y+24);
  y+=bH+8;

  // Items table header
  const cX=[LM,LM+8,LM+88,LM+115,LM+135,LM+155];
  sf(C_DARK); doc.rect(LM,y,CW,7,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_WHITE);
  ['#','Description / Item','SKU','Qty','Unit','Unit Cost'].forEach((h,i)=>doc.text(h,cX[i]+1,y+4.5));
  y+=7;

  (po.items||[]).forEach((it,idx)=>{
    if(y>248){doc.addPage();y=20;}
    const rH=7; sf(idx%2===0?C_WHITE:C_LGREY); sd(C_MGREY); doc.setLineWidth(0.1);
    doc.rect(LM,y,CW,rH,'FD');
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); sc(C_DARK);
    doc.text(String(idx+1),cX[0]+1,y+4.5);
    doc.text((it.name||it.desc||'').substring(0,68),cX[1]+1,y+4.5);
    doc.text(it.sku||'',cX[2]+1,y+4.5);
    doc.text(String(it.qtyOrdered||it.qtyNeeded||0),cX[3]+1,y+4.5);
    doc.text(it.unit||'',cX[4]+1,y+4.5);
    doc.text(fmt(it.unitCost||0).replace('R ',''),RM-1,y+4.5,{align:'right'});
    y+=rH;
  });
  y+=5;

  // Total
  const poTotal=(po.items||[]).reduce((s,it)=>s+(it.qtyOrdered||it.qtyNeeded||0)*(it.unitCost||0),0);
  const tX=RM-62;
  sf(C_DARK); doc.rect(tX,y,62,8,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); sc(C_WHITE);
  doc.text('TOTAL (ex VAT):',tX+2,y+5.5);
  doc.text(fmt(poTotal),RM-1,y+5.5,{align:'right'});
  y+=15;

  // Notes
  if(po.notes){
    doc.setFont('helvetica','bold'); doc.setFontSize(8); sc(C_DARK); doc.text('Notes:',LM,y);
    doc.setFont('helvetica','normal'); sc(C_GREY);
    doc.text(doc.splitTextToSize(po.notes,CW),LM,y+5);
  }

  // Footer
  const footY=285; sd(C_RED); doc.setLineWidth(0.6); doc.line(LM,footY,RM,footY);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); sc(C_GREY);
  doc.text('Hornet Honey (Pty) Ltd t/a Signacore  ·  21 Voortrekker St, Mossdustria, Mossel Bay  ·  040-940-5555',W/2,footY+4,{align:'center'});
  doc.setFont('helvetica','bold'); doc.text(po.num,RM,footY+4,{align:'right'});

  return doc.output('datauristring').split(',')[1];
}

/* ═══════════════════════════════════════════
   EMAIL PO TO SUPPLIER VIA .EML
═══════════════════════════════════════════ */
async function emailPOViaEml(po, suppliers) {
  const sup = suppliers.find(s=>s.id===parseInt(po.supplierId))||{name:'Supplier',email:''};
  const poB64 = await generatePOPdf(po, suppliers, []);
  const subject = 'Purchase Order '+po.num+' — Signacore';
  const body = 'Dear '+(sup.contactPerson||sup.name)+',\r\n\r\n'
    +'Please find attached our Purchase Order '+po.num+' for your attention.\r\n\r\n'
    +'Kindly confirm receipt and provide an estimated delivery date.\r\n\r\n'
    +'Kind regards,\r\nSignacore\r\nsales@signacore.co.za  |  040-940-5555';
  const eml = buildEmlFile(sup.email||'', subject, body, [{filename:'PurchaseOrder_'+po.num+'.pdf', base64:poB64}]);
  downloadFile(eml, 'PO_'+po.num+'.eml', 'message/rfc822');
}

function PODetailModal({ po, suppliers, onClose, onUpdate, onEmail }) {
  const [editSup,   setEditSup]   = useState(String(po.supplierId||''));
  const [notes,     setNotes]     = useState(po.notes||'');
  const [status,    setStatus]    = useState('idle'); // idle | generating | done | error
  const [errMsg,    setErrMsg]    = useState('');

  const sup = suppliers.find(s=>s.id===parseInt(editSup))||{name:'Unknown Supplier'};
  const poTotal = (po.items||[]).reduce((s,it)=>s+(it.qtyOrdered||it.qtyNeeded||0)*(it.unitCost||0),0);
  const fmt = n=>'R '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');

  function handleApproveEmail() {
    const updated = {...po, supplierId:parseInt(editSup), notes, status:'approved'};
    onUpdate(updated);
    setStatus('generating');
    emailPOViaEml(updated, suppliers)
      .then(()=>{ setStatus('done'); if(onEmail) onEmail(updated); })
      .catch(e=>{ setErrMsg(e.message||'Error'); setStatus('error'); });
  }
  function handleDecline() {
    if(!window.confirm('Decline this purchase order? It will be marked declined.')) return;
    onUpdate({...po, supplierId:parseInt(editSup), notes, status:'declined'});
    onClose();
  }
  function handleSaveChanges() {
    onUpdate({...po, supplierId:parseInt(editSup), notes});
    onClose();

        <div className="overflow-y-auto flex-1 p-6 space-y-5">
