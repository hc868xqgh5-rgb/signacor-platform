            )}
          </div>

          {/* Items */}
          <div>
            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Items to Order</label>
            <div className="border border-gray-200 rounded-xl overflow-hidden">
              <table className="w-full text-xs">

                  <tr>
                    <th className="text-left px-3 py-2 font-semibold">Item</th>
                    <th className="px-3 py-2 font-semibold text-right">SKU</th>

/* ═══════════════════════════════════════════
   CREATE CUSTOM PO MODAL
═══════════════════════════════════════════ */
function CreateCustomPOModal({ onClose, onSave, suppliers }) {
  const today = new Date().toISOString().slice(0,10);
  const [supplierMode, setSupplierMode] = useState('saved'); // 'saved' | 'custom'
  const [supplierId, setSupplierId] = useState('');
  const [customSupplier, setCustomSupplier] = useState('');
  const [poDate, setPoDate] = useState(today);
  const [notes, setNotes] = useState('');
  const [jobRef, setJobRef] = useState('');
  const [lines, setLines] = useState([{id:1, desc:'', qty:1, unit:'unit', unitCost:0}]);

  function addLine(){ setLines(prev=>[...prev,{id:Date.now(),desc:'',qty:1,unit:'unit',unitCost:0}]); }
  function removeLine(id){ setLines(prev=>prev.filter(l=>l.id!==id)); }
  function updateLine(id,field,val){
    setLines(prev=>prev.map(l=>l.id===id?{...l,[field]:val}:l));
  }
  const poTotal = lines.reduce((s,l)=>(s+(parseFloat(l.qty)||0)*(parseFloat(l.unitCost)||0)),0);
  const fmt = n=>'R '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const iCls = "w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 bg-white";

  function submit(e){
    e.preventDefault();
    const resolvedSuppId = supplierMode==='saved' ? (supplierId?parseInt(supplierId):null) : null;
    const resolvedSupplierName = supplierMode==='custom' ? customSupplier.trim() : (suppliers.find(s=>s.id===resolvedSuppId)?.name||'Unknown');
    const po = {
      id: Date.now(),
      num: '', // set by page
      supplierId: resolvedSuppId,
      customSupplierName: supplierMode==='custom' ? customSupplier.trim() : null,
      jobNum: jobRef,
      date: poDate,
      status: 'draft',
      isCustom: true,
      items: lines.map(l=>({
        inventoryId: null, name: l.desc, unit: l.unit,
        qtyNeeded: parseFloat(l.qty)||1, qtyOrdered: parseFloat(l.qty)||1,
        unitCost: parseFloat(l.unitCost)||0,
      })),
      notes: notes||('Custom PO'+(jobRef?' for Job '+jobRef:'')),
    };
    onSave(po);
    onClose();
  }

  return (
    <Modal onClose={onClose} wide>
      <ModalHeader title="🛒 New Custom Purchase Order" onClose={onClose}/>
      <form onSubmit={submit} className="px-6 py-5 space-y-4 overflow-y-auto max-h-[82vh]">
        {/* Supplier */}
        <div>
          <p className="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">Supplier</p>
          <div className="flex gap-2 mb-3">
            {[{k:'saved',label:'📂 Saved Supplier'},{k:'custom',label:'✏️ Custom / Type Name'}].map(({k,label})=>(
              <button type="button" key={k} onClick={()=>setSupplierMode(k)}
                className={`text-xs font-bold px-3 py-1.5 rounded-xl border transition-all ${supplierMode===k?'bg-blue-800 text-white border-blue-800':'bg-white border-gray-200 text-gray-600'}`}>
                {label}
              </button>
            ))}
          </div>
          {supplierMode==='saved'?(
            <select value={supplierId} onChange={e=>setSupplierId(e.target.value)} className={iCls}>
              <option value="">— Select a supplier —</option>
              {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}{s.city?` · ${s.city}`:''}</option>)}
            </select>
          ):(
            <input value={customSupplier} onChange={e=>setCustomSupplier(e.target.value)} required placeholder="Supplier / vendor name" className={iCls}/>
          )}
        </div>
        {/* PO Meta */}
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">PO Date</label>
            <input type="date" value={poDate} onChange={e=>setPoDate(e.target.value)} className={iCls}/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">Job / Reference</label>
            <input value={jobRef} onChange={e=>setJobRef(e.target.value)} placeholder="Optional job or ref number" className={iCls}/></div>
        </div>
        {/* Line Items */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <p className="text-xs font-black text-gray-400 uppercase tracking-widest">Line Items</p>
            <button type="button" onClick={addLine} className="text-xs bg-blue-800 hover:bg-blue-900 text-white rounded-lg px-3 py-1.5 font-bold">+ Add Line</button>
          </div>
          <div className="space-y-2">
            {lines.map((line,idx)=>(
              <div key={line.id} className="border border-gray-200 rounded-xl p-3 bg-gray-50">
                <div className="grid grid-cols-12 gap-2 items-center">
                  <span className="col-span-1 w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs font-black flex items-center justify-center">{idx+1}</span>
                  <div className="col-span-5">
                    <input value={line.desc} onChange={e=>updateLine(line.id,'desc',e.target.value)} required
                      placeholder="Item description" className="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-xs bg-white focus:ring-1 focus:ring-blue-400"/>
                  </div>
                  <div className="col-span-2">
                    <input type="number" min="0" step="0.01" value={line.qty} onChange={e=>updateLine(line.id,'qty',e.target.value)}
                      placeholder="Qty" className="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-xs bg-white focus:ring-1 focus:ring-blue-400 text-center"/>
                  </div>
                  <div className="col-span-2">
                    <input value={line.unit} onChange={e=>updateLine(line.id,'unit',e.target.value)}
                      placeholder="Unit" className="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-xs bg-white focus:ring-1 focus:ring-blue-400 text-center"/>
                  </div>
                  <div className="col-span-1">
                    <input type="number" min="0" step="0.01" value={line.unitCost} onChange={e=>updateLine(line.id,'unitCost',e.target.value)}
                      placeholder="Cost" className="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-xs bg-white focus:ring-1 focus:ring-blue-400 text-right"/>
                  </div>
                  {lines.length>1&&<button type="button" onClick={()=>removeLine(line.id)}
                    className="col-span-1 w-6 h-6 flex items-center justify-center text-red-400 hover:bg-red-50 rounded-lg text-sm font-black">✕</button>}
                </div>
              </div>
            ))}
          </div>
          <div className="flex justify-end mt-2">
            <p className="text-sm font-black text-gray-700">Total: {fmt(poTotal)} <span className="text-xs text-gray-400 font-normal">ex VAT</span></p>
          </div>
        </div>
        {/* Notes */}
        <div>
          <label className="block text-xs font-semibold text-gray-500 mb-1">Notes</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} placeholder="Delivery instructions, payment terms..." className={iCls+' resize-none'}/>
        </div>
        <div className="flex gap-3 pt-1">
          <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-50">Cancel</button>
          <button type="submit" className="flex-1 bg-blue-800 hover:bg-blue-900 text-white rounded-xl py-2.5 text-sm font-bold">💾 Create Purchase Order</button>
        </div>
      </form>
    </Modal>
  );
}

          suppliers={suppliers}
          onClose={()=>setViewPO(null)}
          onUpdate={updatePO}
          onEmail={updated=>setPurchaseOrders(prev=>prev.map(p=>p.id===updated.id?{...updated,status:'sent'}:p))}

      )}

        <CreateCustomPOModal
          onClose={()=>setShowCreate(false)}

}

/* ═══════════════════════════════════════════
   QUICK RATES — Bulk Excel Import (mirrors inventory import)
   Columns: SKU, NAME, CATEGORY, STOCK, REORDER, UNIT, COST, SELLING
═══════════════════════════════════════════ */
function BulkImportQuickRatesModal({ onClose, onImport, existingRates }) {
  const [rows,    setRows]    = useState([]);
  const [error,   setError]   = useState('');
  const [loading, setLoading] = useState(false);
  const [done,    setDone]    = useState(false);
  const newCount = rows.filter(r=>!r._dup).length;
  const dupCount = rows.filter(r=>r._dup).length;

  // Exact same column map as inventory bulk import
  const COL_MAP = {
    sku:     ['sku','sku code','item code','code'],
    name:    ['name','item name','item','description'],
    cat:     ['category','cat','type','group'],
    stock:   ['stock','stock qty','quantity','qty','stock quantity'],
    reorder: ['reorder','reorder level','reorder at','min stock'],
    unit:    ['unit','unit of measure','uom'],
    cost:    ['cost','cost price','cost (r)','buying'],
    sell:    ['selling','sell','sell price','selling price','rate','price'],
  };
  function findCol(headers, aliases) {
    return headers.findIndex(h=>aliases.includes((h||'').toLowerCase().trim()));
  }

  function parseFile(file) {
    setError(''); setRows([]); setLoading(true);
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const XLSX = window.XLSX;
        if (!XLSX) { setError('Excel parser not loaded. Please refresh.'); setLoading(false); return; }
        const data = new Uint8Array(e.target.result);
        const wb   = XLSX.read(data, { type:'array' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const raw  = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        let headerRow = -1;
        for (let i=0;i<Math.min(raw.length,10);i++){
          const joined=raw[i].join(' ').toLowerCase();
          if(joined.includes('name')||joined.includes('sku')){headerRow=i;break;}
        }
        if(headerRow===-1){setError('Could not find column headers. Make sure a "NAME" column exists.');setLoading(false);return;}
        const headers = raw[headerRow].map(h=>String(h||''));
        const idxMap  = {};
        for(const [f,al] of Object.entries(COL_MAP)) idxMap[f]=findCol(headers,al);
        const parsed=[];
        for(let i=headerRow+1;i<raw.length;i++){
          const row=raw[i];
          const nm=String(row[idxMap.name>=0?idxMap.name:1]||'').trim();
          if(!nm) continue;
          const sku=String(row[idxMap.sku>=0?idxMap.sku:0]||'').trim()||('QR-'+Date.now()+'-'+i);
          const isDup=(existingRates||[]).some(x=>(x.name||'').toLowerCase()===nm.toLowerCase());
          parsed.push({
            sku, name:nm,
            cat:   String(row[idxMap.cat>=0?idxMap.cat:-1]||'').trim(),
            stock: parseFloat(String(row[idxMap.stock>=0?idxMap.stock:-1]||'0').replace(/[^0-9.]/g,''))||0,
            reorder:parseFloat(String(row[idxMap.reorder>=0?idxMap.reorder:-1]||'0').replace(/[^0-9.]/g,''))||0,
            unit:  String(row[idxMap.unit>=0?idxMap.unit:-1]||'').trim(),
            cost:  parseFloat(String(row[idxMap.cost>=0?idxMap.cost:-1]||'0').replace(/[^0-9.]/g,''))||0,
            sell:  parseFloat(String(row[idxMap.sell>=0?idxMap.sell:-1]||'0').replace(/[^0-9.]/g,''))||0,
            _dup:isDup
          });
        }
        if(parsed.length===0){setError('No valid rows found. Make sure at least one row has a Name.');setLoading(false);return;}
        setRows(parsed);
      } catch(err){ setError('Could not read the file: '+err.message); }
      setLoading(false);
    };
    reader.readAsArrayBuffer(file);
  }

  function handleImport(){
    const toAdd=rows.filter(r=>!r._dup).map(r=>({id:Date.now()+Math.random(), sku:r.sku, name:r.name, cat:r.cat, stock:r.stock, reorder:r.reorder, unit:r.unit, cost:r.cost, sell:r.sell, supplierId:null}));
    if(toAdd.length>0) onImport(toAdd);
    setDone(true);
  }

  function downloadTemplate(){
    try{
      const wb=window.XLSX.utils.book_new();
      const headers=['SKU','NAME','CATEGORY','STOCK','REORDER','UNIT','COST','SELLING'];
      const sample=[
        ['VW-FULL','Vehicle Wrap — Full','Wrapping','0','0','m²','600','950'],
        ['FN-APP','Fleet Number Application','Lettering','0','0','unit','80','150'],
        ['INST-HR','Site Signage Installation','Labour','0','0','hour','250','450'],
        ['','','','','','','',''],['','','','','','','',''],
      ];
      const ws=window.XLSX.utils.aoa_to_sheet([headers,...sample]);
      ws['!cols']=[{wch:14},{wch:36},{wch:18},{wch:8},{wch:9},{wch:8},{wch:10},{wch:10}];
      window.XLSX.utils.book_append_sheet(wb,ws,'Quick Rates');
      const inst=window.XLSX.utils.aoa_to_sheet([
        ['Signacore — Quick Rates Bulk Import Instructions'],[''],
        ['Columns: SKU, NAME, CATEGORY, STOCK, REORDER, UNIT, COST, SELLING'],[''],
        ['1. SKU and NAME are required. All other columns are optional.'],
        ['2. STOCK and REORDER should be numbers (e.g. 10, not "10 units").'],
        ['3. COST and SELLING should be numbers without "R" (e.g. 850 not "R 850").'],
        ['4. Duplicate names (case-insensitive) will be skipped on import.'],
      ]);
      window.XLSX.utils.book_append_sheet(wb,inst,'Instructions');
      window.XLSX.writeFile(wb,'Signacore Quick Rates Template.xlsx');
    }catch(err){alert('Could not generate template: '+err.message);}
  }

  const zarFmt = n => 'R '+Number(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});

  return (
    <Modal onClose={onClose} wide>
      <ModalHeader title="⬆ Bulk Import Quick Rates" onClose={onClose}/>
      <div className="px-6 py-5 space-y-5">
        {done ? (
          <div className="text-center py-10 space-y-3">
            <div className="text-5xl">✅</div>
            <p className="text-lg font-black text-gray-800">{newCount} item{newCount!==1?'s':''} imported successfully!</p>
            {dupCount>0&&<p className="text-sm text-amber-600">{dupCount} duplicate{dupCount!==1?'s':''} skipped.</p>}
            <button onClick={onClose} className="mt-4 bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-6 py-2.5 text-sm font-bold">Close</button>
          </div>
        ) : (<>
          <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 flex items-start gap-4">
            <span className="text-2xl">📥</span>
            <div className="flex-1">
              <p className="text-sm font-black text-blue-800 mb-0.5">Step 1 — Download the template</p>
              <p className="text-xs text-blue-600">Columns: <strong>SKU, NAME, CATEGORY, STOCK, REORDER, UNIT, COST, SELLING</strong></p>
            </div>
            <button type="button" onClick={downloadTemplate}
              className="flex-shrink-0 bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-4 py-2 text-xs font-bold whitespace-nowrap cursor-pointer">
              📥 Download Template
            </button>
          </div>
          <div>
            <p className="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Step 2 — Upload your completed file</p>
            <label className={`flex flex-col items-center justify-center border-2 border-dashed rounded-2xl p-8 cursor-pointer transition-colors ${rows.length>0?'border-brand-300 bg-brand-50':'border-gray-200 hover:border-brand-300 hover:bg-brand-50/40'}`}>
              <span className="text-3xl mb-2">{rows.length>0?'✅':'📂'}</span>
              <p className="text-sm font-bold text-gray-700">{rows.length>0?`${rows.length} rows loaded — replace file?`:'Click to select your .xlsx file'}</p>
              <p className="text-xs text-gray-400 mt-1">Accepts .xlsx files only</p>
              <input type="file" accept=".xlsx" className="hidden" onChange={e=>{if(e.target.files[0])parseFile(e.target.files[0]);e.target.value='';}}/>
            </label>
            {loading&&<p className="text-xs text-brand-600 font-semibold mt-2 text-center">⏳ Reading file…</p>}
            {error&&<div className="mt-2 bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-xs text-red-700 font-semibold">{error}</div>}
          </div>
          {rows.length>0&&(
            <div>
              <div className="flex items-center justify-between mb-2">
                <p className="text-xs font-black text-gray-400 uppercase tracking-widest">Step 3 — Review &amp; Import</p>
                <div className="flex gap-3 text-xs">
                  <span className="font-bold text-emerald-600">✅ {newCount} new</span>
                  {dupCount>0&&<span className="font-bold text-amber-500">⚠️ {dupCount} duplicate{dupCount!==1?'s':''} (will skip)</span>}
                </div>
              </div>
              <div className="border border-gray-200 rounded-2xl overflow-hidden">
                <div className="overflow-x-auto max-h-64">
                  <table className="w-full text-xs min-w-[700px]">
                    <thead className="bg-gray-800 sticky top-0">
                      <tr>{['','SKU','Name','Cat','Stock','Reorder','Unit','Cost','Selling'].map(h=><th key={h} className="px-3 py-2 text-left font-semibold text-gray-200 whitespace-nowrap">{h}</th>)}</tr>
                    </thead>
                    <tbody>
                      {rows.map((r,i)=>(
                        <tr key={i} className={`border-b border-gray-100 ${r._dup?'bg-amber-50':'bg-white'}`}>
                          <td className="px-3 py-2 text-center">{r._dup?<span className="text-amber-500 font-bold" title="Duplicate — will skip">⚠️</span>:<span className="text-emerald-500">✅</span>}</td>
                          <td className="px-3 py-2 text-gray-500 font-mono text-xs">{r.sku}</td>
                          <td className="px-3 py-2 font-semibold text-gray-800">{r.name}</td>
                          <td className="px-3 py-2 text-gray-500">{r.cat||'—'}</td>
                          <td className="px-3 py-2 text-gray-700">{r.stock}</td>
                          <td className="px-3 py-2 text-gray-500">{r.reorder}</td>
                          <td className="px-3 py-2 text-gray-500">{r.unit||'—'}</td>
                          <td className="px-3 py-2 text-gray-600">{zarFmt(r.cost)}</td>
                          <td className="px-3 py-2 font-bold text-brand-700">{zarFmt(r.sell)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div className="flex gap-3 pt-4">
                <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-50">Cancel</button>
                <button onClick={handleImport} disabled={newCount===0} className="flex-1 bg-brand-500 hover:bg-brand-600 disabled:opacity-40 text-white rounded-xl py-2.5 text-sm font-bold">
                  ⚡ Import {newCount} Item{newCount!==1?'s':''}
                </button>
              </div>
            </div>
          )}
        </>)}
      </div>
    </Modal>
  );
}

/* ═══════════════════════════════════════════
   QUICK RATES — Main Management Modal
═══════════════════════════════════════════ */
function QuickRatesModal({ quickRates, setQuickRates, suppliers, inventory, setInventory, inventoryCats, onClose }) {
  const [search,      setSearch]      = useState('');
  const [showAdd,     setShowAdd]     = useState(false);
  const [editItem,    setEditItem]    = useState(null);
  const [copyItem,    setCopyItem]    = useState(null);
  const [showImport,  setShowImport]  = useState(false);
  const [delId,       setDelId]       = useState(null);
  const [pendingMove, setPendingMove] = useState(null); // { item, dupes:[] }

  // Merge quick-rates cats + full inventory cat list so add/edit has all options
  const STANDARD_CATS = ['Vinyl','Laminate','Substrates','Ink & Consumables','Aluminium Profiles','Hardware & Fittings','Electrical Components','Fabric & Mesh','Paper & Board','Tools & Equipment','Signage Faces','LED Components','Packaging','Consumables','Other'];
  const allCats = [...new Set([
    ...STANDARD_CATS,
    ...(inventoryCats||[]),
    ...(quickRates||[]).map(r=>r.cat).filter(Boolean)
  ])].sort();

  const filtered = (quickRates||[]).filter(r=>{
    if(!search.trim()) return true;
    const q=search.toLowerCase();
    return (r.name||'').toLowerCase().includes(q)||(r.sku||'').toLowerCase().includes(q)||(r.cat||'').toLowerCase().includes(q);
  });

  function handleSave(item) {
    const stock = Number(item.stock)||0;
    if (stock > 0) {
      // Stock has been entered — check for matching items in inventory
      const dupes = (inventory||[]).filter(i=>
        i.name.toLowerCase().trim() === (item.name||'').toLowerCase().trim() ||
        (item.sku && i.sku && i.sku.toLowerCase().trim() === item.sku.toLowerCase().trim())
      );
      setPendingMove({ item, dupes });
      return; // wait for user's decision in the dialog
    }
    // No stock — just update in Quick Rates as usual
    setQuickRates(prev=>prev.find(x=>x.id===item.id) ? prev.map(x=>x.id===item.id?item:x) : [...prev,item]);
  }

  function moveToInventory(item) {
    const newItem = { ...item, id: Date.now(), supplierId: item.supplierId||null };
    setInventory(prev=>[...prev, newItem]);
    setQuickRates(prev=>prev.filter(x=>x.id!==item.id));
    setPendingMove(null);
  }

  function mergeIntoInventory(qrItem, invTargetId) {
    setInventory(prev=>prev.map(i=>{
      if(i.id!==invTargetId) return i;
      return { ...i, stock: (Number(i.stock)||0)+(Number(qrItem.stock)||0) };
    }));
    setQuickRates(prev=>prev.filter(x=>x.id!==qrItem.id));
    setPendingMove(null);
  }

  function keepInQR(item) {
    // Save with stock but don't move — user chose to keep here
    setQuickRates(prev=>prev.find(x=>x.id===item.id) ? prev.map(x=>x.id===item.id?item:x) : [...prev,item]);
    setPendingMove(null);
  }

  function handleDelete(id){ setQuickRates(prev=>prev.filter(x=>x.id!==id)); setDelId(null); }
  function handleBulkImport(items){ setQuickRates(prev=>[...prev,...items]); }

  const zarFmt = n => 'R '+Number(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});
  const stockBadge = item => {
    if(!item.stock||item.stock===0) return <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">No stock</span>;
    if(item.reorder>0&&item.stock<=item.reorder) return <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">Low — {item.stock} {item.unit}</span>;
    return <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">{item.stock} {item.unit}</span>;
  };

  return (
    <Modal onClose={onClose} wide>
      <ModalHeader title="⚡ Quick Rates" onClose={onClose}/>
      <div className="px-6 py-5 space-y-4">

        {/* Info tip */}
        <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-2.5 text-xs text-amber-800">
          💡 <strong>Tip:</strong> When you add a Stock Qty to any item here, you will be prompted to move it into your real Inventory automatically.
        </div>

        {/* Search + buttons */}
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex-1 relative min-w-[180px]">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search by name, SKU or category…"
              className="w-full border border-gray-300 rounded-xl pl-9 pr-3 py-2.5 text-sm bg-white focus:ring-2 focus:ring-brand-400 focus:border-brand-400"/>
          </div>
          <button onClick={()=>setShowImport(true)} className="flex items-center gap-1.5 bg-gray-700 hover:bg-gray-800 text-white rounded-xl px-3.5 py-2.5 text-xs font-bold whitespace-nowrap">⬆ Bulk Import</button>
          <button onClick={()=>setShowAdd(true)} className="flex items-center gap-1.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-3.5 py-2.5 text-xs font-bold whitespace-nowrap">＋ Add Item</button>
        </div>

        {/* Table */}
        {filtered.length===0 ? (
          <div className="text-center py-12 text-gray-400">
            <div className="text-4xl mb-2">⚡</div>
            <p className="font-semibold text-sm">{search?'No items match your search.':'No Quick Rate items yet.'}</p>
            <p className="text-xs mt-1">{!search&&'Add items manually or bulk import from Excel.'}</p>
          </div>
        ) : (
          <div className="border border-gray-200 rounded-2xl overflow-hidden">
            <div className="overflow-x-auto max-h-[52vh]">
              <table className="w-full text-sm min-w-[800px]">
                <thead className="sticky top-0" style={{background:'#06065c'}}>
                  <tr>{['Item','SKU','Cat','Stock Level','Reorder At','Cost','Sell Price',''].map(h=>(
                    <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-white/80 whitespace-nowrap">{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {filtered.map((r,i)=>(
                    <tr key={r.id} className={`border-b border-gray-100 ${i%2===0?'bg-white':'bg-gray-50'} hover:bg-brand-50/30 transition-colors`}>
                      <td className="px-4 py-3 font-semibold text-gray-800 max-w-[200px] truncate">{r.name}</td>
                      <td className="px-4 py-3 text-xs font-mono text-gray-500">{r.sku||'—'}</td>
                      <td className="px-4 py-3 text-gray-500">{r.cat||'—'}</td>
                      <td className="px-4 py-3">{stockBadge(r)}</td>
                      <td className="px-4 py-3 text-gray-500">{r.reorder||0}</td>
                      <td className="px-4 py-3 text-gray-600">{zarFmt(r.cost)}</td>
                      <td className="px-4 py-3 font-bold text-brand-700">{zarFmt(r.sell)}</td>
                      <td className="px-4 py-3">
                        <div className="flex gap-1.5 justify-end">
                          <button onClick={()=>setEditItem(r)} className="text-xs border border-gray-200 rounded-lg px-2.5 py-1 text-gray-500 hover:bg-gray-100 font-semibold">✏️</button>
                          <button onClick={()=>setCopyItem({...r,id:null,sku:r.sku+'-COPY'})} className="text-xs border border-gray-200 rounded-lg px-2.5 py-1 text-gray-500 hover:bg-gray-100 font-semibold">⧉</button>
                          {delId===r.id ? (
                            <span className="flex gap-1">
                              <button onClick={()=>handleDelete(r.id)} className="text-xs bg-red-500 hover:bg-red-600 text-white rounded-lg px-2.5 py-1 font-bold">Delete</button>
                              <button onClick={()=>setDelId(null)} className="text-xs border border-gray-200 rounded-lg px-2.5 py-1 text-gray-500 hover:bg-gray-100">✕</button>
                            </span>
                          ) : (
                            <button onClick={()=>setDelId(r.id)} className="text-xs border border-red-200 text-red-400 rounded-lg px-2.5 py-1 hover:bg-red-50 font-semibold">🗑</button>
                          )}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        <div className="flex justify-between items-center pt-2 border-t border-gray-100">
          <p className="text-xs text-gray-400">{(quickRates||[]).length} item{(quickRates||[]).length!==1?'s':''} total</p>
          <button onClick={onClose} className="bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl px-5 py-2 text-sm font-bold">Close</button>
        </div>
      </div>

      {(showAdd||editItem||copyItem)&&<AddEditQuickRateModal item={copyItem||editItem} suppliers={suppliers||[]} allCats={allCats} onClose={()=>{setShowAdd(false);setEditItem(null);setCopyItem(null);}} onSave={it=>{handleSave({...it,id:it.id||Date.now()});setCopyItem(null);}}/>}
      {showImport&&<BulkImportQuickRatesModal existingRates={quickRates||[]} onImport={handleBulkImport} onClose={()=>setShowImport(false)}/>}

      {/* ── Move to Inventory dialog ── */}
      {pendingMove&&(
        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&setPendingMove(null)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
            <div className="px-6 py-4 border-b flex items-center gap-3">
              <span className="text-2xl">📦</span>
              <div>
                <h3 className="text-base font-black text-gray-800">Move to Inventory?</h3>
                <p className="text-xs text-gray-500 mt-0.5">Stock has been entered — this item can now live in your real Inventory.</p>
              </div>
            </div>
            <div className="px-6 py-4 space-y-4">
              {/* Item summary */}
              <div className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 grid grid-cols-2 gap-2 text-xs">
                <div><span className="text-gray-400">Name</span><p className="font-bold text-gray-800">{pendingMove.item.name}</p></div>
                <div><span className="text-gray-400">SKU</span><p className="font-bold text-gray-800">{pendingMove.item.sku||'—'}</p></div>
                <div><span className="text-gray-400">Category</span><p className="font-bold text-gray-800">{pendingMove.item.cat||'—'}</p></div>
                <div><span className="text-gray-400">Stock Qty</span><p className="font-bold text-emerald-700">{pendingMove.item.stock} {pendingMove.item.unit}</p></div>
                <div><span className="text-gray-400">Cost</span><p className="font-bold text-gray-800">{zarFmt(pendingMove.item.cost)}</p></div>
                <div><span className="text-gray-400">Sell Price</span><p className="font-bold text-brand-700">{zarFmt(pendingMove.item.sell)}</p></div>
              </div>

              {/* Duplicate warning */}
              {pendingMove.dupes.length>0&&(
                <div className="bg-amber-50 border border-amber-300 rounded-xl p-4 space-y-3">
                  <p className="text-xs font-black text-amber-800">⚠️ Similar item{pendingMove.dupes.length>1?'s':''} already exist{pendingMove.dupes.length===1?'s':''} in Inventory:</p>
                  {pendingMove.dupes.map(d=>(
                    <div key={d.id} className="flex items-center justify-between bg-white border border-amber-200 rounded-lg px-3 py-2">
                      <div className="text-xs">
                        <p className="font-bold text-gray-800">{d.name} <span className="font-normal text-gray-400">({d.sku})</span></p>
                        <p className="text-gray-500">Stock: {d.stock} {d.unit} · Sell: {zarFmt(d.sell)}</p>
                      </div>
                      <button onClick={()=>mergeIntoInventory(pendingMove.item,d.id)}
                        className="ml-3 flex-shrink-0 bg-amber-500 hover:bg-amber-600 text-white rounded-lg px-3 py-1.5 text-xs font-bold">
                        Merge stock (+{pendingMove.item.stock})
                      </button>
                    </div>
                  ))}
                </div>
              )}

              {/* Actions */}
              <div className="flex flex-col gap-2 pt-1">
                <button onClick={()=>moveToInventory(pendingMove.item)}
                  className="w-full bg-brand-500 hover:bg-brand-600 text-white rounded-xl py-2.5 text-sm font-bold">
                  📦 Move to Inventory as new item
                </button>
                <button onClick={()=>keepInQR(pendingMove.item)}
                  className="w-full border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl py-2.5 text-sm font-semibold">
                  ⚡ Keep in Quick Rates with stock
                </button>
                <button onClick={()=>setPendingMove(null)}
                  className="w-full text-gray-400 hover:text-gray-600 text-xs py-1">
                  Cancel — discard changes
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </Modal>
  );
}

/* ── Quick Rates inline tab (same logic as QuickRatesModal but rendered as a full page) ── */
function QuickRatesTab({ quickRates, setQuickRates, suppliers, inventory, setInventory, inventoryCats }) {
  const [search,      setSearch]      = useState('');
  const [showAdd,     setShowAdd]     = useState(false);
  const [editItem,    setEditItem]    = useState(null);
  const [copyItem,    setCopyItem]    = useState(null);
  const [showImport,  setShowImport]  = useState(false);
  const [delId,       setDelId]       = useState(null);
  const [pendingMove, setPendingMove] = useState(null);
  const [sortCol,     setSortCol]     = useState(null);
  const [sortDir,     setSortDir]     = useState('asc');

  const STANDARD_CATS = ['Vinyl','Laminate','Substrates','Ink & Consumables','Aluminium Profiles','Hardware & Fittings','Electrical Components','Fabric & Mesh','Paper & Board','Tools & Equipment','Signage Faces','LED Components','Packaging','Consumables','Other'];
  const allCats = [...new Set([...STANDARD_CATS,...(inventoryCats||[]),...(quickRates||[]).map(r=>r.cat).filter(Boolean)])].sort();

  // Search only the Name column — each typed word must appear in the item name
  const _searched = (quickRates||[]).filter(r=>{
    if(!search.trim()) return true;
    const name = (r.name||'').toLowerCase();
    return search.toLowerCase().trim().split(/\s+/).filter(Boolean).every(t=>name.includes(t));
  });

  // Sort
  const filtered = sortCol ? [..._searched].sort((a,b)=>{
    let av,bv;
    if(sortCol==='name')    { av=a.name||'';    bv=b.name||''; }
    else if(sortCol==='sku'){ av=a.sku||'';     bv=b.sku||''; }
    else if(sortCol==='cat'){ av=a.cat||'';     bv=b.cat||''; }
    else if(sortCol==='stock')  { av=a.stock||0;   bv=b.stock||0; }
    else if(sortCol==='reorder'){ av=a.reorder||0; bv=b.reorder||0; }
    else if(sortCol==='cost')   { av=a.cost||0;    bv=b.cost||0; }
    else if(sortCol==='sell')   { av=a.sell||0;    bv=b.sell||0; }
    if(typeof av==='string') return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return sortDir==='asc'?av-bv:bv-av;
  }) : _searched;

  function handleSave(item){
    const stock=Number(item.stock)||0;
    if(stock>0){
      const dupes=(inventory||[]).filter(i=>
        i.name.toLowerCase().trim()===(item.name||'').toLowerCase().trim()||
        (item.sku&&i.sku&&i.sku.toLowerCase().trim()===item.sku.toLowerCase().trim())
      );
      setPendingMove({item,dupes}); return;
    }
    setQuickRates(prev=>prev.find(x=>x.id===item.id)?prev.map(x=>x.id===item.id?item:x):[...prev,item]);
  }
  function moveToInventory(item){
    setInventory(prev=>[...prev,{...item,id:Date.now(),supplierId:item.supplierId||null}]);
    setQuickRates(prev=>prev.filter(x=>x.id!==item.id));
    setPendingMove(null);
  }
  function mergeIntoInventory(qrItem,invTargetId){
    setInventory(prev=>prev.map(i=>i.id!==invTargetId?i:{...i,stock:(Number(i.stock)||0)+(Number(qrItem.stock)||0)}));
    setQuickRates(prev=>prev.filter(x=>x.id!==qrItem.id));
    setPendingMove(null);
  }
  function keepInQR(item){
    setQuickRates(prev=>prev.find(x=>x.id===item.id)?prev.map(x=>x.id===item.id?item:x):[...prev,item]);
    setPendingMove(null);
  }
  function handleDelete(id){ setQuickRates(prev=>prev.filter(x=>x.id!==id)); setDelId(null); }
  function handleBulkImport(items){ setQuickRates(prev=>[...prev,...items]); }

  const zarFmt=n=>'R '+Number(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});
  const stockBadge=item=>{
    if(!item.stock||item.stock===0) return <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-700">No stock</span>;
    if(item.reorder>0&&item.stock<=item.reorder) return <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">Low — {item.stock} {item.unit}</span>;
    return <span className="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">{item.stock} {item.unit}</span>;
  };

  return (
    <div className="space-y-4">
      {/* Header */}
      <div className="flex items-start justify-between gap-4">
        <div>
          <h3 className="text-base font-black text-gray-900">⚡ Quick Rates</h3>
          <p className="text-xs text-gray-400 mt-0.5">Reference rates from other work — not deducted from stock. Pull into quotes alongside your real inventory.</p>
        </div>
        <p className="text-xs text-gray-400 flex-shrink-0">{(quickRates||[]).length} item{(quickRates||[]).length!==1?'s':''}</p>
      </div>

      {/* Tip */}
      <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-2.5 text-xs text-amber-800">
        💡 <strong>Tip:</strong> When you add a Stock Qty to any item here, you will be prompted to move it into your real Inventory automatically.
      </div>

      {/* Search + buttons */}
      <div className="flex items-center gap-3 flex-wrap">
        <div className="flex-1 relative min-w-[200px]">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search item name… type any word or part of a word"
            className="w-full border border-gray-300 rounded-xl pl-9 pr-10 py-2.5 text-sm bg-white focus:ring-2 focus:ring-brand-400 focus:border-brand-400"/>
          {search&&<button onClick={()=>setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 hover:text-gray-500 text-base font-black">×</button>}
        </div>
        <button onClick={()=>setShowImport(true)} className="flex items-center gap-1.5 bg-gray-700 hover:bg-gray-800 text-white rounded-xl px-3.5 py-2.5 text-xs font-bold whitespace-nowrap">⬆ Bulk Import</button>
        <button onClick={()=>setShowAdd(true)} className="flex items-center gap-1.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-3.5 py-2.5 text-xs font-bold whitespace-nowrap">＋ Add Item</button>
      </div>

      {/* Result count */}
      {search.trim()&&(
        <p className="text-xs text-gray-400">
          {filtered.length===0?'No items match your search.':`Showing ${filtered.length} of ${(quickRates||[]).length} items`}
        </p>
      )}

      {/* Table */}
      {filtered.length===0?(
        <div className="text-center py-16 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200">
          <div className="text-4xl mb-2">⚡</div>
          <p className="font-semibold text-sm">{search?'No items match your search.':'No Quick Rate items yet.'}</p>
          <p className="text-xs mt-1">{!search&&'Add items manually or bulk import from Excel.'}</p>
        </div>
      ):(
        <div className="border border-gray-200 rounded-2xl overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm min-w-[820px]">
              <thead className="sticky top-0" style={{background:'#06065c'}}>
                <tr>
                  {[['name','Item'],['sku','SKU'],['cat','Category'],['stock','Stock Level'],['reorder','Reorder At'],['cost','Cost'],['sell','Sell Price']].map(([col,label])=>(
                    <th key={col}
                      className={`px-4 py-3 text-left text-xs font-semibold cursor-pointer select-none hover:bg-white/10 transition-colors whitespace-nowrap ${sortCol===col?'text-white':'text-white/80'}`}
                      onClick={()=>{ if(sortCol===col){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortCol(col);setSortDir('asc');} }}>
                      {label} <span className={sortCol===col?'text-amber-300':'text-white/30'}>{sortCol===col?(sortDir==='asc'?'▲':'▼'):'⇅'}</span>
                    </th>
                  ))}
                  <th className="px-4 py-3"></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((r,i)=>(
                  <tr key={r.id} className={`border-b border-gray-100 ${i%2===0?'bg-white':'bg-gray-50'} hover:bg-brand-50/30 transition-colors`}>
                    <td className="px-4 py-3 font-semibold text-gray-800 max-w-[220px] truncate">{r.name}</td>
                    <td className="px-4 py-3 text-xs font-mono text-gray-500">{r.sku||'—'}</td>
                    <td className="px-4 py-3 text-gray-500">{r.cat||'—'}</td>
                    <td className="px-4 py-3">{stockBadge(r)}</td>
                    <td className="px-4 py-3 text-gray-500">{r.reorder||0}</td>
                    <td className="px-4 py-3 text-gray-600">{zarFmt(r.cost)}</td>
                    <td className="px-4 py-3 font-bold text-brand-700">{zarFmt(r.sell)}</td>
                    <td className="px-4 py-3">
                      <div className="flex gap-1.5 justify-end">
                        <button onClick={()=>setEditItem(r)} className="text-xs border border-gray-200 rounded-lg px-2.5 py-1 text-gray-500 hover:bg-gray-100 font-semibold">✏️</button>
                        <button onClick={()=>setCopyItem({...r,id:null,sku:r.sku+'-COPY'})} className="text-xs border border-gray-200 rounded-lg px-2.5 py-1 text-gray-500 hover:bg-gray-100 font-semibold">⧉</button>
                        {delId===r.id?(
                          <span className="flex gap-1">
                            <button onClick={()=>handleDelete(r.id)} className="text-xs bg-red-500 hover:bg-red-600 text-white rounded-lg px-2.5 py-1 font-bold">Delete</button>
                            <button onClick={()=>setDelId(null)} className="text-xs border border-gray-200 rounded-lg px-2.5 py-1 text-gray-500 hover:bg-gray-100">✕</button>
                          </span>
                        ):(
                          <button onClick={()=>setDelId(r.id)} className="text-xs border border-red-200 text-red-400 rounded-lg px-2.5 py-1 hover:bg-red-50 font-semibold">🗑</button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {(showAdd||editItem||copyItem)&&<AddEditQuickRateModal item={copyItem||editItem} suppliers={suppliers||[]} allCats={allCats} onClose={()=>{setShowAdd(false);setEditItem(null);setCopyItem(null);}} onSave={it=>{handleSave({...it,id:it.id||Date.now()});setCopyItem(null);}}/>}
      {showImport&&<BulkImportQuickRatesModal existingRates={quickRates||[]} onImport={handleBulkImport} onClose={()=>setShowImport(false)}/>}

      {/* Move to Inventory overlay */}
      {pendingMove&&(
        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&setPendingMove(null)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
            <div className="px-6 py-4 border-b flex items-center gap-3">
              <span className="text-2xl">📦</span>
              <div>
                <h3 className="text-base font-black text-gray-800">Move to Inventory?</h3>
                <p className="text-xs text-gray-500 mt-0.5">Stock has been entered — this item can now live in your real Inventory.</p>
              </div>
            </div>
            <div className="px-6 py-4 space-y-4">
              <div className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 grid grid-cols-2 gap-2 text-xs">
                <div><span className="text-gray-400">Name</span><p className="font-bold text-gray-800">{pendingMove.item.name}</p></div>
                <div><span className="text-gray-400">SKU</span><p className="font-bold text-gray-800">{pendingMove.item.sku||'—'}</p></div>
                <div><span className="text-gray-400">Category</span><p className="font-bold text-gray-800">{pendingMove.item.cat||'—'}</p></div>
                <div><span className="text-gray-400">Stock Qty</span><p className="font-bold text-emerald-700">{pendingMove.item.stock} {pendingMove.item.unit}</p></div>
                <div><span className="text-gray-400">Cost</span><p className="font-bold text-gray-800">{zarFmt(pendingMove.item.cost)}</p></div>
                <div><span className="text-gray-400">Sell Price</span><p className="font-bold text-brand-700">{zarFmt(pendingMove.item.sell)}</p></div>
              </div>
              {pendingMove.dupes.length>0&&(
                <div className="bg-amber-50 border border-amber-300 rounded-xl p-4 space-y-3">

/* ═══════════════════════════════════════════
   ACCOUNTING PAGE
═══════════════════════════════════════════ */
function AccountingPage({ bankTxns, setBankTxns, chartOfAccounts, setChartOfAccounts, accInvoices, setAccInvoices, accBills, setAccBills, suppliers, customers, companies, user }) {
  const [accTab, setAccTab] = useState('dashboard');
  const [showImport, setShowImport] = useState(false);
  const [showAddAccount, setShowAddAccount] = useState(false);
  const [csvError, setCsvError] = useState('');
  const [importPreview, setImportPreview] = useState(null);

  // ── Bank Transactions sub-tab state ──
  const [txnSearch, setTxnSearch] = useState('');
  const [txnFilter, setTxnFilter] = useState('all'); // all|unallocated|allocated
  const [editTxn, setEditTxn] = useState(null);

  // ── New Account form ──
  const [newAcc, setNewAcc] = useState({code:'',name:'',type:'Expense',group:'',taxRate:0});

  const ACC_TYPES = ['Asset','Liability','Equity','Income','COS','Expense'];
  const fmtAmt = n => 'R ' + Number(Math.abs(n)).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-ZA') : '';

  // ── CSV Parser for bank statements ──
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
    if (lines.length < 2) return null;
    // Detect delimiter
    const delim = lines[0].includes('\t') ? '\t' : ',';
    const headers = lines[0].split(delim).map(h=>h.replace(/['"]/g,'').trim().toLowerCase());
    const rows = [];
    for(let i=1;i<lines.length;i++){
      const cols = lines[i].split(delim).map(c=>c.replace(/['"]/g,'').trim());
      const obj = {};
      headers.forEach((h,idx)=>{ obj[h]=cols[idx]||''; });
      rows.push(obj);
    }
    return {headers, rows};
  }

  function mapCSVToTxns(rows, headers) {
    // Try to find date, description, debit, credit, amount columns
    const find = (...names) => {
      for(const n of names){ const h=headers.find(h=>h.includes(n)); if(h) return h; }
      return null;
    };
    const dateCol  = find('date','transaction date','trans date','posting date');
    const descCol  = find('description','narrative','reference','details','memo','particulars');
    const debitCol = find('debit','withdrawals','payment');
    const creditCol= find('credit','deposits','receipt');
    const amtCol   = find('amount');

    return rows.map((r,i)=>{
      let debit=0, credit=0;
      if(debitCol&&r[debitCol]) debit=parseFloat(r[debitCol].replace(/[,\s]/g,''))||0;
      if(creditCol&&r[creditCol]) credit=parseFloat(r[creditCol].replace(/[,\s]/g,''))||0;
      if(amtCol&&!debitCol&&!creditCol){
        const amt=parseFloat(r[amtCol].replace(/[,\s]/g,''))||0;
        if(amt<0) debit=Math.abs(amt); else credit=amt;
      }
      return {
        id: Date.now()+i,
        date: r[dateCol||'']||'',
        description: r[descCol||'']||'—',
        debit, credit,
        accountId: null,
        accountName: '',
        vatCode: '',
        reconciled: false,
        ref: '',
      };
    }).filter(t=>t.debit>0||t.credit>0);
  }

  function handleFileUpload(e) {
    const file = e.target.files[0];
    if(!file){ return; }
    setCsvError('');
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = parseCSV(ev.target.result);
        if(!parsed){ setCsvError('Could not parse file. Please use a CSV or TSV bank export.'); return; }
        const txns = mapCSVToTxns(parsed.rows, parsed.headers);
        if(!txns.length){ setCsvError('No valid transactions found. Check columns for Date, Description, Debit/Credit.'); return; }
        setImportPreview({ txns, filename: file.name });
      } catch(err){ setCsvError('Parse error: '+err.message); }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function confirmImport() {
    if(!importPreview) return;
    setBankTxns(prev=>[...importPreview.txns, ...prev]);
    setImportPreview(null);
    setShowImport(false);
  }

  // ── Filtered transactions ──
  const displayTxns = bankTxns
    .filter(t=>{
      if(txnFilter==='unallocated') return !t.accountId;
      if(txnFilter==='allocated')   return !!t.accountId;
      return true;
    })
    .filter(t=>{
      if(!txnSearch) return true;
      const s=txnSearch.toLowerCase();
      return t.description.toLowerCase().includes(s) || (t.accountName||'').toLowerCase().includes(s);
    });

  const totalDebits  = displayTxns.reduce((s,t)=>s+t.debit,0);
  const totalCredits = displayTxns.reduce((s,t)=>s+t.credit,0);
  const unallocatedCount = bankTxns.filter(t=>!t.accountId).length;

  // ── P&L Summary ──
  function getPLSummary() {
    const allocated = bankTxns.filter(t=>t.accountId);
    const income  = allocated.filter(t=>['Income'].includes(chartOfAccounts.find(a=>a.id===t.accountId)?.type)).reduce((s,t)=>s+t.credit,0);
    const cos     = allocated.filter(t=>['COS'].includes(chartOfAccounts.find(a=>a.id===t.accountId)?.type)).reduce((s,t)=>s+t.debit,0);
    const expense = allocated.filter(t=>['Expense'].includes(chartOfAccounts.find(a=>a.id===t.accountId)?.type)).reduce((s,t)=>s+t.debit,0);
    const grossProfit = income - cos;
    const netProfit   = grossProfit - expense;
    return { income, cos, expense, grossProfit, netProfit };
  }

  // ── Xero CSV Export ──
  function exportToXero() {
    const allocated = bankTxns.filter(t=>t.accountId && t.date);
    if(!allocated.length){ alert('No allocated transactions to export.'); return; }
    const rows = [
      ['*ContactName','*InvoiceDate','*DueDate','*Description','*Quantity','*UnitAmount','*AccountCode','*TaxType','TrackingName1','TrackingOption1']
    ];
    allocated.forEach(t=>{
      const acc = chartOfAccounts.find(a=>a.id===t.accountId);
      const taxType = acc?.taxRate===15 ? 'Tax on Sales' : 'No Tax';
      const amt = t.credit>0 ? t.credit : -t.debit;
      rows.push([
        t.description.substring(0,50),
        t.date,
        t.date,
        t.description.substring(0,255),
        '1',
        amt.toFixed(2),
        acc?.code||'',
        taxType,
        '',''
      ]);
    });
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');

  // ── P&L from all sources ──
  function getFullPL() {
    // From invoices
    const invIncome = accInvoices.filter(i=>i.status==='paid').reduce((s,i)=>{
      return s + (i.lineItems||[]).reduce((t,l)=>t+(parseFloat(l.qty||1)*parseFloat(l.unitAmount||0)),0);
    },0);
    // From bank txns
    const allocated = bankTxns.filter(t=>t.accountId);
    const bankIncome  = allocated.filter(t=>chartOfAccounts.find(a=>a.id===t.accountId)?.type==='Income').reduce((s,t)=>s+t.credit,0);
    const bankCOS     = allocated.filter(t=>chartOfAccounts.find(a=>a.id===t.accountId)?.type==='COS').reduce((s,t)=>s+t.debit,0);
    const bankExpense = allocated.filter(t=>chartOfAccounts.find(a=>a.id===t.accountId)?.type==='Expense').reduce((s,t)=>s+t.debit,0);
    // From bills
    const billExp = accBills.filter(b=>b.status==='paid').reduce((s,b)=>{
      return s + (b.lineItems||[]).reduce((t,l)=>t+(parseFloat(l.qty||1)*parseFloat(l.unitAmount||0)),0);
    },0);
    const income = invIncome + bankIncome;
    const cos    = bankCOS;
    const expense = billExp + bankExpense;
    return { income, cos, expense, grossProfit: income-cos, netProfit: income-cos-expense };
  }

  // ── Aged Debtors ──
  function getAgedDebtors() {
    const today = new Date();
    return accInvoices.filter(i=>i.status!=='paid'&&i.status!=='void').map(i=>{
      const due = new Date(i.dueDate||i.date);
      const days = Math.floor((today-due)/(1000*60*60*24));
      const total = (i.lineItems||[]).reduce((s,l)=>s+(parseFloat(l.qty||1)*parseFloat(l.unitAmount||0)),0);
      return {...i, daysOverdue: days, total};
    });
  }

  // ── Multi-type Xero export ──
  function exportXeroInvoices() {
    const rows = [['*ContactName','*InvoiceDate','*DueDate','*InvoiceNumber','*Description','*Quantity','*UnitAmount','*AccountCode','*TaxType','Currency']];
    accInvoices.filter(i=>i.status!=='void').forEach(inv=>{
      (inv.lineItems||[{description:inv.description||'Service',qty:1,unitAmount:inv.total||0,accountCode:'4000',taxType:'Tax Exclusive'}]).forEach(line=>{
        rows.push([
          inv.contactName||'',
          inv.date||'',
          inv.dueDate||'',
          inv.number||'',
          line.description||'',
          line.qty||1,
          parseFloat(line.unitAmount||0).toFixed(2),
          line.accountCode||'4000',
          line.taxType==='15%'?'Tax on Sales (15%)':'No Tax (0%)',
          'ZAR'
        ]);
      });
    });
    downloadCSV(rows, 'xero-invoices.csv');
  }
  function exportXeroBills() {
    const rows = [['*ContactName','*InvoiceDate','*DueDate','*InvoiceNumber','*Description','*Quantity','*UnitAmount','*AccountCode','*TaxType','Currency']];
    accBills.filter(b=>b.status!=='void').forEach(bill=>{
      (bill.lineItems||[{description:bill.description||'Purchase',qty:1,unitAmount:bill.total||0,accountCode:'6000',taxType:'No Tax'}]).forEach(line=>{
        rows.push([
          bill.supplierName||'',
          bill.date||'',
          bill.dueDate||'',
          bill.number||'',
          line.description||'',
          line.qty||1,
          parseFloat(line.unitAmount||0).toFixed(2),
          line.accountCode||'6000',
          line.taxType==='15%'?'Tax on Purchases (15%)':'No Tax (0%)',
          'ZAR'
        ]);
      });
    });
    downloadCSV(rows, 'xero-bills.csv');
  }
  function exportXeroBank() {
    const allocated = bankTxns.filter(t=>t.accountId && t.date);
    if(!allocated.length){ alert('No allocated bank transactions to export.'); return; }
    const rows = [['*Date','*Amount','Payee','Description','Reference','AccountCode','TaxType']];
    allocated.forEach(t=>{
      const acc = chartOfAccounts.find(a=>a.id===t.accountId);
      const amt = t.credit>0 ? t.credit : -t.debit;
      rows.push([t.date, amt.toFixed(2), t.description.substring(0,50), t.description.substring(0,255), t.ref||'', acc?.code||'', acc?.taxRate===15?'Tax Exclusive':'No Tax']);
    });
    downloadCSV(rows, 'xero-bank-statement.csv');
  }
  function exportXeroContacts() {
    const rows = [['*Name','EmailAddress','PhoneNumber','AddressLine1','City','PostalCode','Country','TaxNumber','AccountNumber','ContactType']];
    const added = new Set();
    accInvoices.forEach(i=>{ if(i.contactName&&!added.has(i.contactName)){ added.add(i.contactName); rows.push([i.contactName,i.contactEmail||'','',i.contactAddress||'','','','South Africa','','','Customer']); }});
    accBills.forEach(b=>{ if(b.supplierName&&!added.has(b.supplierName)){ added.add(b.supplierName); rows.push([b.supplierName,b.supplierEmail||'','',b.supplierAddress||'','','','South Africa','','','Supplier']); }});
    if(rows.length<2){ alert('No contacts to export.'); return; }
    downloadCSV(rows, 'xero-contacts.csv');
  }
  function downloadCSV(rows, filename) {
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  const billStats = { total: accBills.length, paid: accBills.filter(b=>b.status==='paid').length, outstanding: accBills.filter(b=>['approved','overdue'].includes(b.status)).length };

              <span>Subtotal: <strong className="text-gray-800">{fmtAmt(accInvoices.reduce((s,i)=>(i.lineItems||[]).reduce((t,l)=>t+(parseFloat(l.qty||1)*parseFloat(l.unitAmount||0)),s),0))}</strong></span>
              <span>VAT: <strong className="text-blue-600">{fmtAmt(accInvoices.reduce((s,i)=>(i.lineItems||[]).reduce((t,l)=>l.taxType==='15%'?t+(parseFloat(l.qty||1)*parseFloat(l.unitAmount||0)*0.15):t,s),0))}</strong></span>
              <span>Total invoiced: <strong style={{color:'#06065c'}}>{fmtAmt(accInvoices.reduce((s,i)=>{const sub=(i.lineItems||[]).reduce((t,l)=>t+(parseFloat(l.qty||1)*parseFloat(l.unitAmount||0)),0);const vat=(i.lineItems||[]).reduce((t,l)=>l.taxType==='15%'?t+(parseFloat(l.qty||1)*parseFloat(l.unitAmount||0)*0.15):t,0);return s+sub+vat;},0))}</strong></span>
            </div>
          </div>

      {accTab==='bills'&&(
        <div className="space-y-3">
          <div className="flex flex-wrap gap-2 items-center">
            <button onClick={()=>{setEditBill(null);setShowBillModal(true);}} className="flex items-center gap-2 text-white font-bold text-sm px-4 py-2.5 rounded-xl" style={{background:'#ED0101'}}>＋ New Bill / Expense</button>
