  try {
    const ls = localStorage.getItem('sgr_platform_data');
    if (ls) {
      const d = JSON.parse(ls);
      // Version guard: discard data from older schema (e.g. old sample jobs)
      if (d && Array.isArray(d.jobs) && d.v === DATA_VERSION) return d;
      // Stale version → clear it so we fall through to the file tag or INITIAL_*
      localStorage.removeItem('sgr_platform_data');
    }
  } catch(e) {}
  // 2. Embedded data tag — set when the file was last saved
  try {
    const tag = document.getElementById('sgr-data');
    if (tag) { const d = JSON.parse(tag.textContent); if (d && Array.isArray(d.jobs)) return d; }
  } catch(e) {}
  return null; // signals: use INITIAL_* constants below
}

function getNextJobNum(jobs) {
  const nums = jobs
    .map(j => j.num)
    .filter(n => /^SNS-\d+$/.test(n))
    .map(n => parseInt(n.replace('SNS-', ''), 10));
  const max = nums.length > 0 ? Math.max(...nums) : 0;
  return 'SNS-' + String(max + 1).padStart(5, '0');
}

function getNextCalcNum(savedCalcs) {
  const nums = (savedCalcs||[]).map(c=>c.num).filter(n=>n&&/^CALC-\d+$/.test(n)).map(n=>parseInt(n.replace('CALC-',''),10));
  return 'CALC-'+String((nums.length>0?Math.max(...nums):0)+1).padStart(5,'0');
}
function getNextPONum(purchaseOrders) {
  const nums = (purchaseOrders||[]).map(p=>p.num).filter(n=>n&&/^PO-\d+$/.test(n)).map(n=>parseInt(n.replace('PO-',''),10));
  return 'PO-'+String((nums.length>0?Math.max(...nums):0)+1).padStart(5,'0');
}
function getNextCPNum(completeProducts) {
  const nums = (completeProducts||[]).map(p=>p.cpNum).filter(n=>n&&/^CP-\d+$/.test(n)).map(n=>parseInt(n.replace('CP-',''),10));
  return 'CP-'+String((nums.length>0?Math.max(...nums):0)+1).padStart(5,'0');
}
function getNextImportNum(savedImports) {
  const nums = (savedImports||[]).map(i=>i.num).filter(n=>n&&/^IMP-\d+$/.test(n)).map(n=>parseInt(n.replace('IMP-',''),10));
  return 'IMP-'+String((nums.length>0?Math.max(...nums):0)+1).padStart(5,'0');
}

const SA_PRIMARY_REBATE   = 17235;
const SA_SECONDARY_REBATE = 9444;
const SA_TERTIARY_REBATE  = 3145;
const SA_MED_CREDIT_1_2   = 364;  // per month for first 2 members
const SA_MED_CREDIT_EXTRA  = 246;  // per month for each additional member
const UIF_RATE = 0.01;
const UIF_MAX_MONTHLY = 177.12; // 1% of R17,712 cap

function calcSATax({ annualTaxable, ageGroup = 'under65', medicalMembers = 0 }) {
  // Step 1: gross annual tax from bracket
  let annualTax = 0;
  for (let i = 0; i < SA_TAX_BRACKETS.length; i++) {
    const floor = SA_BRACKET_FLOORS[i];
    const { limit, base, rate } = SA_TAX_BRACKETS[i];
    if (annualTaxable > floor) {
      annualTax = base + (Math.min(annualTaxable, limit) - floor) * rate;
    }
  }
  // Step 2: rebates
  let rebate = SA_PRIMARY_REBATE;
  if (ageGroup === '65to75') rebate += SA_SECONDARY_REBATE;
  if (ageGroup === 'over75')  rebate += SA_SECONDARY_REBATE + SA_TERTIARY_REBATE;
  annualTax = Math.max(0, annualTax - rebate);

  // Step 3: medical tax credit (monthly x 12)
  const mems = Math.max(0, medicalMembers);
  const annualMedCredit = mems > 0
    ? (Math.min(mems, 2) * SA_MED_CREDIT_1_2 + Math.max(0, mems - 2) * SA_MED_CREDIT_EXTRA) * 12
    : 0;
  annualTax = Math.max(0, annualTax - annualMedCredit);

  // Monthly PAYE
  return Math.round(annualTax / 12 * 100) / 100;
}

function calcPayroll(f) {
  // f = form fields from PayrollRunModal
  const basic      = parseFloat(f.basicSalary)     || 0;
  const overtime   = parseFloat(f.overtime)         || 0;
  const commission = parseFloat(f.commission)       || 0;
  const bonus      = parseFloat(f.bonus)            || 0;
  const travel     = parseFloat(f.travelAllowance)  || 0;
  const otherEarn  = parseFloat(f.otherEarnings)    || 0;
  const gross      = basic + overtime + commission + bonus + travel + otherEarn;

  // Pre-tax deductions reduce taxable income
  const pensionEmp = parseFloat(f.pensionEmployee)  || 0;
  const maxPensionDeduct = Math.min(pensionEmp, gross * 0.275, 350000/12);
  const taxable    = Math.max(0, gross - maxPensionDeduct);
  const annualTaxable = taxable * 12;

  const paye = calcSATax({
    annualTaxable,
    ageGroup:       f.ageGroup      || 'under65',
    medicalMembers: parseInt(f.medicalMembers) || 0,
  });

  const medicalEmp  = parseFloat(f.medicalEmployee) || 0;
  const uifEmp      = Math.min(gross * UIF_RATE, UIF_MAX_MONTHLY);
  const uifEmployer = Math.min(gross * UIF_RATE, UIF_MAX_MONTHLY);
  const sdl         = gross * 0.01;  // employer only
  const otherDed    = parseFloat(f.otherDeductions) || 0;

  const totalDeductions = paye + uifEmp + medicalEmp + pensionEmp + otherDed;
  const netPay          = Math.max(0, gross - totalDeductions);

  return { gross, taxable, annualTaxable, paye, uifEmp, uifEmployer, sdl, medicalEmp, pensionEmp, otherDed, totalDeductions, netPay };
}

/* ═══════════════════════════════════════════
   GET NEXT INVOICE NUMBER
═══════════════════════════════════════════ */
function getNextInvoiceNum(jobs) {
  const nums = jobs.map(j=>j.invoiceNum).filter(n=>n&&/^INV-\d+$/.test(n)).map(n=>parseInt(n.replace('INV-',''),10));
  return 'INV-'+String((nums.length>0?Math.max(...nums):0)+1).padStart(5,'0');
}

/* ═══════════════════════════════════════════
   FETCH EXTERNAL IMAGE AS BASE64 DATA URL
═══════════════════════════════════════════ */
async function fetchImageAsBase64(url) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const blob = await resp.blob();
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror  = () => resolve(null);
      reader.readAsDataURL(blob);
    });
  } catch(e) { return null; }
}

/* ═══════════════════════════════════════════
   TRIGGER BROWSER FILE DOWNLOAD
═══════════════════════════════════════════ */
function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

/* ═══════════════════════════════════════════
   BUILD MIME .EML FILE WITH PDF ATTACHMENTS
   attachments: [{ filename, base64 }]
═══════════════════════════════════════════ */
function buildEmlFile(to, subject, bodyText, attachments) {
  const boundary = 'SGR_BOUND_' + Date.now().toString(36).toUpperCase();
  const lines = [];
  lines.push('To: ' + (to || ''));
  lines.push('Subject: ' + subject);
  lines.push('MIME-Version: 1.0');
  lines.push('Content-Type: multipart/mixed; boundary="' + boundary + '"');
  lines.push('X-Unsent: 1');
  lines.push('');
  lines.push('--' + boundary);
  lines.push('Content-Type: text/plain; charset=utf-8');
  lines.push('Content-Transfer-Encoding: 7bit');
  lines.push('');
  lines.push(bodyText);
  lines.push('');
  attachments.forEach(att => {
    const b64     = att.base64.replace(/\s/g, '');
    const wrapped = b64.match(/.{1,76}/g).join('\r\n');
    lines.push('--' + boundary);
    lines.push('Content-Type: application/pdf; name="' + att.filename + '"');
    lines.push('Content-Transfer-Encoding: base64');
    lines.push('Content-Disposition: attachment; filename="' + att.filename + '"');
    lines.push('');
    lines.push(wrapped);
    lines.push('');
  });
  lines.push('--' + boundary + '--');
  return lines.join('\r\n');
}

/* ═══════════════════════════════════════════
   GENERATE COVER LETTER PDF (jsPDF)
   type = 'quote' | 'invoice'
   Returns base64 string (no data: prefix)
═══════════════════════════════════════════ */
// Returns {w, h} in mm that preserves aspect ratio within maxW × maxH
async function getLogoDimensions(dataUrl, maxW, maxH) {
  return new Promise(resolve => {
    const img = new window.Image();
    img.onload = () => {
      const ar = img.naturalWidth / Math.max(img.naturalHeight, 1);
      let w = maxH * ar, h = maxH;
      if (w > maxW) { w = maxW; h = maxW / ar; }
      resolve({ w: Math.round(w * 10) / 10, h: Math.round(h * 10) / 10 });
    };
    img.onerror = () => resolve({ w: maxW, h: maxH });
    img.src = dataUrl;
  });
}

async function generateCoverLetterPdf(data, companies, logoDataUrl, type) {

  const doc      = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
  const isQuote  = type === 'quote';
  const co       = companies.find(c=>c.id===data.co)||{name:'Signacore',short:'SGR'};
  const refNum   = isQuote ? data.num : (data.invoiceNum||data.num);
  const contact  = data.contact||data.client||'Sir/Madam';
  const today    = new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'});
  const validity = isQuote ? (data.validUntil||'14 days from date of issue') : (data.invoiceDue||'30 days from invoice date');
  const W=210, LM=20, RM=190, CW=170;
  let y = 20;

  const sc = arr => doc.setTextColor(arr[0],arr[1],arr[2]);
  const sf = arr => doc.setFillColor(arr[0],arr[1],arr[2]);
  const sd = arr => doc.setDrawColor(arr[0],arr[1],arr[2]);

  // Header
  if (logoDataUrl) { try {
    const ld = await getLogoDimensions(logoDataUrl, 60, 23);
    doc.addImage(logoDataUrl,'PNG',LM,y,ld.w,ld.h);
  } catch(e){
    doc.setFont('helvetica','bold'); doc.setFontSize(14); sc(C_RED); doc.text('SIGNACORE',LM,y+14);
  }}
  doc.setFont('helvetica','bold'); doc.setFontSize(13); sc(C_DARK);
  doc.text(co.short||co.name, RM, y+6, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  doc.text('VAT: 4660306046  ·  040-940-5555  ·  sales@signacore.co.za', RM, y+11, {align:'right'});
  y += 22;

  sd(C_RED); doc.setLineWidth(0.8); doc.line(LM,y,RM,y); y += 5;
  doc.setFont('helvetica','bold'); doc.setFontSize(8); sc(C_DARK);
  doc.text('Applied Graphics and Visual Displays', W/2, y+3, {align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(7); sc(C_GREY);
  doc.text('Reg. No. 2022/4307/44/07', W/2, y+7.5, {align:'center'});
  y += 13;

  // Title + ref block
  doc.setFont('helvetica','bold'); doc.setFontSize(11); sc(C_RED);
  doc.text(isQuote ? 'QUOTATION COVER LETTER' : 'INVOICE COVER LETTER', LM, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  doc.text('Ref: '+refNum, RM, y-2, {align:'right'});
  doc.text('Date: '+today,  RM, y+2, {align:'right'});
  doc.text((isQuote?'Valid Until: ':'Due Date: ')+validity, RM, y+6, {align:'right'});
  y += 15;

  // Client block
  doc.setFont('helvetica','normal'); doc.setFontSize(9); sc(C_GREY);
  doc.text(today, LM, y); y += 7;
  doc.setFont('helvetica','bold'); doc.setFontSize(10); sc(C_DARK);
  doc.text((data.client||'').toUpperCase(), LM, y); y += 5;

  doc.setFont('helvetica','normal'); doc.setFontSize(10); sc(C_DARK);
  doc.text('Dear '+contact+',', LM, y); y += 9;

  // --- Sidebar (terms) ---
  const sideX=142, sideW=48, sideY=50;

  doc.roundedRect(sideX, sideY, sideW, 88, 2, 2, 'FD');
  sf(C_RED); doc.rect(sideX, sideY, 2, 88, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_RED);
  doc.text('KEY TERMS', sideX+5, sideY+7);
  const terms = isQuote ? [
    ['Deposit','80% on acceptance'],['Balance','20% on completion'],
    ['Currency','ZAR incl. VAT 15%'],['Valid For','14 days from issue'],

    ['Payment','On invoice due date'],['Currency','ZAR incl. VAT 15%'],
    ['Bank','Standard Bank'],['Acc Name','Signacore'],
    ['Acc No','2-825-229-72'],['Branch','051001'],['Ref',refNum]
  ];
  let ty = sideY+14;
  terms.forEach(([k,v]) => {

    doc.setFont('helvetica','normal'); sc(C_DARK);
    const vl = doc.splitTextToSize(v, sideW-8);
    doc.text(vl, sideX+5, ty+3.5);
    ty += 3.5 + vl.length*3.5 + 2;

  // --- QR review box ---
  y = Math.max(y, sideY+93);
  const qrBoxH = 44;
  sf(C_LBLUE); sd([191,219,254]); doc.setLineWidth(0.3);
  doc.roundedRect(LM, y, CW, qrBoxH, 3, 3, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(9.5); sc(C_BLUE);
  doc.text('We Value Your Feedback!', LM+5, y+8);

  const revLines = doc.splitTextToSize(
    'Your opinion matters to us. Please take a moment to share your experience by scanning the QR code or visiting our Google Business page. Your review helps us improve and helps others discover our services.',

/* ═══════════════════════════════════════════
   GENERATE QUOTE / INVOICE PDF (jsPDF)
   Returns base64 string (no data: prefix)
═══════════════════════════════════════════ */
async function generateDocumentPdf(data, companies, logoDataUrl, type) {
  const { jsPDF } = window.jspdf;
  const doc     = new jsPDF({ unit:'mm', format:'a4', orientation:'portrait' });
  const isQuote = type === 'quote';
  const co      = companies.find(c=>c.id===data.co)||{name:'Signacore',short:'SGR'};
  const fmt     = n => 'R '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const refNum  = isQuote ? data.num : (data.invoiceNum||data.num);
  const lines   = data.lines||[];
  const sub     = lines.reduce((s,l)=>s+(l.subtotal||0),0);
  const disc    = data.discount||0;
  const discAmt = sub*disc/100;
  const after   = sub-discAmt;
  const vat     = after*0.15;
  const total   = after+vat;
  const dep     = total*0.8;
  const today   = new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'2-digit',year:'numeric'});
  const W=210, LM=20, RM=190, CW=170;
  let y = 20;

  const sc = arr => doc.setTextColor(arr[0],arr[1],arr[2]);
  const sf = arr => doc.setFillColor(arr[0],arr[1],arr[2]);
  const sd = arr => doc.setDrawColor(arr[0],arr[1],arr[2]);

  // Header
  if (logoDataUrl) { try {
    const ld = await getLogoDimensions(logoDataUrl, 60, 23);
    doc.addImage(logoDataUrl,'PNG',LM,y,ld.w,ld.h);
  } catch(e){
    doc.setFont('helvetica','bold'); doc.setFontSize(16); sc(C_RED); doc.text('SIGNACORE',LM,y+14);
  }}
  doc.setFont('helvetica','bold'); doc.setFontSize(22); sc(C_DARK);
  doc.text(isQuote?'QUOTATION':'TAX INVOICE', RM, y+8, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  doc.text(co.short||co.name, RM, y+14, {align:'right'});
  doc.text('VAT: 4660306046  ·  040-940-5555  ·  sales@signacore.co.za', RM, y+19, {align:'right'});
  y += 24;
  sd(C_RED); doc.setLineWidth(0.8); doc.line(LM,y,RM,y); y += 5;
  // Company registration line (centered below red line)
  doc.setFont('helvetica','bold'); doc.setFontSize(8); sc(C_DARK);
  doc.text('Applied Graphics and Visual Displays', W/2, y+4, {align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(7); sc(C_GREY);
  doc.text('Reg. No. 2022/4307/44/07', W/2, y+8.5, {align:'center'});
  y += 14;

  // Reference row
  sf(C_LGREY); sd(C_MGREY); doc.setLineWidth(0.2);
  doc.roundedRect(LM,y,CW,22,2,2,'FD');
  const refDate = isQuote?(data.date||today):(data.invoiceDate||today);
  const refFields = isQuote
    ? [['Quote No',refNum],['Date',refDate],['Valid Until',data.validUntil||'14 days'],['Prepared By',data.preparedBy||'Signacore']]
    : [['Invoice No',refNum],['Date',refDate],['Due Date',data.invoiceDue||'30 days'],['Status',(data.invoiceStatus||'PENDING').toUpperCase()]];
  refFields.forEach((f,i)=>{
    const cx = LM+5+i*(CW/4);
    doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_GREY);
    doc.text(f[0], cx, y+7);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); sc(C_DARK);
    doc.text(f[1], cx, y+14);
  });
  y += 28;

  // Quoted To / From boxes
  const boxH = 28;
  sf(C_LBLUE); sd([191,219,254]); doc.setLineWidth(0.2);
  doc.roundedRect(LM,y,82,boxH,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_BLUE);
  doc.text(isQuote?'QUOTED TO':'BILLED TO', LM+4, y+6);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); sc(C_DARK);
  doc.text(data.client||'', LM+4, y+13);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  if (data.contact) doc.text('Attn: '+data.contact, LM+4, y+19);
  if (data.email)   doc.text(data.email, LM+4, y+24);

  sf([242,242,242]); sd(C_MGREY);
  doc.roundedRect(LM+88,y,82,boxH,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_GREY);
  doc.text('FROM', LM+92, y+6);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); sc(C_DARK);
  doc.text(co.short||co.name, LM+92, y+13);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); sc(C_GREY);
  doc.text('21 Voortrekker St, Mossdustria, Mossel Bay', LM+92, y+19);
  doc.text('sales@signacore.co.za  ·  040-940-5555', LM+92, y+24);
  y += boxH+8;

  // Line items header
  const cX=[LM,LM+8,LM+120];
  sf(C_DARK); doc.rect(LM,y,CW,7,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C_WHITE);
  doc.text('#', cX[0]+1, y+4.5);
  doc.text('Description', cX[1]+1, y+4.5);
  doc.text('Amount', RM-1, y+4.5, {align:'right'});
  y += 7;

  // Line item rows (page break at 268 to leave room for footer at 281)
  lines.forEach((ln,idx)=>{
    if (y > 268) { doc.addPage(); y=20; }
    const rH=7;
    sf(idx%2===0?C_WHITE:C_LGREY); sd(C_MGREY); doc.setLineWidth(0.1);
    doc.rect(LM,y,CW,rH,'FD');
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); sc(C_DARK);
    doc.text(String(idx+1), cX[0]+1, y+4.5);
    doc.text((ln.desc||'').substring(0,90), cX[1]+1, y+4.5);
    doc.text(fmt(ln.subtotal||0).replace('R ',''), RM-1, y+4.5, {align:'right'});
    y += rH;
  });
  y += 5;

  // Totals block (right-aligned)
  const tX=RM-62;
  const totRow=(label,val,bold,dark)=>{
    if (dark) { sf(C_DARK); doc.rect(tX,y,62,7,'F'); }
    doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(8.5);
    sc(dark?C_WHITE:(bold?C_DARK:C_GREY));
    doc.text(label, tX+2, y+5);
    doc.text(val, RM-1, y+5, {align:'right'});
    y+=7;
  };
  totRow('Subtotal:', fmt(sub));
  if (disc>0) totRow('Discount ('+disc+'%):', '- '+fmt(discAmt));
  totRow('VAT (15%):', fmt(vat));
  sd(C_RED); doc.setLineWidth(0.4); doc.line(tX,y,RM,y); y+=1;
  totRow('TOTAL (incl. VAT):', fmt(total), true, true);
  y += 5;

  // Bank details — if not enough room on current page, start new page
  if (y > 220) { doc.addPage(); y=20; }
  const bankH = 30;
  sf(C_LGREEN); sd(C_BGREEN); doc.setLineWidth(0.3);
  doc.roundedRect(LM,y,CW/2-4,bankH,2,2,'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); sc(C_GREEN);
  doc.text(isQuote?'PAYMENT DETAILS — 80% DEPOSIT: '+fmt(dep):'PAYMENT DETAILS', LM+3,y+6);
  const bRows=[['Bank:','Standard Bank'],['Account Name:','Signacore'],['Account No:','2-825-229-72'],['Branch Code:','051001'],['Reference:',refNum+' / '+(data.client||'')]];
  let bY=y+11;
  bRows.forEach(([k,v])=>{
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); sc(C_GREY);
    doc.text(k, LM+3, bY); sc(C_DARK); doc.text(v, LM+33, bY); bY+=4.5;
  });

  // T&C (right of bank box)
  const tcX=LM+CW/2+4;
  doc.setFont('helvetica','bold'); doc.setFontSize(7.5); sc(C_DARK);
  doc.text('Terms & Conditions', tcX, y+6);
  const tcItems=['· 80% deposit required before production commences.','· 20% balance payable on completion prior to delivery.','· Ownership remains with Signacore until full payment.','· All prices in ZAR; VAT at 15% where applicable.','· Installation excluded unless listed as a line item.'];
  doc.setFont('helvetica','normal'); doc.setFontSize(7); sc(C_GREY);
  tcItems.forEach((t,i)=>{ doc.text(t, tcX, y+12+i*4.5); });
  y += bankH+8;

  // Footer — draw on every page
  const totalPages = doc.getNumberOfPages();
  for (let pg=1; pg<=totalPages; pg++) {
    doc.setPage(pg);
    const footY = 281;
    sd(C_RED); doc.setLineWidth(0.6); doc.line(LM,footY,RM,footY);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); sc(C_GREY);
    doc.text('Hornet Honey (Pty) Ltd t/a '+(co.short||co.name)+'  ·  21 Voortrekker St, Mossdustria, Mossel Bay  ·  sales@signacore.co.za  ·  040-940-5555     Directors: O T Smit  |  R O Smit', W/2, footY+5, {align:'center'});
  }

  return doc.output('datauristring').split(',')[1];
}

/* ═══════════════════════════════════════════
   GENERATE BOTH PDFS + BUILD + DOWNLOAD .EML
═══════════════════════════════════════════ */
async function generateAndEmailDocument(type, data, companies, logoDataUrl, onMarkSent) {
  const isQuote  = type === 'quote';
  const refNum   = isQuote ? data.num : (data.invoiceNum||data.num);
  const docLabel = isQuote ? 'Quotation' : 'Tax Invoice';
  const co       = companies.find(c=>c.id===data.co)||{name:'Signacore'};

  // Generate both PDFs in parallel
  const [coverB64, docB64] = await Promise.all([
    generateCoverLetterPdf(data, companies, logoDataUrl, type),
    generateDocumentPdf(data, companies, logoDataUrl, type)
  ]);

  const to      = data.email||'';
  const subject = docLabel+' '+refNum+' \u2014 '+(data.client||'');
  const body    = isQuote
    ? 'Dear '+(data.contact||data.client||'Sir/Madam')+',\r\n\r\n'
      +'Thank you for the opportunity to provide you with our services.\r\n\r\n'
      +'Please find attached our Cover Letter and '+docLabel+' '+refNum+' for your review and consideration.\r\n\r\n'
      +'Should you have any questions, please do not hesitate to contact us.\r\n\r\n'
      +'Kind regards,\r\n'+co.name+'\r\nsales@signacore.co.za  |  040-940-5555'
    : 'Dear '+(data.client||'Sir/Madam')+',\r\n\r\n'
      +'Thank you sincerely for your valued business.\r\n\r\n'
      +'Please find attached our Cover Letter and Tax Invoice '+refNum+' for your records.\r\n\r\n'
      +'We look forward to working with you again in the future.\r\n\r\n'
      +'Kind regards,\r\n'+co.name+'\r\nsales@signacore.co.za  |  040-940-5555';

  const emlContent = buildEmlFile(to, subject, body, [
    { filename:'Cover_Letter_'+refNum+'.pdf',                base64: coverB64 },
    { filename:(isQuote?'Quotation_':'Invoice_')+refNum+'.pdf', base64: docB64  }
  ]);

  downloadFile(emlContent, (isQuote?'Quote_':'Invoice_')+refNum+'.eml', 'message/rfc822');
  if (onMarkSent) onMarkSent();
}

const CSV_EXAMPLE = `SKU,Name,Category,Stock,Reorder,Unit,Cost,Sell
VIN-3M-RD,3M Vinyl Red Gloss 1.37m,Vinyl,25,8,m,310,490
INK-EP-YL,Epson Yellow Ink 700ml,Ink,6,4,unit,1250,1800
SUB-COREX-4,Corex 4mm 1.22x2.44m,Substrate,20,5,sheet,95,180`;

function BulkImportModal({ inventory, onClose, onImport }) {
  const [csv,setCsv]=useState(''); const [preview,setPreview]=useState(null);
  const [mode,setMode]=useState('add'); const [error,setError]=useState('');
  function parse() {
    setError('');
    const lines=csv.trim().split('\n').filter(l=>l.trim());
    if (lines.length<2){setError('Paste at least one data row below the header.');return;}
    const rows=[]; let nextId=Math.max(...inventory.map(i=>i.id),100)+1;
    for (let i=1;i<lines.length;i++) {
      const cols=lines[i].split(',').map(c=>c.trim());
      if (cols.length<4) continue;
      const [sku,name,cat,stock,reorder,unit,cost,sell]=cols;
      if (!sku||!name) continue;
      rows.push({ id:nextId++, sku, name, cat:cat||'General', stock:parseInt(stock)||0, reorder:parseInt(reorder)||5, unit:unit||'unit', cost:parseFloat(cost)||0, sell:parseFloat(sell)||0 });
    }
    if (rows.length===0){setError('No valid rows found. Check column order matches the example.');return;}
    setPreview(rows);
  }
  function confirmImport() {
    if (mode==='replace') { onImport(preview); }
    else {
      const ex=[...inventory];
      preview.forEach(row=>{ const idx=ex.findIndex(i=>i.sku.toLowerCase()===row.sku.toLowerCase()); if(idx>=0){ex[idx]={...ex[idx],...row};}else{ex.push(row);} });
      onImport(ex);
    }
    onClose();
  }
  return (
    <Modal onClose={onClose} wide>
      <ModalHeader title="📦 Bulk Inventory Import" onClose={onClose}/>
      <div className="px-6 py-5 space-y-4">
        <div className="bg-gray-50 border border-gray-200 rounded-xl p-4">
          <p className="text-xs font-bold text-gray-600 mb-2">Required CSV format:</p>
          <pre className="text-xs text-gray-500 overflow-x-auto">{CSV_EXAMPLE}</pre>
        </div>
        <div className="flex gap-3">
          {[['add','Add / Update items'],['replace','Replace entire inventory']].map(([v,l])=>(
            <button key={v} onClick={()=>setMode(v)}
              className={`flex-1 text-xs py-2 rounded-xl border font-semibold transition-all ${mode===v?'bg-brand-500 text-white border-brand-500':'bg-white border-gray-200 text-gray-600'}`}>{l}</button>
          ))}
        </div>
        {mode==='replace'&&<p className="text-xs text-red-500 bg-red-50 rounded-lg p-2">⚠️ Replace mode removes all current stock items.</p>}
        <div>
          <label className="block text-xs font-bold text-gray-500 mb-1.5">Paste CSV data here:</label>
          <textarea value={csv} onChange={e=>{setCsv(e.target.value);setPreview(null);setError('');}} rows={6}
            placeholder="SKU,Name,Category,Stock,Reorder,Unit,Cost,Sell"
            className="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-xs font-mono focus:ring-2 focus:ring-brand-400 resize-none"/>
        </div>
        {error&&<p className="text-xs text-red-600 bg-red-50 border border-red-200 rounded-xl p-3">❌ {error}</p>}
        {!preview
          ? <button onClick={parse} className="w-full bg-gray-800 hover:bg-gray-900 text-white rounded-xl py-2.5 text-sm font-bold">Preview Import</button>
          : <div className="space-y-3">
              <div className="border border-emerald-200 rounded-xl overflow-hidden">
                <div className="bg-emerald-50 px-4 py-2 border-b border-emerald-200"><p className="text-xs font-bold text-emerald-700">✅ {preview.length} items ready</p></div>
                <div className="overflow-x-auto max-h-40">
                  <table className="w-full text-xs min-w-[500px]">
                    <thead className="bg-gray-50"><tr>{['SKU','Name','Cat','Stock','Cost','Sell'].map(h=><th key={h} className="px-3 py-2 text-left font-semibold text-gray-400">{h}</th>)}</tr></thead>
                    <tbody>{preview.map((r,i)=><tr key={i} className="border-t border-gray-50"><td className="px-3 py-1.5 font-mono text-gray-500">{r.sku}</td><td className="px-3 py-1.5">{r.name}</td><td className="px-3 py-1.5 text-gray-500">{r.cat}</td><td className="px-3 py-1.5 font-semibold">{r.stock}</td><td className="px-3 py-1.5">R {r.cost}</td><td className="px-3 py-1.5">R {r.sell}</td></tr>)}</tbody>
                  </table>
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setPreview(null)} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-50">Back</button>
                <button onClick={confirmImport} className="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl py-2.5 text-sm font-bold">Confirm Import</button>
              </div>
            </div>
        }
      </div>
    </Modal>
  );
}

function QuoteViewModal({ quote, onClose, onUpdate, onConvertToJob, companies, logoDataUrl, onEdit }) {
  const [showEmailFlow, setShowEmailFlow] = useState(false);
  const co = companies.find(c=>c.id===quote.co)||{short:'?',name:'—'};
  const sub = quote.lines.reduce((s,l)=>s+(l.subtotal||0),0);
  const disc = parseFloat(quote.discount)||0;
  const discAmt = sub*(disc/100);
  const setupFeeAmt = parseFloat(quote.setupFee)||0;
  const subAfterDisc = sub - discAmt + setupFeeAmt;
  const vat = subAfterDisc*0.15;
  const total = subAfterDisc+vat;
  const dep = subAfterDisc*0.80;
  return (
    <Modal onClose={onClose} wide>
      <ModalHeader title={`${quote.num} — ${quote.client}`} onClose={onClose}/>
      <div className="px-6 py-5 space-y-4 overflow-y-auto max-h-[82vh]">

        {/* Status + company badge */}
        <div className="flex flex-wrap gap-2 items-center">
          <QuoteBadge status={quote.status}/>
          <span className="text-xs font-semibold text-blue-700 bg-blue-50 border border-blue-200 rounded-full px-2.5 py-0.5">{co.short}</span>
          {quote.convertedJobId&&(
            <span className="text-xs font-semibold text-purple-700 bg-purple-50 border border-purple-200 rounded-full px-2.5 py-0.5">✅ Converted to Job</span>
          )}
        </div>

        {/* Client & Quote Details Grid */}
        <div className="grid grid-cols-2 gap-3">
          {/* Client Info */}
          <div className="bg-gray-50 border border-gray-200 rounded-xl p-4">

function EditInvoiceForm({ job, onSave, onClose }) {
  const iCls = "w-full border border-gray-200 rounded-xl px-3 py-2 text-sm";
  const [client,       setClient]       = useState(job.client||'');
  const [invoiceNum,   setInvoiceNum]   = useState(job.invoiceNum||'');
  const [invoiceDate,  setInvoiceDate]  = useState(job.invoiceDate||'');
  const [invoiceDue,   setInvoiceDue]   = useState(job.invoiceDue||'');
  const [value,        setValue]        = useState(job.value||0);
  const [notes,        setNotes]        = useState(job.notes||'');
  const [invoiceStatus,setInvoiceStatus]= useState(job.invoiceStatus||'pending');
  const [paidAt,       setPaidAt]       = useState(job.paidAt||'');

  // If lines exist, allow editing them too
  const [lines, setLines] = useState(job.lines ? job.lines.map(l=>({...l})) : []);
  const linesTotal = lines.length>0 ? lines.reduce((s,l)=>s+(l.subtotal||0),0)*1.15 : null;

  function updateLine(id,field,v){
    setLines(prev=>prev.map(l=>{
      if(l.id!==id) return l;
      const u={...l,[field]:v};
      u.subtotal=(parseFloat(field==='qty'?v:u.qty)||0)*(parseFloat(field==='unitPrice'?v:u.unitPrice)||0);
      return u;
    }));
  }

  function save(){
    const finalValue = linesTotal!==null ? linesTotal : parseFloat(value)||0;
    onSave({...job, client, invoiceNum, invoiceDate, invoiceDue, value:finalValue, notes, invoiceStatus, paidAt, lines:lines.length>0?lines:job.lines});
  }

  return (
    <div className="p-5 space-y-4 max-h-[80vh] overflow-y-auto">
      <div className="grid grid-cols-2 gap-3">
        <div className="col-span-2"><label className="text-xs font-bold text-gray-500 block mb-1">Client / Customer</label><input value={client} onChange={e=>setClient(e.target.value)} className={iCls}/></div>
        <div><label className="text-xs font-bold text-gray-500 block mb-1">Invoice Number</label><input value={invoiceNum} onChange={e=>setInvoiceNum(e.target.value)} className={iCls}/></div>
        <div><label className="text-xs font-bold text-gray-500 block mb-1">Status</label>
          <select value={invoiceStatus} onChange={e=>setInvoiceStatus(e.target.value)} className={iCls}>
            <option value="pending">⏳ Pending</option>
            <option value="paid">✓ Paid</option>
          </select>
        </div>
        <div><label className="text-xs font-bold text-gray-500 block mb-1">Invoice Date</label><input type="date" value={invoiceDate} onChange={e=>setInvoiceDate(e.target.value)} className={iCls}/></div>
        <div><label className="text-xs font-bold text-gray-500 block mb-1">Due Date</label><input type="date" value={invoiceDue} onChange={e=>setInvoiceDue(e.target.value)} className={iCls}/></div>
        {invoiceStatus==='paid'&&<div className="col-span-2"><label className="text-xs font-bold text-gray-500 block mb-1">Date Paid</label><input type="date" value={paidAt} onChange={e=>setPaidAt(e.target.value)} className={iCls}/></div>}
        {linesTotal===null&&<div className="col-span-2"><label className="text-xs font-bold text-gray-500 block mb-1">Invoice Value (incl. VAT)</label><input type="number" value={value} onChange={e=>setValue(e.target.value)} className={iCls} min="0"/></div>}
      </div>
      {lines.length>0&&(
        <div>
          <p className="text-xs font-black text-gray-500 uppercase tracking-wide mb-2">Line Items</p>
          <div className="border border-gray-200 rounded-xl overflow-hidden">
            <table className="w-full text-xs">
              <thead className="bg-gray-50"><tr>
                <th className="px-3 py-2 text-left text-gray-400 font-bold">Description</th>
                <th className="px-3 py-2 text-center text-gray-400 font-bold w-16">Qty</th>
                <th className="px-3 py-2 text-right text-gray-400 font-bold w-28">Unit Price</th>
                <th className="px-3 py-2 text-right text-gray-400 font-bold w-24">Subtotal</th>
              </tr></thead>
              <tbody>
                {lines.map(l=>(
                  <tr key={l.id} className="border-t border-gray-100">
                    <td className="px-2 py-1"><input value={l.desc} onChange={e=>updateLine(l.id,'desc',e.target.value)} className="w-full border-0 text-xs rounded px-1 py-0.5 focus:ring-1 focus:ring-blue-300"/></td>
                    <td className="px-2 py-1"><input type="number" value={l.qty} onChange={e=>updateLine(l.id,'qty',e.target.value)} className="w-full border-0 text-xs text-center rounded px-1 py-0.5 focus:ring-1 focus:ring-blue-300" min="0"/></td>
                    <td className="px-2 py-1"><input type="number" value={l.unitPrice} onChange={e=>updateLine(l.id,'unitPrice',e.target.value)} className="w-full border-0 text-xs text-right rounded px-1 py-0.5 focus:ring-1 focus:ring-blue-300" min="0"/></td>
                    <td className="px-3 py-2 text-right font-semibold text-gray-700">{zar(l.subtotal||0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="bg-gray-50 border-t border-gray-200 px-4 py-2 flex justify-end gap-6 text-xs">
              <span className="text-gray-500">Subtotal: <strong>{zar(lines.reduce((s,l)=>s+(l.subtotal||0),0))}</strong></span>
              <span className="text-gray-500">VAT 15%: <strong>{zar(lines.reduce((s,l)=>s+(l.subtotal||0),0)*0.15)}</strong></span>
              <span className="font-black text-gray-800">Total: <span style={{color:'#06065c'}}>{zar(linesTotal||0)}</span></span>
            </div>
          </div>
        </div>
      )}
      <div><label className="text-xs font-bold text-gray-500 block mb-1">Notes</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} className={iCls+' resize-none'}/></div>
      <div className="flex gap-3 pt-2">
        <button onClick={save} className="flex-1 text-white font-bold py-2.5 rounded-xl text-sm" style={{background:'#06065c'}}>💾 Save Changes</button>
        <button onClick={onClose} className="px-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-600">Cancel</button>
      </div>
    </div>
  );
}

function AddEditAssetModal({ asset, onClose, onSave }) {
  const isEdit = !!asset;
  const [cat,     setCat]     = useState(asset?.cat||'vehicle');
  const [name,    setName]    = useState(asset?.name||'');
  // Vehicle fields
  const [reg,     setReg]     = useState(asset?.reg||'');
  const [make,    setMake]    = useState(asset?.make||'');
  const [model,   setModel]   = useState(asset?.model||'');
  const [year,    setYear]    = useState(asset?.year||'');
  const [color,   setColor]   = useState(asset?.color||'');
  const [vin,     setVin]     = useState(asset?.vin||'');
  const [licExp,  setLicExp]  = useState(asset?.licExp||'');
  const [rwExp,   setRwExp]   = useState(asset?.rwExp||'');
  // Equipment fields
  const [serial,  setSerial]  = useState(asset?.serial||'');
  const [mfr,     setMfr]     = useState(asset?.mfr||'');
  const [modelNo, setModelNo] = useState(asset?.modelNo||'');
  const [purDate, setPurDate] = useState(asset?.purDate||'');
  // Common
  const [notes,   setNotes]   = useState(asset?.notes||'');
  const isVeh = isVehicleCat(cat);
  const iCls = "w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400 focus:border-brand-400 bg-white";

  function submit(e) {
    e.preventDefault();
    onSave({
      ...(asset||{}), id:asset?.id||Date.now(),
      cat, name:name.trim()||reg||serial||'Asset',
      reg, make, model, year, color, vin, licExp, rwExp,
      serial, mfr, modelNo, purDate, notes,
      odoReadings: asset?.odoReadings||[],
      maintenance: asset?.maintenance||[],
      tyres:       asset?.tyres||[],
      documents:   asset?.documents||[],
    });
    onClose();
  }
  return (
    <Modal onClose={onClose} wide>
      <ModalHeader title={isEdit?`✏️ Edit Asset`:`➕ Add Asset`} onClose={onClose}/>
      <form onSubmit={submit} className="px-6 py-5 space-y-4 overflow-y-auto max-h-[80vh]">
        {/* Category */}
        <div>
          <label className="block text-xs font-semibold text-gray-500 mb-2">Asset Type</label>
          <div className="flex flex-wrap gap-2">
            {ASSET_CATS.map(c=>(
              <button key={c.key} type="button" onClick={()=>setCat(c.key)}
                className={`text-xs rounded-xl px-3 py-2 border font-semibold transition-all ${cat===c.key?'bg-brand-500 text-white border-brand-500':'bg-white border-gray-200 text-gray-600 hover:border-brand-300'}`}>
                {c.icon} {c.label}
              </button>
            ))}
          </div>
        </div>

        {/* Vehicle fields */}
        {isVeh && (
          <div className="space-y-3">
            <p className="text-xs font-black text-gray-400 uppercase tracking-widest">Vehicle Details</p>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Registration *</label>
                <input value={reg} onChange={e=>setReg(e.target.value.toUpperCase())} required={isVeh} className={iCls} placeholder="e.g. CA 123-456"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Colour</label>
                <input value={color} onChange={e=>setColor(e.target.value)} className={iCls} placeholder="e.g. White"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Make</label>
                <input value={make} onChange={e=>setMake(e.target.value)} className={iCls} placeholder="e.g. Toyota"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Model</label>
                <input value={model} onChange={e=>setModel(e.target.value)} className={iCls} placeholder="e.g. Hilux 2.4 GD-6"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Year</label>
                <input value={year} onChange={e=>setYear(e.target.value)} className={iCls} placeholder="e.g. 2021"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">VIN Number</label>
                <input value={vin} onChange={e=>setVin(e.target.value.toUpperCase())} className={iCls} placeholder="17-char VIN"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Licence Expiry</label>
                <input type="date" value={licExp} onChange={e=>setLicExp(e.target.value)} className={iCls}/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Roadworthy Expiry</label>
                <input type="date" value={rwExp} onChange={e=>setRwExp(e.target.value)} className={iCls}/></div>
            </div>
          </div>
        )}

        {/* Equipment fields */}
        {!isVeh && (
          <div className="space-y-3">
            <p className="text-xs font-black text-gray-400 uppercase tracking-widest">Equipment Details</p>
            <div><label className="block text-xs font-semibold text-gray-500 mb-1">Asset Name / Description *</label>
              <input value={name} onChange={e=>setName(e.target.value)} required={!isVeh} className={iCls} placeholder={`e.g. Roland VG-640 Wide Format Printer`}/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Manufacturer</label>
                <input value={mfr} onChange={e=>setMfr(e.target.value)} className={iCls} placeholder="e.g. Roland"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Model Number</label>
                <input value={modelNo} onChange={e=>setModelNo(e.target.value)} className={iCls} placeholder="e.g. VG-640"/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Serial Number</label>
                <input value={serial} onChange={e=>setSerial(e.target.value)} className={iCls} placeholder="Serial No."/></div>
              <div><label className="block text-xs font-semibold text-gray-500 mb-1">Purchase Date</label>
                <input type="date" value={purDate} onChange={e=>setPurDate(e.target.value)} className={iCls}/></div>
            </div>
          </div>
        )}

        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Notes</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} className={iCls+' resize-none'} placeholder="Any additional information..."/></div>

        <div className="flex gap-3 pt-1">
          <button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-50">Cancel</button>
          <button type="submit" className="flex-1 bg-brand-500 hover:bg-brand-600 text-white rounded-xl py-2.5 text-sm font-bold">{isEdit?'Save Changes':'Add Asset'}</button>
        </div>
      </form>
    </Modal>
  );
}

      <form onSubmit={submit} className="px-6 py-5 space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} required className={iCls}/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">Position</label>
            <select value={position} onChange={e=>setPosition(e.target.value)} className={iCls}>{positions.map(p=><option key={p}>{p}</option>)}</select></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">Brand</label><input value={brand} onChange={e=>setBrand(e.target.value)} className={iCls} placeholder="e.g. Michelin"/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">Size</label><input value={size} onChange={e=>setSize(e.target.value)} className={iCls} placeholder="e.g. 265/65 R17"/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">Tread Depth (mm)</label><input type="number" value={tread} onChange={e=>setTread(e.target.value)} min="0" step="0.1" className={iCls} placeholder="mm"/></div>
          <div><label className="block text-xs font-semibold text-gray-500 mb-1">ODO at Fitting (km)</label><input type="number" value={odo} onChange={e=>setOdo(e.target.value)} min="0" className={iCls} placeholder="km"/></div>
          <div className="col-span-2"><label className="block text-xs font-semibold text-gray-500 mb-1">Cost (R)</label><input type="number" value={cost} onChange={e=>setCost(e.target.value)} min="0" className={iCls} placeholder="0.00"/></div>
        </div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Notes</label><input value={notes} onChange={e=>setNotes(e.target.value)} className={iCls} placeholder="Rotation, balancing, alignment…"/></div>
        <div className="flex gap-3 pt-1"><button type="button" onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-semibold">Cancel</button><button type="submit" className="flex-1 bg-brand-500 hover:bg-brand-600 text-white rounded-xl py-2.5 text-sm font-bold">Save Record</button></div>
      </form>
    </Modal>
  );
}

/* ═══════════════════════════════════════════
   ASSETS — DETAIL VIEW
═══════════════════════════════════════════ */
function AssetDetail({ asset, onBack, onUpdate }) {
  const [tab,setTab]=useState('overview');
  const [showEdit,setShowEdit]=useState(false);
  const [showOdo,setShowOdo]=useState(false);
  const [showMaint,setShowMaint]=useState(false);
  const [showTyre,setShowTyre]=useState(false);
  const isVeh = isVehicleCat(asset.cat);
  const catMeta = ASSET_CATS.find(c=>c.key===asset.cat)||ASSET_CATS[0];

  function addOdo(r){  onUpdate({...asset,odoReadings:[r,...(asset.odoReadings||[])]}); }
  function addMaint(r){ onUpdate({...asset,maintenance:[r,...(asset.maintenance||[])]}); }
  function addTyre(r){  onUpdate({...asset,tyres:[r,...(asset.tyres||[])]}); }

  function handleDocUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const doc = {id:Date.now(), name:file.name, size:file.size, type:file.type, dataUrl:ev.target.result};
      onUpdate({...asset, documents:[doc,...(asset.documents||[])]});
    };
    reader.readAsDataURL(file);
  }
  function removeDoc(id){ onUpdate({...asset,documents:(asset.documents||[]).filter(d=>d.id!==id)}); }

  const latestOdo = (asset.odoReadings||[]).slice().sort((a,b)=>b.reading-a.reading)[0];
  const tabs = [
    {key:'overview',   label:'Overview',     icon:'ℹ️'},
    ...(isVeh?[{key:'odo',label:'ODO Log',icon:'🔢'}]:[]),
    {key:'maintenance',label:'Maintenance',  icon:'🔧'},
    ...(isVeh?[{key:'tyres',label:'Tyres',icon:'🛞'}]:[]),
    {key:'documents',  label:'Documents',    icon:'📄'},
  ];

  return (
    <div className="space-y-4">
      {/* Header bar */}
      <div className="flex items-start gap-3">
        <button onClick={onBack} className="flex items-center gap-1 text-xs text-gray-400 hover:text-brand-600 font-semibold mt-1">← Back</button>
        <div className="flex-1">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-xl">{catMeta.icon}</span>
            <h2 className="text-xl font-black text-gray-900">{isVeh?asset.reg:asset.name}</h2>
            {isVeh&&<span className="text-sm text-gray-400 font-medium">{[asset.make,asset.model,asset.year].filter(Boolean).join(' · ')}</span>}
            {!isVeh&&<span className="text-xs bg-brand-100 text-brand-700 rounded-lg px-2 py-0.5 font-bold">{catMeta.label}</span>}
          </div>
          {isVeh&&latestOdo&&<p className="text-xs text-gray-400 mt-0.5">Latest ODO: <strong className="text-gray-700">{latestOdo.reading.toLocaleString()} km</strong> on {latestOdo.date}</p>}
        </div>
        <button onClick={()=>setShowEdit(true)} className="text-xs border border-gray-200 rounded-lg px-3 py-1.5 text-gray-500 hover:bg-gray-50 font-semibold flex-shrink-0">✏️ Edit</button>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 flex-wrap border-b border-gray-200">
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)}
            className={`text-xs px-3 py-2 font-semibold border-b-2 transition-all -mb-px ${tab===t.key?'border-brand-500 text-brand-600':'border-transparent text-gray-400 hover:text-gray-600'}`}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Tab: Overview */}
      {tab==='overview'&&(
        <div className="bg-white rounded-2xl border border-gray-200 p-5 space-y-3">
          {isVeh?(
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
              {[['Registration',asset.reg],['Make',asset.make],['Model',asset.model],['Year',asset.year],['Colour',asset.color],['VIN',asset.vin],['Licence Expiry',asset.licExp],['Roadworthy Expiry',asset.rwExp]].map(([l,v])=>v?(
                <div key={l}><p className="text-xs text-gray-400 font-semibold">{l}</p><p className="text-sm font-bold text-gray-800 mt-0.5">{v}</p></div>
              ):null)}
            </div>
          ):(
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
              {[['Manufacturer',asset.mfr],['Model No.',asset.modelNo],['Serial No.',asset.serial],['Purchase Date',asset.purDate]].map(([l,v])=>v?(
                <div key={l}><p className="text-xs text-gray-400 font-semibold">{l}</p><p className="text-sm font-bold text-gray-800 mt-0.5">{v}</p></div>
              ):null)}
            </div>
          )}
          {asset.notes&&<div className="bg-amber-50 border border-amber-100 rounded-xl p-3"><p className="text-xs text-amber-700 font-bold mb-1">Notes</p><p className="text-xs text-amber-800">{asset.notes}</p></div>}
        </div>
      )}

      {/* Tab: ODO Log */}
      {tab==='odo'&&(
        <div className="space-y-3">
          <div className="flex justify-end"><button onClick={()=>setShowOdo(true)} className="text-xs bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-4 py-2 font-bold">+ Log Reading</button></div>
          {(asset.odoReadings||[]).length===0?(<div className="bg-white rounded-2xl border border-gray-200 p-8 text-center"><p className="text-2xl mb-2">🔢</p><p className="text-gray-400 text-sm">No ODO readings logged yet</p></div>):(
            <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
              <table className="w-full text-xs">
                <thead className="bg-gray-50 border-b border-gray-200"><tr><th className="px-4 py-2.5 text-left font-semibold text-gray-400">Date</th><th className="px-4 py-2.5 text-right font-semibold text-gray-400">Reading (km)</th><th className="px-4 py-2.5 text-left font-semibold text-gray-400">Notes</th></tr></thead>
                <tbody>{(asset.odoReadings||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>(
                  <tr key={r.id} className="border-t border-gray-100">
                    <td className="px-4 py-2.5 text-gray-600">{r.date}</td>
                    <td className="px-4 py-2.5 text-right font-bold text-gray-800">{r.reading.toLocaleString()}</td>
                    <td className="px-4 py-2.5 text-gray-400">{r.notes||'—'}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Tab: Maintenance */}
      {tab==='maintenance'&&(
        <div className="space-y-3">
          <div className="flex justify-end"><button onClick={()=>setShowMaint(true)} className="text-xs bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-4 py-2 font-bold">+ Log Maintenance</button></div>
          {(asset.maintenance||[]).length===0?(<div className="bg-white rounded-2xl border border-gray-200 p-8 text-center"><p className="text-2xl mb-2">🔧</p><p className="text-gray-400 text-sm">No maintenance records yet</p></div>):(
            <div className="space-y-2">
              {(asset.maintenance||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>(
                <div key={r.id} className="bg-white rounded-xl border border-gray-200 p-4">
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <p className="text-sm font-bold text-gray-800">{r.type}</p>
                      <div className="flex flex-wrap gap-3 mt-1 text-xs text-gray-400">
                        <span>📅 {r.date}</span>
                        {r.odo>0&&<span>🔢 {r.odo.toLocaleString()} km</span>}
                        {r.provider&&<span>🏪 {r.provider}</span>}
                      </div>
                      {r.notes&&<p className="text-xs text-gray-500 mt-1.5">{r.notes}</p>}
                    </div>
                    {r.cost>0&&<span className="text-sm font-black text-gray-800 flex-shrink-0">{zar(r.cost)}</span>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Tab: Tyres */}
      {tab==='tyres'&&(
        <div className="space-y-3">
          <div className="flex justify-end"><button onClick={()=>setShowTyre(true)} className="text-xs bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-4 py-2 font-bold">+ Log Tyre Record</button></div>
          {(asset.tyres||[]).length===0?(<div className="bg-white rounded-2xl border border-gray-200 p-8 text-center"><p className="text-2xl mb-2">🛞</p><p className="text-gray-400 text-sm">No tyre records yet</p></div>):(
            <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
              <table className="w-full text-xs">
                <thead className="bg-gray-50 border-b border-gray-200"><tr>{['Date','Position','Brand','Size','Tread (mm)','ODO (km)','Cost'].map(h=><th key={h} className="px-3 py-2.5 text-left font-semibold text-gray-400">{h}</th>)}</tr></thead>
                <tbody>{(asset.tyres||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>(
                  <tr key={r.id} className="border-t border-gray-100">
                    <td className="px-3 py-2.5">{r.date}</td><td className="px-3 py-2.5 font-medium">{r.position}</td>
                    <td className="px-3 py-2.5">{r.brand||'—'}</td><td className="px-3 py-2.5">{r.size||'—'}</td>
                    <td className="px-3 py-2.5">{r.tread||'—'}</td><td className="px-3 py-2.5">{r.odo>0?r.odo.toLocaleString():'—'}</td>
                    <td className="px-3 py-2.5 font-semibold">{r.cost>0?zar(r.cost):'—'}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Tab: Documents */}
      {tab==='documents'&&(
        <div className="space-y-3">
          <div className="flex justify-end">
            <label className="text-xs bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-4 py-2 font-bold cursor-pointer">
              📎 Upload Document
              <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" className="hidden" onChange={handleDocUpload}/>
            </label>
          </div>
          {(asset.documents||[]).length===0?(<div className="bg-white rounded-2xl border border-gray-200 p-8 text-center"><p className="text-2xl mb-2">📄</p><p className="text-gray-400 text-sm">No documents uploaded yet</p><p className="text-gray-400 text-xs mt-1">Upload registration papers, service records, warranties…</p></div>):(
            <div className="space-y-2">
              {(asset.documents||[]).map(d=>(
                <div key={d.id} className="bg-white rounded-xl border border-gray-200 p-3 flex items-center gap-3">
                  <span className="text-2xl">{d.type==='application/pdf'?'📋':'🖼️'}</span>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-bold text-gray-700 truncate">{d.name}</p>
                    <p className="text-xs text-gray-400">{(d.size/1024).toFixed(0)} KB</p>
                  </div>
                  <button onClick={()=>{const w=window.open('','_blank');w.document.write(`<iframe src="${d.dataUrl}" style="width:100%;height:100vh;border:none;"></iframe>`);w.document.close();}}
                    className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg px-3 py-1.5 font-semibold">View</button>
                  <button onClick={()=>removeDoc(d.id)} className="text-xs text-red-400 hover:bg-red-50 rounded-lg px-2 py-1.5 font-semibold">✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {showEdit&&<AddEditAssetModal asset={asset} onClose={()=>setShowEdit(false)} onSave={a=>{onUpdate(a);setShowEdit(false);}}/>}
      {showOdo&&<OdoModal onClose={()=>setShowOdo(false)} onSave={addOdo}/>}
      {showMaint&&<MaintenanceModal onClose={()=>setShowMaint(false)} onSave={addMaint} isVehicle={isVeh}/>}
      {showTyre&&<TyreModal onClose={()=>setShowTyre(false)} onSave={addTyre}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   ASSETS — MAIN PAGE

function AssetsPage({ assets, setAssets }) {
  const [catTab,    setCatTab]    = useState('vehicle');
  const [selected,  setSelected]  = useState(null);
  const [showAdd,   setShowAdd]   = useState(false);

  function handleSave(a) {
    setAssets(prev => prev.find(x=>x.id===a.id) ? prev.map(x=>x.id===a.id?a:x) : [a,...prev]);
    setSelected(a);
  }
  function handleUpdate(a) {
    setAssets(prev=>prev.map(x=>x.id===a.id?a:x));
    setSelected(a);
  }

  const catGroups = [
    { key:'vehicle',   label:'Vehicles',   icon:'🚗', keys:['vehicle'] },
    { key:'equipment', label:'Equipment',  icon:'⚙️', keys:['printer','cnc','cutter','laminator','other'] },
  ];
  const activeKeys = catGroups.find(g=>g.key===catTab)?.keys||['vehicle'];
  const displayed  = assets.filter(a=>activeKeys.includes(a.cat));

  if (selected) {
    const live = assets.find(a=>a.id===selected.id)||selected;
    return (
      <div className="p-4 md:p-6 max-w-4xl mx-auto">
        <AssetDetail asset={live} onBack={()=>setSelected(null)} onUpdate={handleUpdate}/>
      </div>
    );
  }

  return (
    <div className="p-4 md:p-6 space-y-4 max-w-4xl mx-auto">
      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-xl font-black text-gray-900">Assets</h2>
          <p className="text-xs text-gray-400 mt-0.5">{assets.length} asset{assets.length!==1?'s':''} registered</p>
        </div>
        <button onClick={()=>setShowAdd(true)}
          className="flex items-center gap-1.5 bg-brand-500 hover:bg-brand-600 text-white rounded-xl px-4 py-2.5 text-sm font-bold shadow-sm">
          ➕ Add Asset
        </button>
      </div>

      {/* Category tabs */}
      <div className="flex gap-2">
        {catGroups.map(g=>(
          <button key={g.key} onClick={()=>setCatTab(g.key)}
            className={`flex items-center gap-2 text-sm rounded-xl px-4 py-2 border font-bold transition-all ${catTab===g.key?'bg-gray-900 text-white border-gray-900':'bg-white border-gray-200 text-gray-600 hover:border-gray-400'}`}>
            {g.icon} {g.label}
            <span className={`text-xs rounded-full px-1.5 py-0.5 font-black ${catTab===g.key?'bg-white/20 text-white':'bg-gray-100 text-gray-500'}`}>
              {assets.filter(a=>g.keys.includes(a.cat)).length}
            </span>
          </button>
        ))}
      </div>

      {/* Asset list */}
      {displayed.length===0?(
        <div className="bg-white rounded-2xl border border-gray-200 p-12 text-center">
          <div className="text-4xl mb-3">{catTab==='vehicle'?'🚗':'⚙️'}</div>
          <p className="text-gray-500 font-semibold">No {catTab==='vehicle'?'vehicles':'equipment'} added yet</p>
          <p className="text-gray-400 text-xs mt-1">Click "Add Asset" to register your first {catTab==='vehicle'?'vehicle':'machine'}.</p>
        </div>
      ):(
        <div className="grid gap-3 sm:grid-cols-2">
          {displayed.map(a=>{
            const catM = ASSET_CATS.find(c=>c.key===a.cat)||ASSET_CATS[0];
            const latestOdo = (a.odoReadings||[]).slice().sort((x,y)=>y.reading-x.reading)[0];
            const lastMaint = (a.maintenance||[]).slice().sort((x,y)=>new Date(y.date)-new Date(x.date))[0];
            const isVeh = isVehicleCat(a.cat);
            return (
              <div key={a.id} onClick={()=>setSelected(a)}
                className="bg-white rounded-2xl border border-gray-200 p-4 cursor-pointer hover:border-brand-300 hover:shadow-sm transition-all group">
                <div className="flex items-start gap-3">
                  <div className="w-10 h-10 rounded-xl bg-brand-50 flex items-center justify-center text-xl flex-shrink-0">{catM.icon}</div>
                  <div className="flex-1 min-w-0">
                    <p className="font-black text-gray-900 text-sm">{isVeh?a.reg:a.name}</p>
                    {isVeh&&<p className="text-xs text-gray-500 mt-0.5">{[a.make,a.model,a.year].filter(Boolean).join(' · ')||'Vehicle'}</p>}
                    {!isVeh&&<p className="text-xs text-gray-400 mt-0.5">{catM.label}{a.mfr?` · ${a.mfr}`:''}{a.serial?` · SN: ${a.serial}`:''}</p>}
                    <div className="flex flex-wrap gap-3 mt-2 text-xs text-gray-400">
                      {isVeh&&latestOdo&&<span>🔢 {latestOdo.reading.toLocaleString()} km</span>}
                      {lastMaint&&<span>🔧 Last: {lastMaint.date}</span>}
                      {isVeh&&a.licExp&&<span className={new Date(a.licExp)<new Date()?'text-red-500 font-bold':'text-gray-400'}>🪪 Lic: {a.licExp}</span>}
                    </div>
                  </div>
                  <span className="text-gray-200 group-hover:text-brand-400 text-lg transition-colors">›</span>
                </div>
                <div className="flex gap-2 mt-3 text-xs text-gray-400">
                  <span className="bg-gray-50 rounded-lg px-2 py-1">📎 {(a.documents||[]).length} doc{(a.documents||[]).length!==1?'s':''}</span>
                  <span className="bg-gray-50 rounded-lg px-2 py-1">🔧 {(a.maintenance||[]).length} service{(a.maintenance||[]).length!==1?'s':''}</span>
                  {isVeh&&<span className="bg-gray-50 rounded-lg px-2 py-1">🛞 {(a.tyres||[]).length} tyre log{(a.tyres||[]).length!==1?'s':''}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {showAdd&&<AddEditAssetModal onClose={()=>setShowAdd(false)} onSave={a=>{handleSave(a);setShowAdd(false);}}/>}
    </div>
  );
}

// ── Add/Edit Employee Modal ──────────────────────────────────────
function AddEditEmployeeModal({ emp, onClose, onSave }) {
  const isEdit = !!emp;
  const blank = { id:null,firstName:'',lastName:'',idNumber:'',empType:'Full-time',
    jobTitle:'',department:'',startDate:'',email:'',phone:'',
    address:'',city:'',postalCode:'',emergencyName:'',emergencyPhone:'',
    bankName:'',bankAccount:'',bankBranch:'',documents:[] };
  const [f, setF] = useState(isEdit ? {...emp} : blank);
  const upd = k => e => setF(p=>({...p,[k]:e.target.value}));
  const iCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400";
  const lCls = "block text-xs font-medium text-gray-600 mb-1";

  function handleDocUpload(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const doc = { id:Date.now(), name:file.name, type:file.type, dataUrl:ev.target.result, uploadedAt:new Date().toLocaleDateString('en-ZA') };
      setF(p=>({...p, documents:[...p.documents, doc]}));
    };
    reader.readAsDataURL(file);
  }

  function removeDoc(id) { setF(p=>({...p,documents:p.documents.filter(d=>d.id!==id)})); }

  function handleSave() {
    if(!f.firstName.trim()||!f.lastName.trim()) return alert('First and last name required.');
    onSave({ ...f, id: f.id||Date.now() });
  }

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-end pr-4 py-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white z-10">
          <h2 className="text-lg font-bold text-gray-800">{isEdit?'Edit Employee':'Add Employee'}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
        </div>
        <div className="p-6 space-y-6">
          {/* Personal Info */}
          <div>
            <h3 className="text-sm font-semibold text-brand-600 uppercase tracking-wide mb-3">Personal Information</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><label className={lCls}>First Name *</label><input className={iCls} value={f.firstName} onChange={upd('firstName')}/></div>
              <div><label className={lCls}>Last Name *</label><input className={iCls} value={f.lastName} onChange={upd('lastName')}/></div>
              <div><label className={lCls}>ID Number</label><input className={iCls} value={f.idNumber} onChange={upd('idNumber')}/></div>
              <div><label className={lCls}>Employment Type</label>
                <select className={iCls} value={f.empType} onChange={upd('empType')}>
                  {EMP_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div><label className={lCls}>Job Title</label><input className={iCls} value={f.jobTitle} onChange={upd('jobTitle')}/></div>

// ── Leave Request Modal ──────────────────────────────────────────
function LeaveRequestModal({ employees, onClose, onSave, existing, logoDataUrl }) {
  const isEdit = !!existing;
  const blank = { id:null, employeeId:'', leaveType:'annual', startDate:'', endDate:'', days:1, reason:'', status:'pending', appliedAt:new Date().toLocaleDateString('en-ZA') };
  const [f, setF] = useState(isEdit ? {...existing} : blank);
  const upd = k => e => setF(p=>({...p,[k]:e.target.value}));
  const iCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400";

  function calcDays() {
    if(!f.startDate||!f.endDate) return;
    const s=new Date(f.startDate), e=new Date(f.endDate);
    const diff=Math.max(1,Math.round((e-s)/(1000*60*60*24))+1);
    setF(p=>({...p,days:diff}));
  }

  const selEmp = employees.find(e=>e.id===Number(f.employeeId)||e.id===f.employeeId);

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-end pr-4 py-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
        <div className="flex items-center justify-between px-6 py-4 border-b">
          <h2 className="text-lg font-bold text-gray-800">Leave Application</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
        </div>
        <div className="p-6 space-y-4">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Employee *</label>
            <select className={iCls} value={f.employeeId} onChange={upd('employeeId')}>
              <option value="">— Select Employee —</option>
              {employees.map(e=><option key={e.id} value={e.id}>{e.firstName} {e.lastName}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Leave Type</label>
            <select className={iCls} value={f.leaveType} onChange={upd('leaveType')}>
              {LEAVE_TYPES.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">Start Date</label>
              <input type="date" className={iCls} value={f.startDate} onChange={e=>{setF(p=>({...p,startDate:e.target.value}));}} onBlur={calcDays}/>
            </div>
            <div>
              <label className="block text-xs font-medium text-gray-600 mb-1">End Date</label>
              <input type="date" className={iCls} value={f.endDate} onChange={e=>{setF(p=>({...p,endDate:e.target.value}));}} onBlur={calcDays}/>
            </div>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Number of Days</label>
            <input type="number" min="1" className={iCls} value={f.days} onChange={upd('days')}/>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Reason</label>
            <textarea rows="3" className={iCls} value={f.reason} onChange={upd('reason')}/>
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Status</label>
            <select className={iCls} value={f.status} onChange={upd('status')}>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>
        <div className="flex justify-between gap-3 px-6 py-4 border-t bg-gray-50">
          <button onClick={()=>{ if(!f.employeeId||!f.startDate||!f.endDate){alert('Employee, start and end date required.');return;} printLeaveForm(f, selEmp, logoDataUrl); }} className="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 text-sm font-medium hover:bg-gray-300">🖨️ Print Form</button>
          <div className="flex gap-3">
            <button onClick={onClose} className="px-4 py-2 rounded-lg border text-sm text-gray-600 hover:bg-gray-100">Cancel</button>
            <button onClick={()=>{if(!f.employeeId||!f.startDate||!f.endDate){alert('Fill required fields.');return;} onSave({...f,id:f.id||Date.now()});}} className="px-6 py-2 rounded-lg bg-brand-500 text-white text-sm font-semibold hover:bg-brand-600">Save</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Employee Detail View ─────────────────────────────────────────
function EmployeeDetailView({ emp, leaveRequests, disciplinary, employees, onBack, onEditEmp, setLeaveRequests, setDisciplinary, logoDataUrl }) {
  const [tab, setTab] = useState('overview');
  const [showLeave, setShowLeave] = useState(false);
  const [showDisc, setShowDisc] = useState(false);
  const [editLeave, setEditLeave] = useState(null);
  const [editDisc, setEditDisc] = useState(null);

  const myLeave = leaveRequests.filter(r=>r.employeeId===emp.id||Number(r.employeeId)===emp.id);
  const myDisc  = disciplinary.filter(r=>r.employeeId===emp.id||Number(r.employeeId)===emp.id);

  const tabs = [{id:'overview',label:'Overview'},{id:'documents',label:'📄 Documents'},{id:'leave',label:'🏖️ Leave'},{id:'disciplinary',label:'⚠️ Disciplinary'}];
  const tabCls = id => `px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 transition-colors ${tab===id?'border-brand-500 text-brand-600':'border-transparent text-gray-500 hover:text-gray-800'}`;

  const statusBadge = s => {
    const map = {pending:'bg-yellow-100 text-yellow-700', approved:'bg-green-100 text-green-700', rejected:'bg-red-100 text-red-700'};
    return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${map[s]||'bg-gray-100 text-gray-600'}`}>{s}</span>;
  };

  function saveLeave(req) {
    setLeaveRequests(prev => prev.find(r=>r.id===req.id) ? prev.map(r=>r.id===req.id?req:r) : [...prev, req]);
    setShowLeave(false); setEditLeave(null);
  }
  function saveDisc(rec) {
    setDisciplinary(prev => prev.find(r=>r.id===rec.id) ? prev.map(r=>r.id===rec.id?rec:r) : [...prev, rec]);
    setShowDisc(false); setEditDisc(null);
  }

  return (
    <div className="p-6 max-w-4xl mx-auto">
      <button onClick={onBack} className="mb-4 text-sm text-brand-500 hover:text-brand-700 flex items-center gap-1">← Back to Personnel</button>
      <div className="bg-white rounded-2xl shadow border mb-4 p-6 flex items-center gap-5">
        <div className="w-16 h-16 rounded-full bg-brand-100 flex items-center justify-center text-2xl font-bold text-brand-600">
          {emp.firstName[0]}{emp.lastName[0]}
        </div>
        <div className="flex-1">
          <h2 className="text-xl font-bold text-gray-800">{emp.firstName} {emp.lastName}</h2>
          <p className="text-sm text-gray-500">{emp.jobTitle}{emp.department?' · '+emp.department:''}</p>
          <p className="text-xs text-gray-400 mt-1">{emp.empType} · Started {emp.startDate||'—'}</p>
        </div>
        <button onClick={onEditEmp} className="px-4 py-2 rounded-lg bg-brand-500 text-white text-sm font-medium hover:bg-brand-600">Edit</button>
      </div>

      <div className="flex gap-0 border-b mb-4">
        {tabs.map(t=><button key={t.id} className={tabCls(t.id)} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {tab==='overview' && (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className="bg-white rounded-xl border p-4 space-y-2">
            <h3 className="text-sm font-semibold text-gray-600 mb-3">Contact</h3>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">Email:</span>{emp.email||'—'}</p>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">Phone:</span>{emp.phone||'—'}</p>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">Address:</span>{[emp.address,emp.city,emp.postalCode].filter(Boolean).join(', ')||'—'}</p>
          </div>
          <div className="bg-white rounded-xl border p-4 space-y-2">
            <h3 className="text-sm font-semibold text-gray-600 mb-3">Personal</h3>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">ID Number:</span>{emp.idNumber||'—'}</p>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">Emergency:</span>{emp.emergencyName||'—'} {emp.emergencyPhone?`(${emp.emergencyPhone})`:''}</p>
          </div>
          <div className="bg-white rounded-xl border p-4 space-y-2">
            <h3 className="text-sm font-semibold text-gray-600 mb-3">Banking</h3>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">Bank:</span>{emp.bankName||'—'}</p>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">Account:</span>{emp.bankAccount||'—'}</p>
            <p className="text-sm"><span className="text-gray-400 w-28 inline-block">Branch:</span>{emp.bankBranch||'—'}</p>
          </div>
          <div className="bg-white rounded-xl border p-4">
            <h3 className="text-sm font-semibold text-gray-600 mb-3">Leave Summary</h3>
            {LEAVE_TYPES.filter(t=>t.days>0).map(lt=>{
              const used = myLeave.filter(r=>r.leaveType===lt.key&&r.status==='approved').reduce((s,r)=>s+Number(r.days),0);
              return <div key={lt.key} className="flex justify-between text-sm py-1 border-b last:border-0">
                <span className="text-gray-600">{lt.label}</span>
                <span className={`font-medium ${used>lt.days?'text-red-500':''}`}>{used}/{lt.days} days</span>
              </div>;
            })}
          </div>
        </div>
      )}

      {tab==='documents' && (
        <div className="bg-white rounded-xl border p-4">
          <h3 className="text-sm font-semibold text-gray-600 mb-3">Uploaded Documents</h3>
          {(emp.documents||[]).length===0 ? <p className="text-gray-400 text-sm">No documents uploaded.</p> :
            <ul className="space-y-2">
              {emp.documents.map(d=>(
                <li key={d.id} className="flex items-center justify-between bg-gray-50 rounded-lg px-3 py-2 text-sm">
                  <span>📄 {d.name} <span className="text-gray-400 text-xs ml-2">{d.uploadedAt}</span></span>
                  <button onClick={()=>{const w=window.open();w.document.write(`<iframe src="${d.dataUrl}" style="width:100%;height:100vh;border:none;"></iframe>`);}} className="text-blue-500 hover:text-blue-700 text-xs">View</button>
                </li>
              ))}
            </ul>
          }
        </div>
      )}

      {tab==='leave' && (
        <div>
          <div className="flex justify-end mb-3">
            <button onClick={()=>setShowLeave(true)} className="px-4 py-2 rounded-lg bg-brand-500 text-white text-sm font-semibold hover:bg-brand-600">+ New Leave Application</button>
          </div>
          <div className="bg-white rounded-xl border overflow-hidden">
            {myLeave.length===0 ? <p className="text-gray-400 text-sm p-4">No leave records.</p> :
              <table className="w-full text-sm">
                <thead className="bg-gray-50 border-b"><tr>{['Type','From','To','Days','Reason','Status',''].map(h=><th key={h} className="text-left px-4 py-2 text-xs font-medium text-gray-500">{h}</th>)}</tr></thead>
                <tbody>
                  {myLeave.map(r=>(
                    <tr key={r.id} className="border-b last:border-0 hover:bg-gray-50">
                      <td className="px-4 py-2">{LEAVE_TYPES.find(t=>t.key===r.leaveType)?.label||r.leaveType}</td>
                      <td className="px-4 py-2">{r.startDate}</td>
                      <td className="px-4 py-2">{r.endDate}</td>
                      <td className="px-4 py-2">{r.days}</td>
                      <td className="px-4 py-2 max-w-xs truncate">{r.reason||'—'}</td>
                      <td className="px-4 py-2">{statusBadge(r.status)}</td>
                      <td className="px-4 py-2">
                        <div className="flex gap-2">
                          <button onClick={()=>{setEditLeave(r);setShowLeave(true);}} className="text-xs text-blue-500 hover:text-blue-700">Edit</button>
                          <button onClick={()=>printLeaveForm(r, emp, logoDataUrl)} className="text-xs text-gray-500 hover:text-gray-700">Print</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            }
          </div>
          {showLeave&&<LeaveRequestModal employees={employees} existing={editLeave} onClose={()=>{setShowLeave(false);setEditLeave(null);}} onSave={saveLeave} logoDataUrl={logoDataUrl}/>}
        </div>
      )}

      {tab==='disciplinary' && (
        <div>
          <div className="flex justify-end mb-3">
            <button onClick={()=>setShowDisc(true)} className="px-4 py-2 rounded-lg bg-red-500 text-white text-sm font-semibold hover:bg-red-600">+ Log Disciplinary Matter</button>
          </div>
          <div className="bg-white rounded-xl border overflow-hidden">
            {myDisc.length===0 ? <p className="text-gray-400 text-sm p-4">No disciplinary records.</p> :
              <table className="w-full text-sm">
                <thead className="bg-gray-50 border-b"><tr>{['Type','Incident Date','Description','Outcome',''].map(h=><th key={h} className="text-left px-4 py-2 text-xs font-medium text-gray-500">{h}</th>)}</tr></thead>
                <tbody>
                  {myDisc.map(r=>(
                    <tr key={r.id} className="border-b last:border-0 hover:bg-gray-50">
                      <td className="px-4 py-2 font-medium">{DISC_TYPES.find(t=>t.key===r.discType)?.label||r.discType}</td>
                      <td className="px-4 py-2">{r.incidentDate||'—'}</td>
                      <td className="px-4 py-2 max-w-xs truncate">{r.description}</td>
                      <td className="px-4 py-2 max-w-xs truncate">{r.outcome||'—'}</td>
                      <td className="px-4 py-2">
                        <div className="flex gap-2">
                          <button onClick={()=>{setEditDisc(r);setShowDisc(true);}} className="text-xs text-blue-500 hover:text-blue-700">Edit</button>
                          <button onClick={()=>printDisciplinaryNotice(r, emp, logoDataUrl)} className="text-xs text-gray-500 hover:text-gray-700">Print</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            }
          </div>
          {showDisc&&<DisciplinaryModal employees={employees} existing={editDisc} onClose={()=>{setShowDisc(false);setEditDisc(null);}} onSave={saveDisc} logoDataUrl={logoDataUrl}/>}
        </div>
      )}
    </div>
  );
}
