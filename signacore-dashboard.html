    id:null, empId:'', period:curPeriod, payDate:today,
    basicSalary:'', overtime:'', commission:'', bonus:'',
    travelAllowance:'', otherEarnings:'', otherEarningsDesc:'',
    pensionEmployee:'', medicalEmployee:'', medicalMembers:'2',
    otherDeductions:'', otherDeductionsDesc:'',
    ageGroup:'under65',
    annualLeaveBalance:'', sickLeaveBalance:'',
    notes:'',
  };
  const [f, setF] = useState(isEdit ? {...existing} : blank);
  const upd = k => e => setF(p=>({...p,[k]:e.target.value}));

  const calc = calcPayroll(f);
  const selEmp = employees.find(e=>e.id===Number(f.empId)||e.id===f.empId);

  const iCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400 bg-white";
  const lCls = "block text-xs font-semibold text-gray-500 mb-1";
  const r = n => 'R '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');

  function handleSave() {
    if (!f.empId) return alert('Please select an employee.');
    if (!f.period) return alert('Please select a pay period.');
    if (!f.basicSalary) return alert('Please enter the basic salary.');
    const rec = {
      ...f,
      id: f.id || Date.now(),
      empId: Number(f.empId),
      empName: selEmp ? `${selEmp.firstName} ${selEmp.lastName}` : '',
      basicSalary:    parseFloat(f.basicSalary)||0,
      overtime:       parseFloat(f.overtime)||0,
      commission:     parseFloat(f.commission)||0,
      bonus:          parseFloat(f.bonus)||0,
      travelAllowance:parseFloat(f.travelAllowance)||0,
      otherEarnings:  parseFloat(f.otherEarnings)||0,
      pensionEmployee:parseFloat(f.pensionEmployee)||0,
      medicalEmployee:parseFloat(f.medicalEmployee)||0,
      medicalMembers: parseInt(f.medicalMembers)||0,
      otherDeductions:parseFloat(f.otherDeductions)||0,
      ...calc,
      annualLeaveBalance: parseFloat(f.annualLeaveBalance)||0,
      sickLeaveBalance:   parseFloat(f.sickLeaveBalance)||0,
      createdAt: isEdit ? existing.createdAt : new Date().toISOString(),
    };
    onSave(rec);
    onClose();
  }

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-end pr-4 py-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[94vh] overflow-y-auto">
        {/* Header */}
        <div className="px-6 py-4 border-b sticky top-0 bg-white z-10 flex items-center justify-between rounded-t-2xl" style={{background:'#06065c'}}>
          <div>
            <p className="text-white font-black text-base" style={{fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'0.06em',fontSize:'1.1rem'}}>💰 {isEdit?'EDIT PAYROLL RUN':'NEW PAYROLL RUN'}</p>
            <p className="text-white/60 text-xs mt-0.5">SA tax calculated automatically — 2024/2025 tax year</p>
          </div>
          <button onClick={onClose} className="text-white/60 hover:text-white text-2xl font-bold">×</button>
        </div>

        <div className="p-6 space-y-6">
          {/* Employee + Period */}
          <div className="grid grid-cols-3 gap-4">
            <div className="col-span-3 md:col-span-1">
              <label className={lCls}>Employee *</label>
              <select value={f.empId} onChange={upd('empId')} className={iCls}>
                <option value="">— Select employee —</option>
                {employees.map(e=><option key={e.id} value={e.id}>{e.firstName} {e.lastName} · {e.jobTitle||e.empType}</option>)}
              </select>
            </div>
            <div>
              <label className={lCls}>Pay Period (Month) *</label>
              <input type="month" value={f.period} onChange={upd('period')} className={iCls}/>
            </div>
            <div>
              <label className={lCls}>Pay Date</label>
              <input type="date" value={f.payDate} onChange={upd('payDate')} className={iCls}/>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-6">
            {/* LEFT — Earnings */}
            <div className="space-y-3">
              <p className="text-xs font-black uppercase tracking-widest text-brand-700 border-l-4 border-brand-500 pl-2">Earnings</p>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className={lCls}>Basic Salary (R) *</label>
                  <input type="number" min="0" step="0.01" value={f.basicSalary} onChange={upd('basicSalary')} className={iCls} placeholder="0.00"/>
                </div>
                <div>
                  <label className={lCls}>Overtime (R)</label>
                  <input type="number" min="0" step="0.01" value={f.overtime} onChange={upd('overtime')} className={iCls} placeholder="0.00"/>
                </div>
                <div>
                  <label className={lCls}>Commission (R)</label>
                  <input type="number" min="0" step="0.01" value={f.commission} onChange={upd('commission')} className={iCls} placeholder="0.00"/>
                </div>
                <div>
                  <label className={lCls}>Bonus / 13th Cheque (R)</label>
                  <input type="number" min="0" step="0.01" value={f.bonus} onChange={upd('bonus')} className={iCls} placeholder="0.00"/>
                </div>
                <div>
                  <label className={lCls}>Travel Allowance (R)</label>
                  <input type="number" min="0" step="0.01" value={f.travelAllowance} onChange={upd('travelAllowance')} className={iCls} placeholder="0.00"/>
                </div>
                <div>
                  <label className={lCls}>Other Earnings (R)</label>
                  <input type="number" min="0" step="0.01" value={f.otherEarnings} onChange={upd('otherEarnings')} className={iCls} placeholder="0.00"/>
                </div>
                <div className="col-span-2">
                  <label className={lCls}>Other Earnings Description</label>
                  <input value={f.otherEarningsDesc} onChange={upd('otherEarningsDesc')} className={iCls} placeholder="e.g. Housing Allowance"/>
                </div>
              </div>
              {/* Gross total */}
              <div className="bg-brand-50 border border-brand-200 rounded-xl p-3 flex justify-between items-center">
                <span className="text-xs font-black text-brand-700 uppercase tracking-wide">Gross Earnings</span>
                <span className="text-lg font-black text-brand-700">{r(calc.gross)}</span>
              </div>
            </div>

            {/* RIGHT — Tax & Deductions */}
            <div className="space-y-3">
              <p className="text-xs font-black uppercase tracking-widest text-red-700 border-l-4 border-red-500 pl-2">Deductions & Tax</p>

              {/* Tax settings */}
              <div className="bg-gray-50 rounded-xl p-3 space-y-3 border border-gray-200">
                <p className="text-xs font-bold text-gray-500">SARS Tax Settings</p>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className={lCls}>Age Group</label>
                    <select value={f.ageGroup} onChange={upd('ageGroup')} className={iCls}>
                      <option value="under65">Under 65</option>
                      <option value="65to75">65 – 74</option>
                      <option value="over75">75 +</option>
                    </select>
                  </div>
                  <div>
                    <label className={lCls}>Medical Aid Members</label>
                    <input type="number" min="0" max="20" value={f.medicalMembers} onChange={upd('medicalMembers')} className={iCls} placeholder="0"/>
                  </div>
                </div>
                {/* Auto-calculated tax display */}
                <div className="grid grid-cols-2 gap-2 text-xs">
                  <div className="bg-white rounded-lg p-2 border border-gray-200 flex justify-between items-center">
                    <span className="text-gray-500">Annual taxable</span>
                    <span className="font-black text-gray-800">{r(calc.annualTaxable)}</span>
                  </div>
                  <div className="bg-red-50 rounded-lg p-2 border border-red-200 flex justify-between items-center">
                    <span className="text-red-600 font-semibold">PAYE / month</span>
                    <span className="font-black text-red-700">{r(calc.paye)}</span>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-gray-200 flex justify-between items-center">
                    <span className="text-gray-500">UIF (Employee 1%)</span>
                    <span className="font-black text-gray-800">{r(calc.uifEmp)}</span>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-gray-200 flex justify-between items-center">
                    <span className="text-gray-500">UIF (Employer 1%)</span>
                    <span className="font-black text-gray-800">{r(calc.uifEmployer)}</span>
                  </div>
                </div>
              </div>

              {/* Voluntary deductions */}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className={lCls}>Pension / Provident Fund (R)</label>
                  <input type="number" min="0" step="0.01" value={f.pensionEmployee} onChange={upd('pensionEmployee')} className={iCls} placeholder="0.00"/>
                  <p className="text-xs text-gray-400 mt-0.5">Reduces taxable income (max 27.5%)</p>
                </div>
                <div>
                  <label className={lCls}>Medical Aid — Employee (R)</label>
                  <input type="number" min="0" step="0.01" value={f.medicalEmployee} onChange={upd('medicalEmployee')} className={iCls} placeholder="0.00"/>
                </div>
                <div>
                  <label className={lCls}>Other Deductions (R)</label>
                  <input type="number" min="0" step="0.01" value={f.otherDeductions} onChange={upd('otherDeductions')} className={iCls} placeholder="0.00"/>
                </div>
                <div>
                  <label className={lCls}>Other Deduction Description</label>
                  <input value={f.otherDeductionsDesc} onChange={upd('otherDeductionsDesc')} className={iCls} placeholder="e.g. Loan Repayment"/>
                </div>
              </div>

              {/* Total deductions */}
              <div className="bg-red-50 border border-red-200 rounded-xl p-3 flex justify-between items-center">
                <span className="text-xs font-black text-red-700 uppercase tracking-wide">Total Deductions</span>
                <span className="text-lg font-black text-red-700">{r(calc.totalDeductions)}</span>
              </div>
            </div>
          </div>

          {/* NET PAY banner */}
          <div className="rounded-2xl p-5 flex items-center justify-between" style={{background:'linear-gradient(135deg,#06065c 0%,#0000ff 100%)'}}>
            <div>
              <p className="text-white/70 text-xs uppercase tracking-widest mb-1">Net Pay (Take-home)</p>
              <p className="text-white/60 text-xs">Gross {r(calc.gross)} − Deductions {r(calc.totalDeductions)}</p>
            </div>
            <div className="text-right">
              <p className="text-white font-black" style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:'2rem',letterSpacing:'0.03em'}}>{r(calc.netPay)}</p>
              <p className="text-white/60 text-xs">SDL (employer): {r(calc.sdl)}</p>
            </div>
          </div>

          {/* Leave balances + notes */}
          <div className="grid grid-cols-3 gap-4">
            <div>
              <label className={lCls}>Annual Leave Balance (days)</label>
              <input type="number" min="0" step="0.5" value={f.annualLeaveBalance} onChange={upd('annualLeaveBalance')} className={iCls} placeholder="0"/>
            </div>
            <div>
              <label className={lCls}>Sick Leave Balance (days)</label>
              <input type="number" min="0" step="0.5" value={f.sickLeaveBalance} onChange={upd('sickLeaveBalance')} className={iCls} placeholder="0"/>
            </div>
            <div>
              <label className={lCls}>Notes</label>
              <input value={f.notes} onChange={upd('notes')} className={iCls} placeholder="e.g. Backdated increase, partial month"/>
            </div>
          </div>

          {/* Actions */}
          <div className="flex gap-3 pt-2 border-t border-gray-100">
            {/* Signature upload for O T Smit */}
            <div className="w-full flex items-center gap-3 mb-1 pb-3 border-b border-gray-100">
              {sigOTSmit
                ? <img src={sigOTSmit} alt="O T Smit signature" style={{height:'36px',objectFit:'contain',borderRadius:'4px',border:'1px solid #e5e7eb',padding:'2px 6px'}}/>
                : <div className="text-xs text-gray-400 italic">No signature loaded</div>}
              <label className="cursor-pointer text-xs font-semibold text-indigo-600 hover:text-indigo-800 underline whitespace-nowrap">
                {sigOTSmit ? '↺ Change Signature' : '+ Upload O T Smit Signature'}
                <input type="file" accept="image/*" className="hidden" onChange={e=>{
                  const file=e.target.files[0]; if(!file) return;
                  const r=new FileReader(); r.onload=ev=>setSigOTSmit(ev.target.result); r.readAsDataURL(file);
                }}/>
              </label>
              {sigOTSmit && <button onClick={()=>setSigOTSmit(null)} className="text-xs text-red-400 hover:text-red-600">✕ Remove</button>}
            </div>
            <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-50">Cancel</button>
            <button onClick={handleSave} className="flex-1 text-white rounded-xl py-2.5 text-sm font-bold" style={{background:'#06065c'}}>💾 Save Payroll Record</button>
          </div>
        </div>
      </div>
    </div>
  );
}

</section>

${data.subject ? `<section style="margin-bottom:16px;"><div style="font-size:12px;"><strong>Re: ${data.subject}</strong></div></section>` : ''}

<section>

<section style="margin-top:32px;">

    ${sigOTSmit ? `<img src="${sigOTSmit}" style="max-height:56px;max-width:160px;object-fit:contain;display:block;margin-bottom:2px;" alt="Signature"/>` : '<div style="height:40px;border-bottom:1.5px solid #1a1a1a;width:160px;margin-bottom:4px;"></div>'}
    <div style="font-size:12px;font-weight:600;color:#1a1a1a;">O T Smit</div>
    <div style="font-size:10px;color:#888;">Director · Signacore</div>
  </div>
</section>`;
      break;

    default:
      bodyHtml = `<p>Form type not found.</p>`;
  }

  const form = HR_FORMS.find(f=>f.id===formId);
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${docTitle}</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

// ── HR Form Fill Modal ──────────────────────────────────────
function HRFormModal({ formId, employees, onClose, logoDataUrl, sigOTSmit, setSigOTSmit }) {
  const form = HR_FORMS.find(f=>f.id===formId);
  if (!form) return null;
  const iCls = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400 bg-white";
  const lCls = "block text-xs font-semibold text-gray-500 mb-1";
  const taCls = iCls + " resize-none";

  const [empId, setEmpId] = useState('');
  const [d, setD] = useState({});
  const upd = k => e => setD(p=>({...p,[k]:e.target.value}));
  const selEmp = employees.find(e=>e.id===Number(empId));

  function doPrint() {
    printHRForm(formId, {...d, empName: selEmp ? `${selEmp.firstName} ${selEmp.lastName}` : ''}, selEmp||null, logoDataUrl, sigOTSmit);
  }

  function doEmail() {
    const form = HR_FORMS.find(f=>f.id===formId);
    const subj = encodeURIComponent((form ? form.title : 'Document') + (d.subject ? ` — ${d.subject}` : ''));
    const recip = d.recipientName ? encodeURIComponent(d.recipientName) : '';
    const body = encodeURIComponent(
      `Dear ${d.recipientName || 'Sir / Madam'},

Please find the attached document from Signacore.

Should you have any queries, please do not hesitate to contact us.

Kind regards,
Signacore
imports@snsg.co.za`
    );
    window.location.href = `mailto:${recip}?subject=${subj}&body=${body}`;
  }

  // Render form fields based on formId
  function renderFields() {
    switch(formId) {
      case 'letter_of_appointment':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Position / Job Title</label><input value={d.position||''} onChange={upd('position')} className={iCls} placeholder="e.g. Senior Graphic Designer"/></div>
          <div><label className={lCls}>Department</label><input value={d.department||''} onChange={upd('department')} className={iCls} placeholder="e.g. Production"/></div>
          <div><label className={lCls}>Reporting To</label><input value={d.reportingTo||''} onChange={upd('reportingTo')} className={iCls} placeholder="e.g. Ockert Smit"/></div>
          <div><label className={lCls}>Start Date</label><input type="date" value={d.startDate||''} onChange={upd('startDate')} className={iCls}/></div>
          <div><label className={lCls}>Monthly Basic Salary (R)</label><input value={d.remuneration||''} onChange={upd('remuneration')} className={iCls} placeholder="e.g. 12 500.00"/></div>
          <div><label className={lCls}>Hours per Week</label><input value={d.hoursPerWeek||'45'} onChange={upd('hoursPerWeek')} className={iCls}/></div>
          <div><label className={lCls}>Probation Period</label><input value={d.probationPeriod||'3 months'} onChange={upd('probationPeriod')} className={iCls}/></div>
          <div><label className={lCls}>Notice Period</label><input value={d.noticePeriod||'1 calendar month'} onChange={upd('noticePeriod')} className={iCls}/></div>
          <div className="col-span-2"><label className={lCls}>Special Conditions / Notes</label><textarea value={d.notes||''} onChange={upd('notes')} rows={2} className={taCls} placeholder="Any additional terms or conditions…"/></div>
        </div>);

      case 'employment_contract':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Position</label><input value={d.position||''} onChange={upd('position')} className={iCls}/></div>
          <div><label className={lCls}>Department</label><input value={d.department||''} onChange={upd('department')} className={iCls}/></div>
          <div><label className={lCls}>Start Date</label><input type="date" value={d.startDate||''} onChange={upd('startDate')} className={iCls}/></div>
          <div><label className={lCls}>Employment Type</label>
            <select value={d.empType||'Permanent'} onChange={upd('empType')} className={iCls}>
              {['Permanent','Fixed-term Contract','Part-time','Casual'].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div><label className={lCls}>Monthly Remuneration (R)</label><input value={d.remuneration||''} onChange={upd('remuneration')} className={iCls}/></div>
          <div><label className={lCls}>Hours per Week</label><input value={d.hoursPerWeek||'45'} onChange={upd('hoursPerWeek')} className={iCls}/></div>
          <div><label className={lCls}>Annual Leave (days)</label><input value={d.leaveEntitlement||'15'} onChange={upd('leaveEntitlement')} className={iCls}/></div>
          <div><label className={lCls}>Sick Leave (days per 3yr cycle)</label><input value={d.sickLeave||'30'} onChange={upd('sickLeave')} className={iCls}/></div>
          <div><label className={lCls}>Notice Period</label><input value={d.noticePeriod||'1 calendar month'} onChange={upd('noticePeriod')} className={iCls}/></div>
          <div><label className={lCls}>Probation Period</label><input value={d.probationPeriod||'3 months'} onChange={upd('probationPeriod')} className={iCls}/></div>
          <div className="col-span-2"><label className={lCls}>Special Conditions</label><textarea value={d.notes||''} onChange={upd('notes')} rows={2} className={taCls}/></div>
        </div>);

      case 'probation_agreement':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Position</label><input value={d.position||''} onChange={upd('position')} className={iCls}/></div>
          <div><label className={lCls}>Reviewing Manager</label><input value={d.reportingTo||''} onChange={upd('reportingTo')} className={iCls}/></div>
          <div><label className={lCls}>Probation Start</label><input type="date" value={d.startDate||''} onChange={upd('startDate')} className={iCls}/></div>
          <div><label className={lCls}>Probation End</label><input type="date" value={d.probationEnd||''} onChange={upd('probationEnd')} className={iCls}/></div>
          <div><label className={lCls}>Review Date</label><input type="date" value={d.reviewDate||''} onChange={upd('reviewDate')} className={iCls}/></div>
          <div className="col-span-2"><label className={lCls}>Performance Objectives</label><textarea value={d.objectives||''} onChange={upd('objectives')} rows={3} className={taCls} placeholder="List key performance objectives and targets for the probation period…"/></div>
          <div className="col-span-2"><label className={lCls}>Additional Notes</label><textarea value={d.notes||''} onChange={upd('notes')} rows={2} className={taCls}/></div>
        </div>);

      case 'nda':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Effective Date</label><input type="date" value={d.startDate||''} onChange={upd('startDate')} className={iCls}/></div>
          <div className="col-span-1"/>
          <div className="col-span-2"><label className={lCls}>Additional Terms (optional)</label><textarea value={d.notes||''} onChange={upd('notes')} rows={2} className={taCls} placeholder="Company-specific additional confidentiality terms…"/></div>
        </div>);

      case 'code_of_conduct':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Date</label><input type="date" value={d.date||''} onChange={upd('date')} className={iCls}/></div>
          <div className="col-span-1"/>
          <div className="col-span-2"><label className={lCls}>Company-Specific Rules (optional)</label><textarea value={d.notes||''} onChange={upd('notes')} rows={2} className={taCls} placeholder="e.g. Specific dress code, vehicle usage policy…"/></div>
        </div>);

      case 'hearing_notice':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Hearing Date</label><input type="date" value={d.hearingDate||''} onChange={upd('hearingDate')} className={iCls}/></div>
          <div><label className={lCls}>Hearing Time</label><input type="time" value={d.hearingTime||''} onChange={upd('hearingTime')} className={iCls}/></div>
          <div className="col-span-2"><label className={lCls}>Venue</label><input value={d.hearingVenue||'Signacore Boardroom, 21 Voortrekker Street, Mossel Bay'} onChange={upd('hearingVenue')} className={iCls}/></div>
          <div className="col-span-2"><label className={lCls}>Chairperson</label><input value={d.chairperson||''} onChange={upd('chairperson')} className={iCls} placeholder="Name of presiding chairperson"/></div>
          <div className="col-span-2"><label className={lCls}>Charges / Allegations (be specific)</label><textarea value={d.charges||''} onChange={upd('charges')} rows={4} className={taCls} placeholder="e.g. 1. Unauthorised absenteeism on [date]&#10;2. Insubordination towards [manager] on [date]"/></div>
          <div className="col-span-2"><label className={lCls}>Notes</label><textarea value={d.notes||''} onChange={upd('notes')} rows={2} className={taCls}/></div>
        </div>);

      case 'hearing_outcome':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Hearing Date</label><input type="date" value={d.hearingDate||''} onChange={upd('hearingDate')} className={iCls}/></div>
          <div><label className={lCls}>Chairperson</label><input value={d.chairperson||''} onChange={upd('chairperson')} className={iCls}/></div>
          <div className="col-span-2"><label className={lCls}>Charges Considered</label><textarea value={d.charges||''} onChange={upd('charges')} rows={2} className={taCls}/></div>
          <div className="col-span-2"><label className={lCls}>Verdict</label>
            <select value={d.verdict||''} onChange={upd('verdict')} className={iCls}>
              <option value="">— Select verdict —</option>
              <option value="Guilty">Guilty</option>
              <option value="Not Guilty">Not Guilty</option>
              <option value="Partially Guilty">Partially Guilty</option>
            </select>
          </div>
          <div className="col-span-2"><label className={lCls}>Sanction / Outcome</label><textarea value={d.sanction||''} onChange={upd('sanction')} rows={3} className={taCls} placeholder="e.g. Final Written Warning — valid for 12 months. Employee may return to work with immediate effect."/></div>
          <div className="col-span-2"><label className={lCls}>Notes</label><textarea value={d.notes||''} onChange={upd('notes')} rows={2} className={taCls}/></div>
        </div>);

      case 'appeal_notice':
        return (<div className="grid grid-cols-2 gap-3">
          <div><label className={lCls}>Original Hearing Date</label><input type="date" value={d.originalDate||''} onChange={upd('originalDate')} className={iCls}/></div>
          <div><label className={lCls}>Proposed Appeal Date</label><input type="date" value={d.appealDate||''} onChange={upd('appealDate')} className={iCls}/></div>

        </div>);

      case 'certificate_of_service':

              <div><label className={lCls}>Signatory Name</label><input value={d.signatoryName||'Ockert Smit'} onChange={upd('signatoryName')} className={iCls}/></div>
              <div><label className={lCls}>Signatory Title</label><input value={d.signatoryTitle||'Director'} onChange={upd('signatoryTitle')} className={iCls}/></div>

          </div>

      default: return null;

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-end pr-4 py-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[92vh] overflow-y-auto">
        {/* Header */}
        <div className="px-6 py-4 flex items-center justify-between rounded-t-2xl border-b" style={{background:'#06065c'}}>

            <p className="text-white font-black" style={{fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'0.06em',fontSize:'1.05rem'}}>

            <p className="text-white/60 text-xs mt-0.5">{form.desc}</p>

          </div>

          {/* Form-specific fields */}
          {renderFields()}

          {/* Actions */}
          <div className="flex gap-3 pt-2 border-t border-gray-100">
            <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 rounded-xl py-2.5 text-sm font-semibold hover:bg-gray-50">Cancel</button>
            <button onClick={doEmail} className="flex-1 text-white rounded-xl py-2.5 text-sm font-bold flex items-center justify-center gap-2" style={{background:'#059669'}} title="Opens Outlook — select imports@snsg.co.za before sending">

            </button>
            <button onClick={doPrint} className="flex-1 text-white rounded-xl py-2.5 text-sm font-bold flex items-center justify-center gap-2" style={{background:'#06065c'}}>
              🖨️ Generate &amp; Print
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function HRPage({ employees, setEmployees, leaveRequests, setLeaveRequests, disciplinary, setDisciplinary, payrollRecords, setPayrollRecords, logoDataUrl, sigOTSmit, setSigOTSmit }) {
  const [tab, setTab] = useState('personnel');
  const [showAdd, setShowAdd] = useState(false);
  const [editEmp, setEditEmp] = useState(null);
  const [viewEmp, setViewEmp] = useState(null);
  const [showLeave, setShowLeave] = useState(false);
  const [showDisc, setShowDisc] = useState(false);
  const [searchQ, setSearchQ] = useState('');
  const [showPayroll, setShowPayroll] = useState(false);
  const [editPayroll, setEditPayroll] = useState(null);
  const [payFilter, setPayFilter] = useState('');  // filter by empId string
  const [activeForm, setActiveForm] = useState(null);  // formId being filled

  function saveEmployee(emp) {
    setEmployees(prev => prev.find(e=>e.id===emp.id) ? prev.map(e=>e.id===emp.id?emp:e) : [emp,...prev]);
    setShowAdd(false); setEditEmp(null);
  }
  function deleteEmployee(id) {
    if(window.confirm('Delete this employee record?')) setEmployees(prev=>prev.filter(e=>e.id!==id));
  }
  function saveLeave(req) {
    setLeaveRequests(prev => prev.find(r=>r.id===req.id) ? prev.map(r=>r.id===req.id?req:r) : [...prev, req]);
    setShowLeave(false);
  }
  function saveDisc(rec) {
    setDisciplinary(prev => prev.find(r=>r.id===rec.id) ? prev.map(r=>r.id===rec.id?rec:r) : [...prev, rec]);
    setShowDisc(false);
  }
  function savePayrollRecord(rec) {
    setPayrollRecords(prev => prev.find(r=>r.id===rec.id) ? prev.map(r=>r.id===rec.id?rec:r) : [rec,...prev]);
  }
  function deletePayrollRecord(id) {
    if(window.confirm('Delete this payroll record?')) setPayrollRecords(prev=>prev.filter(r=>r.id!==id));
  }

  const filtered = employees.filter(e=>{
    const q = searchQ.toLowerCase();
    return !q || `${e.firstName} ${e.lastName} ${e.jobTitle} ${e.department}`.toLowerCase().includes(q);
  });

  const tabs = [{id:'personnel',label:'👤 Personnel'},{id:'leave',label:'🏖️ Leave'},{id:'disciplinary',label:'⚠️ Disciplinary'},{id:'payroll',label:'💰 Payroll'},{id:'forms',label:'📋 Forms & Contracts'}];
  const tabCls = id => `px-5 py-2.5 text-sm font-medium rounded-t-lg border-b-2 transition-colors ${tab===id?'border-brand-500 text-brand-600 bg-white':'border-transparent text-gray-500 hover:text-gray-700 hover:bg-white/50'}`;

  if(viewEmp) {
    const emp = employees.find(e=>e.id===viewEmp);
    if(!emp) { setViewEmp(null); return null; }
    return <EmployeeDetailView
      emp={emp}
      leaveRequests={leaveRequests}
      disciplinary={disciplinary}
      employees={employees}
      onBack={()=>setViewEmp(null)}
      onEditEmp={()=>{setEditEmp(emp);setShowAdd(true);setViewEmp(null);}}
      setLeaveRequests={setLeaveRequests}
      setDisciplinary={setDisciplinary}
      logoDataUrl={logoDataUrl}
    />;
  }

  return (
    <div className="p-6 max-w-6xl mx-auto">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Human Resources</h1>
          <p className="text-sm text-gray-500 mt-0.5">{employees.length} employee{employees.length!==1?'s':''} · {leaveRequests.filter(r=>r.status==='pending').length} pending leave</p>
        </div>
        <div className="flex gap-2">
          {tab==='personnel'&&<button onClick={()=>setShowAdd(true)} className="px-4 py-2 rounded-xl bg-brand-500 text-white text-sm font-semibold hover:bg-brand-600 shadow-sm">+ Add Employee</button>}
          {tab==='leave'&&<button onClick={()=>setShowLeave(true)} className="px-4 py-2 rounded-xl bg-brand-500 text-white text-sm font-semibold hover:bg-brand-600 shadow-sm">+ Leave Application</button>}
          {tab==='disciplinary'&&<button onClick={()=>setShowDisc(true)} className="px-4 py-2 rounded-xl bg-red-500 text-white text-sm font-semibold hover:bg-red-600 shadow-sm">+ Log Matter</button>}
          {tab==='payroll'&&<button onClick={()=>{setEditPayroll(null);setShowPayroll(true);}} className="px-4 py-2 rounded-xl text-white text-sm font-semibold shadow-sm" style={{background:'#06065c'}}>+ New Payroll Run</button>}
        </div>
      </div>

      <div className="flex gap-0 border-b mb-5">
        {tabs.map(t=><button key={t.id} className={tabCls(t.id)} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {/* ── PERSONNEL TAB ── */}
      {tab==='personnel'&&(
        <div>
          <div className="mb-4">
            <input className="w-full max-w-xs border border-gray-300 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-brand-400" placeholder="Search employees…" value={searchQ} onChange={e=>setSearchQ(e.target.value)}/>
          </div>
          {filtered.length===0 ? (
            <div className="text-center py-20 text-gray-400">
              <p className="text-4xl mb-3">👤</p>
              <p className="font-medium">No employees yet</p>
              <p className="text-sm mt-1">Click "Add Employee" to create a personnel record</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.map(emp=>(
                <div key={emp.id} className="bg-white rounded-xl border shadow-sm hover:shadow-md transition-shadow cursor-pointer" onClick={()=>setViewEmp(emp.id)}>
                  <div className="p-4">
                    <div className="flex items-start gap-3">
                      <div className="w-12 h-12 rounded-full bg-brand-100 flex items-center justify-center font-bold text-brand-600 text-lg flex-shrink-0">
                        {emp.firstName[0]}{emp.lastName[0]}
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold text-gray-800">{emp.firstName} {emp.lastName}</p>
                        <p className="text-xs text-gray-500 truncate">{emp.jobTitle||'—'}</p>
                        <p className="text-xs text-gray-400">{emp.department||''}</p>
                      </div>
                      <div onClick={e=>e.stopPropagation()} className="flex gap-1">
                        <button onClick={()=>{setEditEmp(emp);setShowAdd(true);}} className="p-1.5 rounded-lg text-gray-400 hover:text-brand-500 hover:bg-brand-50 transition-colors text-xs">✏️</button>
                        <button onClick={()=>deleteEmployee(emp.id)} className="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors text-xs">🗑️</button>
                      </div>
                    </div>
                    <div className="mt-3 pt-3 border-t grid grid-cols-2 gap-2 text-xs text-gray-500">
                      <span>📞 {emp.phone||'—'}</span>
                      <span>📧 {emp.email?emp.email.split('@')[0]+'…':'—'}</span>
                      <span>🆔 {emp.empType}</span>
                      <span>📅 {emp.startDate||'—'}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── LEAVE TAB ── */}
      {tab==='leave'&&(
        <div className="bg-white rounded-xl border overflow-hidden">
          {leaveRequests.length===0 ? (
            <div className="text-center py-20 text-gray-400">
              <p className="text-4xl mb-3">🏖️</p>
              <p className="font-medium">No leave applications</p>
              <p className="text-sm mt-1">Click "+ Leave Application" to add one</p>
            </div>
          ) : (
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b">
                <tr>{['Employee','Type','From','To','Days','Reason','Status',''].map(h=><th key={h} className="text-left px-4 py-3 text-xs font-medium text-gray-500">{h}</th>)}</tr>
              </thead>
              <tbody>
                {leaveRequests.map(r=>{
                  const emp = employees.find(e=>e.id===r.employeeId||e.id===Number(r.employeeId));
                  const statusBg = {pending:'bg-yellow-100 text-yellow-700',approved:'bg-green-100 text-green-700',rejected:'bg-red-100 text-red-700'};
                  return (
                    <tr key={r.id} className="border-b last:border-0 hover:bg-gray-50">
                      <td className="px-4 py-3 font-medium">{emp?`${emp.firstName} ${emp.lastName}`:'Unknown'}</td>
                      <td className="px-4 py-3">{LEAVE_TYPES.find(t=>t.key===r.leaveType)?.label||r.leaveType}</td>
                      <td className="px-4 py-3">{r.startDate}</td>
                      <td className="px-4 py-3">{r.endDate}</td>
                      <td className="px-4 py-3">{r.days}</td>
                      <td className="px-4 py-3 max-w-xs truncate text-gray-500">{r.reason||'—'}</td>
                      <td className="px-4 py-3"><span className={`px-2 py-0.5 rounded-full text-xs font-medium ${statusBg[r.status]||'bg-gray-100 text-gray-600'}`}>{r.status}</span></td>
                      <td className="px-4 py-3">
                        <div className="flex gap-2">
                          <button onClick={()=>printLeaveForm(r, emp, logoDataUrl)} className="text-xs text-gray-500 hover:text-gray-800">🖨️</button>
                          <button onClick={()=>setLeaveRequests(prev=>prev.filter(x=>x.id!==r.id))} className="text-xs text-red-400 hover:text-red-600">🗑️</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* ── DISCIPLINARY TAB ── */}
      {tab==='disciplinary'&&(
        <div className="bg-white rounded-xl border overflow-hidden">
          {disciplinary.length===0 ? (
            <div className="text-center py-20 text-gray-400">
              <p className="text-4xl mb-3">⚠️</p>
              <p className="font-medium">No disciplinary records</p>
            </div>
          ) : (
            <table className="w-full text-sm">
              <thead className="bg-gray-50 border-b">
                <tr>{['Employee','Warning Type','Incident Date','Description','Outcome',''].map(h=><th key={h} className="text-left px-4 py-3 text-xs font-medium text-gray-500">{h}</th>)}</tr>
              </thead>
              <tbody>
                {disciplinary.map(r=>{
                  const emp = employees.find(e=>e.id===r.employeeId||e.id===Number(r.employeeId));
                  const typeColor = {verbal:'bg-yellow-100 text-yellow-700',written:'bg-red-100 text-red-700',final:'bg-red-100 text-red-700',suspension:'bg-purple-100 text-purple-700',dismissal:'bg-gray-800 text-white'};
                  return (
                    <tr key={r.id} className="border-b last:border-0 hover:bg-gray-50">
                      <td className="px-4 py-3 font-medium">{emp?`${emp.firstName} ${emp.lastName}`:'Unknown'}</td>
                      <td className="px-4 py-3"><span className={`px-2 py-0.5 rounded-full text-xs font-medium ${typeColor[r.discType]||'bg-gray-100 text-gray-600'}`}>{DISC_TYPES.find(t=>t.key===r.discType)?.label||r.discType}</span></td>
                      <td className="px-4 py-3">{r.incidentDate||'—'}</td>
                      <td className="px-4 py-3 max-w-xs truncate">{r.description}</td>
                      <td className="px-4 py-3 max-w-xs truncate text-gray-500">{r.outcome||'—'}</td>
                      <td className="px-4 py-3">
                        <div className="flex gap-2">
                          <button onClick={()=>printDisciplinaryNotice(r, emp, logoDataUrl)} className="text-xs text-gray-500 hover:text-gray-800">🖨️</button>
                          <button onClick={()=>setDisciplinary(prev=>prev.filter(x=>x.id!==r.id))} className="text-xs text-red-400 hover:text-red-600">🗑️</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* ── PAYROLL TAB ── */}
      {tab==='payroll'&&(
        <div className="space-y-4">
          {/* Summary KPIs */}
          {(payrollRecords||[]).length>0&&(()=>{
            const thisMonth = new Date().toISOString().slice(0,7);
            const monthRecs = (payrollRecords||[]).filter(r=>r.period===thisMonth);
            const totalNet  = (payrollRecords||[]).reduce((s,r)=>s+(r.netPay||0),0);
            const totalGross= (payrollRecords||[]).reduce((s,r)=>s+(r.gross||0),0);
            const r2 = n=>'R '+Number(n||0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
            return (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                <KpiCard icon="💰" label="Total Records" value={(payrollRecords||[]).length} accent="text-gray-800"/>
                <KpiCard icon="📅" label={`This Month (${thisMonth})`} value={monthRecs.length} accent="text-blue-700"/>
                <KpiCard icon="📤" label="Total Gross (all time)" value={r2(totalGross)} accent="text-purple-700"/>
                <KpiCard icon="💳" label="Total Net Pay (all time)" value={r2(totalNet)} accent="text-emerald-600"/>
              </div>
            );
          })()}

          {/* Filter by employee */}
          {employees.length>0&&(
            <div className="flex items-center gap-3">
              <select value={payFilter} onChange={e=>setPayFilter(e.target.value)}
                className="border border-gray-300 rounded-xl px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-brand-400">
                <option value="">All Employees</option>
                {employees.map(e=><option key={e.id} value={String(e.id)}>{e.firstName} {e.lastName}</option>)}
              </select>
              <span className="text-xs text-gray-400">{(payrollRecords||[]).filter(r=>!payFilter||String(r.empId)===payFilter).length} record{(payrollRecords||[]).filter(r=>!payFilter||String(r.empId)===payFilter).length!==1?'s':''}</span>
            </div>
          )}

          {/* Records table */}
          {(payrollRecords||[]).length===0 ? (
            <div className="bg-white rounded-2xl border border-dashed border-gray-300 p-14 text-center">
              <p className="text-4xl mb-3">💰</p>
              <p className="font-bold text-gray-600">No payroll records yet</p>
              <p className="text-xs text-gray-400 mt-2">Click "New Payroll Run" to process an employee's salary for any month.</p>
            </div>
          ) : (
            <div className="bg-white rounded-2xl border overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-sm min-w-[800px]">
                  <thead style={{background:'#06065c'}}>
                    <tr>
                      {['Employee','Period','Gross','PAYE','UIF','Other Ded.','Net Pay','Actions'].map(h=>(
                        <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-white/80">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {(payrollRecords||[])
                      .filter(r=>!payFilter||String(r.empId)===payFilter)
                      .sort((a,b)=>b.period.localeCompare(a.period))
                      .map(rec=>{
                        const emp = employees.find(e=>e.id===rec.empId||e.id===Number(rec.empId));
                        const name = emp ? `${emp.firstName} ${emp.lastName}` : rec.empName||'—';
                        const rf = n=>'R '+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
                        const [yr,mo] = (rec.period||'').split('-');
                        const periodLabel = yr&&mo ? new Date(yr,parseInt(mo)-1,1).toLocaleString('en-ZA',{month:'short',year:'numeric'}) : rec.period||'—';
                        return (
                          <tr key={rec.id} className="border-b border-gray-100 hover:bg-gray-50">
                            <td className="px-4 py-3">
                              <div className="flex items-center gap-2">
                                <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-black text-white flex-shrink-0" style={{background:'#06065c'}}>
                                  {name.split(' ').map(n=>n[0]).join('').slice(0,2)}
                                </div>
                                <div>
                                  <p className="font-semibold text-gray-800 text-xs">{name}</p>
                                  <p className="text-xs text-gray-400">{emp?.jobTitle||emp?.empType||'—'}</p>
                                </div>
                              </div>
                            </td>
                            <td className="px-4 py-3">
                              <span className="text-xs font-bold px-2 py-1 rounded-lg bg-brand-50 text-brand-700">{periodLabel}</span>
                            </td>
                            <td className="px-4 py-3 text-xs font-semibold text-gray-800">{rf(rec.gross)}</td>
                            <td className="px-4 py-3 text-xs text-red-600 font-semibold">{rf(rec.paye)}</td>
                            <td className="px-4 py-3 text-xs text-orange-600">{rf(rec.uifEmp)}</td>
                            <td className="px-4 py-3 text-xs text-gray-600">{rf((rec.medicalEmployee||0)+(rec.pensionEmployee||0)+(rec.otherDeductions||0))}</td>
                            <td className="px-4 py-3">
                              <span className="text-sm font-black" style={{color:'#0000ff'}}>{rf(rec.netPay)}</span>
                            </td>
                            <td className="px-4 py-3">
                              <div className="flex gap-1.5">
                                <button
                                  onClick={()=>printPayslip(rec, emp, logoDataUrl)}
                                  title="Print Payslip"
                                  className="text-xs font-bold px-2 py-1.5 rounded-lg text-white hover:opacity-90"
                                  style={{background:'#06065c'}}>
                                  🖨️ Payslip
                                </button>
                                <button
                                  onClick={()=>{setEditPayroll(rec);setShowPayroll(true);}}
                                  title="Edit"
                                  className="text-xs text-blue-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-2 py-1.5">
                                  ✏️
                                </button>
                                <button
                                  onClick={()=>deletePayrollRecord(rec.id)}
                                  title="Delete"
                                  className="text-xs text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg px-2 py-1.5">
                                  🗑
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── FORMS & CONTRACTS TAB ── */}
      {tab==='forms'&&(
        <div className="space-y-6">
          <div>
            <p className="text-sm text-gray-500">Select any form below to fill in the details and print it on the Signacore letterhead. All documents are generated instantly — no templates to download.</p>
          </div>
          {['Employment','Disciplinary','Offboarding','General'].map(cat=>{
            const catForms = HR_FORMS.filter(f=>f.cat===cat);
            if(!catForms.length) return null;
            const catColors = {Employment:'#0000ff',Disciplinary:'#ED0101',Offboarding:'#06065c',General:'#059669'};
            return (
              <div key={cat}>
                <div className="flex items-center gap-3 mb-3">
                  <div className="h-0.5 flex-1 rounded" style={{background:catColors[cat]+'33'}}></div>
                  <span className="text-xs font-black uppercase tracking-widest px-3 py-1 rounded-full text-white" style={{background:catColors[cat]}}>
                    {cat==='Employment'?'📝':cat==='Disciplinary'?'⚖️':cat==='General'?'✉️':'👋'} {cat}
                  </span>
                  <div className="h-0.5 flex-1 rounded" style={{background:catColors[cat]+'33'}}></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                  {catForms.map(form=>(
                    <button key={form.id} onClick={()=>setActiveForm(form.id)}
                      className="text-left bg-white rounded-2xl border border-gray-200 hover:border-brand-300 hover:shadow-md transition-all p-4 group">
                      <div className="flex items-start gap-3">
                        <div className="text-2xl flex-shrink-0 mt-0.5">{form.icon}</div>
                        <div className="flex-1 min-w-0">
                          <p className="font-black text-gray-800 text-sm group-hover:text-brand-700 transition-colors leading-tight mb-1">{form.title}</p>
                          <p className="text-xs text-gray-400 leading-relaxed">{form.desc}</p>
                        </div>
                      </div>
                      <div className="mt-3 pt-3 border-t border-gray-100 flex items-center justify-between">
                        <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:catColors[cat]+'18',color:catColors[cat]}}>{cat}</span>
                        <span className="text-xs text-brand-500 font-bold group-hover:text-brand-700">Fill &amp; Print →</span>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {showAdd&&<AddEditEmployeeModal emp={editEmp} onClose={()=>{setShowAdd(false);setEditEmp(null);}} onSave={saveEmployee}/>}
      {showLeave&&<LeaveRequestModal employees={employees} onClose={()=>setShowLeave(false)} onSave={saveLeave} logoDataUrl={logoDataUrl}/>}
      {showDisc&&<DisciplinaryModal employees={employees} onClose={()=>setShowDisc(false)} onSave={saveDisc} logoDataUrl={logoDataUrl}/>}
      {showPayroll&&<PayrollRunModal employees={employees} existing={editPayroll} onClose={()=>{setShowPayroll(false);setEditPayroll(null);}} onSave={savePayrollRecord}/>}
      {activeForm&&<HRFormModal formId={activeForm} employees={employees} logoDataUrl={logoDataUrl} sigOTSmit={sigOTSmit} setSigOTSmit={setSigOTSmit} onClose={()=>setActiveForm(null)}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════ */
function LoginPage({ onLogin }) {
  const assistUser = USERS.find(u=>u.role==='assistant');
  const [em,setEm]=useState(assistUser?assistUser.email:'');
  const [pw,setPw]=useState(assistUser?assistUser.pw:'');
  const [err,setErr]=useState('');
  const inputCls="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm";
  function submit(e){
    e.preventDefault();
    const u=USERS.find(u=>u.email===em.trim().toLowerCase()&&u.pw===pw);
    if(u){onLogin(u);}else{setErr('Incorrect email or password.');}
  }
  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'linear-gradient(135deg,#06065c 0%,#0000ba 55%,#0000ff 100%)'}}>
      {/* Background watermark */}
      <div style={{position:'fixed',bottom:'10%',right:'5%',fontFamily:'Barlow Condensed,sans-serif',fontSize:'12rem',fontWeight:900,fontStyle:'italic',color:'rgba(255,255,255,0.04)',letterSpacing:'0.04em',userSelect:'none',pointerEvents:'none',lineHeight:1}}>SIGNACORE</div>
      <div className="w-full max-w-sm relative z-10">
        <div className="text-center mb-8">
          <div style={{height:'4px',background:'#ED0101',borderRadius:'2px',width:'60px',margin:'0 auto 20px'}}/>
          <p style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:'2.2rem',fontWeight:900,fontStyle:'italic',color:'white',letterSpacing:'0.08em',lineHeight:1}}>SNSG Holdings</p>
          <p className="text-blue-200 text-sm mt-2 opacity-80">Business Management Platform</p>
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-7">
          <div style={{height:'3px',background:'linear-gradient(90deg,#06065c,#0000ff,#ED0101)',borderRadius:'2px',marginBottom:'20px'}}/>
          <form onSubmit={submit} className="space-y-4">
            <div>
              <label className="block text-xs font-semibold uppercase tracking-widest mb-1.5" style={{color:'#06065c'}}>Email Address</label>
              <input type="email" value={em} onChange={e=>setEm(e.target.value)} required className={inputCls} style={{borderColor:'#c7d2fe'}}/>
            </div>

function RevenueChart() {
  const ref=useRef(null);
  useEffect(()=>{
    const chart=new Chart(ref.current,{type:'bar',data:{labels:MONTHLY.map(m=>m.m),datasets:[{label:'Revenue',data:MONTHLY.map(m=>m.rev),backgroundColor:'#0000ffcc',borderRadius:5},{label:'Costs',data:MONTHLY.map(m=>m.cost),backgroundColor:'#94a3b8cc',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:10,padding:12}}},scales:{y:{ticks:{callback:v=>`R${(v/1000).toFixed(0)}k`,font:{size:10}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
    return ()=>chart.destroy();
  },[]);
  return <canvas ref={ref}/>;
}

function StatusDonut({ jobs }) {
  const ref=useRef(null); const inst=useRef(null);
  useEffect(()=>{
    if(inst.current){inst.current.destroy();inst.current=null;}
    const counts={};jobs.forEach(j=>{counts[j.status]=(counts[j.status]||0)+1;});
    inst.current=new Chart(ref.current,{type:'doughnut',data:{labels:Object.keys(counts).map(k=>STATUS_META[k]?.label||k),datasets:[{data:Object.values(counts),backgroundColor:['#0000ff','#10b981','#6366f1','#f59e0b','#06065c','#06b6d4','#ED0101','#84cc16','#64748b'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{font:{size:9},boxWidth:8,padding:8}}}}});
    return ()=>{if(inst.current)inst.current.destroy();};
  },[jobs]);
  return <canvas ref={ref}/>;
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
function JobDetail({ jobId, jobs, setJobs, companies, onBack, user, logoDataUrl }) {
  const [showInvoiceEmail, setShowInvoiceEmail] = useState(false);
  const job=jobs.find(j=>j.id===jobId);
  const [editingCosts, setEditingCosts]=useState(false);
  const [bd, setBd]=useState(null); // local copy of breakdown being edited

  useEffect(()=>{
    if (job) setBd(job.breakdown ? {...job.breakdown} : emptyBreakdown());
  },[jobId]);

  if (!job) return <div className="p-4"><button onClick={onBack} className="text-brand-500 text-sm">← Back</button></div>;

  const isAdmin = user.role === 'admin';
  const co=companies.find(c=>c.id===job.co)||companies[0];
  const totalCost=breakdownTotal(job.breakdown);
  const profit=totalCost>0?job.value-totalCost:null;
  const margin=profit!=null&&job.value>0?(profit/job.value*100).toFixed(1):null;
  const isLast=job.stage>=9;

  function advanceStage(){
    if(isLast) return;
    const ns=job.stage+1;
    setJobs(prev=>prev.map(j=>j.id===job.id?{...j,stage:ns,status:STAGE_STATUSES[ns]}:j));
  }
  function deleteJob(){
    if(window.confirm(`Delete job ${job.num} — ${job.client}? This cannot be undone.`)){setJobs(prev=>prev.filter(j=>j.id!==job.id));onBack();}
  }
  function updateBd(key,val){
    setBd(prev=>({...prev,[key]:parseFloat(val)||0}));
  }
  function autoRoyalty(){
    setBd(prev=>({...prev,franchise_royalty:Math.round(job.value*0.06)}));
  }
  function saveCosts(){
    setJobs(prev=>prev.map(j=>j.id===job.id?{...j,breakdown:{...bd}}:j));
    setEditingCosts(false);
  }
  function cancelCosts(){
    setBd(job.breakdown?{...job.breakdown}:emptyBreakdown());
    setEditingCosts(false);
  }

  const editTotal = bd ? breakdownTotal(bd) : 0;

  return (
    <div className="p-4 space-y-4">
      <div className="flex items-center justify-between">
        <button onClick={onBack} className="flex items-center gap-1 text-brand-500 hover:text-brand-600 text-sm font-semibold">← Back to Jobs</button>
        {isAdmin&&<button onClick={deleteJob} className="text-xs text-red-500 hover:text-red-600 border border-red-200 hover:border-red-300 rounded-xl px-3 py-1.5 transition-colors font-semibold">🗑 Delete Job</button>}
      </div>

      {/* Header */}
      <div className="bg-white rounded-2xl border border-gray-200 p-5 space-y-5">
        <div className="flex flex-wrap gap-3 items-start justify-between">
          <div>
            <p className="text-xs font-mono text-gray-400">{job.num}</p>
            <h2 className="text-xl font-black text-gray-900">{job.client}</h2>
            <p className="text-sm text-gray-500">{job.desc}</p>
            <div className="flex items-center gap-2 mt-2">
              <Badge status={job.status}/>
              <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${co.bg} ${co.text}`}>{co.name}</span>
            </div>
          </div>
        </div>

        {/* Lifecycle */}
        <div>
          <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Job Lifecycle</p>
          <div className="flex flex-wrap gap-1 mb-3">
            {STAGE_NAMES.map((s,i)=>(
              <div key={i} className="flex items-center gap-0.5">
                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all
                  ${i<job.stage?'bg-brand-500 text-white':i===job.stage?'bg-brand-100 text-brand-700 ring-2 ring-brand-400':'bg-gray-100 text-gray-400'}`}>
                  {i<job.stage?'✓':i+1}
                </div>
                {i<STAGE_NAMES.length-1&&<div className={`w-3 h-0.5 ${i<job.stage?'bg-brand-400':'bg-gray-200'}`}/>}
              </div>
            ))}
          </div>

const DONE_STATUSES = ['completed','invoiced'];

function JobsPage({ jobs, setJobs, companies, user, entityFilter, setEntityFilter, logoDataUrl }) {
  const [jobTab,       setJobTab]       = useState('active'); // 'active' | 'completed'
  const [statusFilter, setStatusFilter] = useState('all');
  const [search,       setSearch]       = useState('');
  const [detail,       setDetail]       = useState(null);
  const [showAdd,      setShowAdd]      = useState(false);

  const isAdmin = user.role !== 'assistant';
  // Always exclude Uniontech from Jobs view
  const visibleJobs     = jobs.filter(j=>j.co!==UNIONTECH_ID);
  const filterCompanies = companies.filter(c=>c.id!==UNIONTECH_ID);
  const addableCompanies = filterCompanies;

  // Split by tab first
  const tabJobs = useMemo(()=>visibleJobs.filter(j=>
    jobTab==='active' ? !DONE_STATUSES.includes(j.status) : DONE_STATUSES.includes(j.status)
  ),[visibleJobs, jobTab]);

  const filtered = useMemo(()=>tabJobs.filter(j=>{
    if(entityFilter!=null && j.co!==entityFilter) return false;
    if(statusFilter!=='all' && j.status!==statusFilter) return false;
    const q=search.toLowerCase();
    if(q&&!j.client.toLowerCase().includes(q)&&!j.num.toLowerCase().includes(q)&&!j.desc.toLowerCase().includes(q)) return false;
    return true;
  }),[tabJobs, entityFilter, statusFilter, search]);

  // Reset status filter when tab changes
  const switchTab = t => { setJobTab(t); setStatusFilter('all'); };

  const activeCount    = visibleJobs.filter(j=>!DONE_STATUSES.includes(j.status)).length;
  const completedCount = visibleJobs.filter(j=> DONE_STATUSES.includes(j.status)).length;
  const activeEntity   = entityFilter!=null ? companies.find(c=>c.id===entityFilter) : null;
  const statusOpts     = jobTab==='active' ? WIP_STATUSES : DONE_STATUSES;

  if(detail!==null) return <JobDetail jobId={detail} jobs={jobs} setJobs={setJobs} companies={companies} onBack={()=>setDetail(null)} user={user} logoDataUrl={logoDataUrl}/>;

  return (
    <div className="p-4 space-y-4">
      {showAdd&&<AddJobModal companies={addableCompanies} onClose={()=>setShowAdd(false)} onAdd={job=>setJobs(prev=>[...prev,job])} nextNum={getNextJobNum(jobs)}/>}

        </button>
        <button onClick={()=>switchTab('completed')}
          className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold border transition-all ${jobTab==='completed'?'bg-emerald-500 text-white border-emerald-500 shadow-sm':'bg-white border-gray-200 text-gray-600 hover:border-emerald-300'}`}>
          ✅ Completed Jobs

        </button>

      </div>

      {/* ── Entity filter pills ── */}
      <div className="flex flex-wrap gap-2 items-center">
        <button onClick={()=>setEntityFilter(null)}
          className={`px-3 py-1.5 rounded-xl text-xs font-bold border transition-all ${entityFilter===null?'bg-gray-900 text-white border-gray-900':'bg-white border-gray-200 text-gray-600 hover:border-gray-400'}`}>

          <p className="text-lg font-black text-brand-600">{zarK(filtered.reduce((s,j)=>s+j.value,0))}</p>
          <p className="text-xs text-gray-400 mt-0.5">{jobTab==='active'?'Pipeline Value':'Completed Value'}</p>
        </div>}

          {jobTab==='active'

          const tc=breakdownTotal(job.breakdown);
          const mg=isAdmin&&tc>0?((job.value-tc)/job.value*100).toFixed(0):null;
          return(
            <div key={job.id} onClick={()=>setDetail(job.id)}
              className={`bg-white rounded-2xl border hover:shadow-md transition-all cursor-pointer p-4
                ${jobTab==='completed'?'border-emerald-100 hover:border-emerald-300':'border-gray-200 hover:border-brand-300'}`}>
              <div className="flex items-start gap-3">
                <div className="flex-1 min-w-0">

                    <span className="text-xs font-mono text-gray-400">{job.num}</span>
