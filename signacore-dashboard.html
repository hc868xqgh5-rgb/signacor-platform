                  const due=new Date(b.dueDate||b.date); const days=Math.floor((new Date()-due)/(1000*60*60*24));
                  return <tr key={b.id} className="border-b border-gray-50">
                    <td className="px-4 py-2 text-gray-700 font-semibold">{b.supplierName}</td>
                    <td className="px-4 py-2 font-mono text-gray-500">{b.number}</td>
                    <td className="px-4 py-2 text-gray-400">{b.supplierRef||'—'}</td>
                    <td className="px-4 py-2 text-gray-400">{fmtDate(b.dueDate)}</td>
                    <td className={`px-4 py-2 text-right font-bold ${days>0?'text-red-600':'text-green-600'}`}>{days>0?'+'+days:'Current'}</td>
                    <td className="px-4 py-2 text-center"><span className="px-2 py-0.5 rounded-full text-white text-xs font-bold" style={{background:STATUS_COLORS[b.status]||'#6b7280'}}>{b.status}</span></td>
                    <td className="px-4 py-2 text-right font-bold text-red-700">{fmtAmt(tot)}</td>
                  </tr>;
                })}
                {accBills.filter(b=>b.status!=='paid'&&b.status!=='void').length===0&&<tr><td colSpan="7" className="px-4 py-6 text-center text-gray-400">No outstanding bills</td></tr>}
                {accBills.filter(b=>b.status!=='paid'&&b.status!=='void').length>0&&<tr className="bg-red-50"><td colSpan="6" className="px-4 py-2 font-black text-red-800 text-right">Total Outstanding:</td><td className="px-4 py-2 text-right font-black text-red-800">{fmtAmt(totalCreditors)}</td></tr>}
              </tbody>
            </table>
          </div>

          {/* Income/Expense breakdown by account */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            {['Income','Expense'].map(t=>{
              const accs = chartOfAccounts.filter(a=>a.type===t);
              const lines = accs.map(a=>{
                const bal = bankTxns.filter(x=>x.accountId===a.id).reduce((s,x)=>s+(t==='Income'?x.credit:x.debit),0);
                return {name:a.name, code:a.code, bal};
              }).filter(l=>l.bal>0);
              return(
                <div key={t} className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                  <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100">
                    <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">{t} — Account Breakdown (Bank)</p>
                  </div>
                  {lines.length===0&&<p className="px-4 py-4 text-xs text-gray-400 italic">No data — allocate bank transactions first.</p>}
                  {lines.map(l=>(
                    <div key={l.code} className="flex justify-between items-center px-4 py-2 border-b border-gray-50">
                      <span className="text-xs text-gray-600">{l.code} — {l.name}</span>
                      <span className={`text-xs font-bold ${t==='Income'?'text-green-700':'text-red-600'}`}>{fmtAmt(l.bal)}</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── XERO EXPORT ── */}
      {accTab==='xero'&&(
        <div className="space-y-4 max-w-3xl">
          <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4">
            <p className="text-sm font-bold text-blue-800 mb-1">🔗 Xero-Ready Exports</p>
            <p className="text-xs text-blue-700">Each button below downloads a CSV formatted exactly to Xero's import specification. Give these files directly to your accountant, or import them yourself via <strong>Accounting → Import</strong> in Xero.</p>
          </div>

          <div className="grid grid-cols-1 gap-3">
            {/* Sales Invoices */}
            <div className="bg-white rounded-2xl border border-gray-200 p-4 flex items-start gap-4">
              <div className="text-3xl">🧾</div>
              <div className="flex-1">
                <p className="font-black text-gray-800">Sales Invoices</p>
                <p className="text-xs text-gray-500 mt-0.5 mb-2">All non-void invoices in Xero invoice import format. Import via <strong>Accounting → Sales → Import</strong>.</p>
                <div className="flex items-center gap-3">
                  <span className="text-xs bg-gray-100 text-gray-600 rounded-full px-2 py-0.5">{accInvoices.filter(i=>i.status!=='void').length} invoices</span>
                  <span className="text-xs bg-green-100 text-green-700 rounded-full px-2 py-0.5">{accInvoices.filter(i=>i.status==='paid').length} paid</span>
                  <span className="text-xs bg-blue-100 text-blue-700 rounded-full px-2 py-0.5">{accInvoices.filter(i=>i.status==='sent').length} sent</span>
                </div>
              </div>
              <button onClick={exportXeroInvoices} className="text-white font-bold px-4 py-2.5 rounded-xl text-sm whitespace-nowrap" style={{background:'#06065c'}}>📥 Download CSV</button>
            </div>

            {/* Bills */}
            <div className="bg-white rounded-2xl border border-gray-200 p-4 flex items-start gap-4">
              <div className="text-3xl">📦</div>
              <div className="flex-1">
                <p className="font-black text-gray-800">Bills & Expenses</p>
                <p className="text-xs text-gray-500 mt-0.5 mb-2">All supplier bills in Xero bills import format. Import via <strong>Accounting → Bills to Pay → Import</strong>.</p>
                <div className="flex items-center gap-3">
                  <span className="text-xs bg-gray-100 text-gray-600 rounded-full px-2 py-0.5">{accBills.filter(b=>b.status!=='void').length} bills</span>
                  <span className="text-xs bg-green-100 text-green-700 rounded-full px-2 py-0.5">{accBills.filter(b=>b.status==='paid').length} paid</span>
                  <span className="text-xs bg-amber-100 text-amber-700 rounded-full px-2 py-0.5">{accBills.filter(b=>b.status==='approved').length} approved</span>
                </div>
              </div>
              <button onClick={exportXeroBills} className="text-white font-bold px-4 py-2.5 rounded-xl text-sm whitespace-nowrap" style={{background:'#ED0101'}}>📥 Download CSV</button>
            </div>

            {/* Bank Statement */}
            <div className="bg-white rounded-2xl border border-gray-200 p-4 flex items-start gap-4">
              <div className="text-3xl">🏦</div>
              <div className="flex-1">
                <p className="font-black text-gray-800">Bank Statement</p>
                <p className="text-xs text-gray-500 mt-0.5 mb-2">Allocated bank transactions in Xero bank statement format. Import via <strong>Accounting → Bank → Import Statement</strong>.</p>
                <div className="flex items-center gap-3">
                  <span className="text-xs bg-green-100 text-green-700 rounded-full px-2 py-0.5">{bankTxns.filter(t=>t.accountId).length} allocated</span>
                  <span className="text-xs bg-amber-100 text-amber-700 rounded-full px-2 py-0.5">{unallocatedCount} unallocated (excluded)</span>
                  <span className="text-xs bg-blue-100 text-blue-700 rounded-full px-2 py-0.5">{bankTxns.filter(t=>t.reconciled).length} reconciled</span>
                </div>
              </div>
              <button onClick={exportXeroBank} className="text-white font-bold px-4 py-2.5 rounded-xl text-sm whitespace-nowrap" style={{background:'#059669'}}>📥 Download CSV</button>
            </div>

            {/* Contacts */}
            <div className="bg-white rounded-2xl border border-gray-200 p-4 flex items-start gap-4">
              <div className="text-3xl">👥</div>
              <div className="flex-1">
                <p className="font-black text-gray-800">Contacts</p>
                <p className="text-xs text-gray-500 mt-0.5 mb-2">All unique customers and suppliers extracted from invoices and bills. Import via <strong>Contacts → Import</strong> in Xero.</p>
              </div>
              <button onClick={exportXeroContacts} className="text-white font-bold px-4 py-2.5 rounded-xl text-sm whitespace-nowrap" style={{background:'#7c3aed'}}>📥 Download CSV</button>
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-gray-200 p-4">
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Step-by-step: Send to your accountant</p>
            <ol className="text-xs text-gray-600 space-y-1.5 list-decimal pl-4">
              <li>Enter all your sales invoices in the <strong>Invoices</strong> tab and mark them as Sent or Paid.</li>
              <li>Enter all supplier bills and expenses in the <strong>Bills & Expenses</strong> tab.</li>
              <li>Import your bank statement CSV in the <strong>Bank</strong> tab and allocate each transaction to an account.</li>
              <li>Download all four CSVs above and email them to your accountant.</li>
              <li>Your accountant imports them directly into Xero — no manual re-entry needed.</li>
            </ol>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════ */
function ReportsPage({ jobs, companies, user }) {
  const isAdmin = user.role !== 'assistant';
  // Always exclude Uniontech from Reports — only Signacore and Cover X shown
  const visibleCompanies = companies.filter(c=>c.id!==UNIONTECH_ID);
  const visibleJobs      = jobs.filter(j=>j.co!==UNIONTECH_ID);

  const [reportTab, setReportTab] = useState('overview'); // 'overview' | 'payments'
  const [active,setActive]=useState(0);
  const chartRef=useRef(null); const instRef=useRef(null);

  // Payments tab
  const paidJobs = jobs.filter(j=>j.invoiceNum&&j.invoiceStatus==='paid').sort((a,b)=>new Date(b.paidAt||b.invoiceDate||0)-new Date(a.paidAt||a.invoiceDate||0));
  const pendingJobs = jobs.filter(j=>j.invoiceNum&&j.invoiceStatus!=='paid');
  const totalPaid = paidJobs.reduce((s,j)=>s+(j.value||0),0);
  const totalPending = pendingJobs.reduce((s,j)=>s+(j.value||0),0);

  // Calendar: group paid jobs by paidAt date
  const today = new Date();
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [calMonth, setCalMonth] = useState(today.getMonth()); // 0-indexed
  const paymentsByDate = useMemo(()=>{
    const m={};
    paidJobs.forEach(j=>{
      const d = j.paidAt||j.invoiceDate;
      if(d) { if(!m[d])m[d]=[]; m[d].push(j); }
    });
    return m;
  },[paidJobs]);
  const monthName = new Date(calYear,calMonth,1).toLocaleString('en-ZA',{month:'long',year:'numeric'});
  const firstDay = new Date(calYear,calMonth,1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();

  const data=useMemo(()=>{
    const j=active===0?visibleJobs:visibleJobs.filter(x=>x.co===active);
    const rev=j.reduce((s,x)=>s+x.value,0),cost=j.reduce((s,x)=>s+breakdownTotal(x.breakdown),0),prof=rev-cost;
    return {jobs:j,rev,cost,prof,marg:rev>0?(prof/rev*100).toFixed(1):'0.0'};
  },[active,visibleJobs]);

  useEffect(()=>{
    if(reportTab!=='overview') return;
    if(instRef.current){instRef.current.destroy();instRef.current=null;}
    if(!chartRef.current) return;
    const cd=visibleCompanies.map(c=>{const j=visibleJobs.filter(x=>x.co===c.id);return{name:c.short,rev:j.reduce((s,x)=>s+x.value,0),cost:j.reduce((s,x)=>s+breakdownTotal(x.breakdown),0),color:c.color};});
    instRef.current=new Chart(chartRef.current,{type:'bar',data:{labels:cd.map(d=>d.name),datasets:[{label:'Revenue',data:cd.map(d=>d.rev),backgroundColor:cd.map(d=>d.color+'bb'),borderRadius:4},{label:'Costs',data:cd.map(d=>d.cost),backgroundColor:'#94a3b8aa',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:10}}},scales:{y:{ticks:{callback:v=>`R${(v/1000).toFixed(0)}k`,font:{size:10}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
    return ()=>{if(instRef.current)instRef.current.destroy();};
  },[visibleJobs,visibleCompanies,reportTab]);

  const topJobs=[...visibleJobs].filter(j=>breakdownTotal(j.breakdown)>0).sort((a,b)=>(b.value-breakdownTotal(b.breakdown))-(a.value-breakdownTotal(a.breakdown))).slice(0,5);

  return (
    <div className="p-4 space-y-4">
      {/* Tab switcher */}
      <div className="flex gap-1 bg-gray-100 rounded-2xl p-1 w-fit">
        {[{k:'overview',label:'📊 Overview'},{k:'payments',label:'💳 Payments'}].map(({k,label})=>(
          <button key={k} onClick={()=>setReportTab(k)}
            className={`text-xs font-bold px-4 py-2 rounded-xl transition-all ${reportTab===k?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>
            {label}
          </button>
        ))}
      </div>

      {/* ── OVERVIEW TAB ── */}
      {reportTab==='overview'&&(<>
        <div className="bg-blue-50 border border-blue-200 rounded-2xl p-3 flex items-center gap-3">
          <span className="text-lg">📊</span>
          <p className="text-xs text-blue-700 font-semibold">Showing Signacore and Cover X — Uniontech excluded from reports.</p>
        </div>
        <div className="flex flex-wrap gap-2">
          <button onClick={()=>setActive(0)} className={`text-xs px-3 py-2 rounded-xl border font-semibold transition-all ${active===0?'bg-gray-900 text-white border-gray-900':'bg-white border-gray-200 text-gray-600'}`}>All Entities</button>
          {visibleCompanies.map(c=><button key={c.id} onClick={()=>setActive(c.id)} className={`text-xs px-3 py-2 rounded-xl border font-semibold transition-all ${active===c.id?'text-white':'bg-white border-gray-200 text-gray-600'}`} style={active===c.id?{background:c.color,borderColor:c.color}:{}}>{c.short}</button>)}
        </div>
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
          {[{l:'Total Revenue',v:zar(data.rev),bg:'bg-white',a:'text-gray-900'},{l:'Total Costs',v:zar(data.cost),bg:'bg-white',a:'text-gray-900'},{l:'Gross Profit',v:zar(data.prof),bg:'bg-emerald-50',a:'text-emerald-700'},{l:'Gross Margin',v:data.marg+'%',bg:'bg-blue-50',a:'text-blue-700'}].map(x=>(
            <div key={x.l} className={`${x.bg} rounded-2xl border border-gray-200 p-4`}><p className="text-xs text-gray-400">{x.l}</p><p className={`text-lg font-black mt-1 ${x.a}`}>{x.v}</p><p className="text-xs text-gray-400 mt-0.5">{data.jobs.length} job{data.jobs.length!==1?'s':''}</p></div>
          ))}
        </div>
        <div className="bg-white rounded-2xl border p-4"><h3 className="text-sm font-bold text-gray-700 mb-3">Revenue vs Costs by Entity</h3><div className="h-56"><canvas ref={chartRef}/></div></div>
        <div className="bg-white rounded-2xl border p-4">
          <h3 className="text-sm font-bold text-gray-700 mb-4">Top 5 Jobs by Gross Profit</h3>
          <div className="space-y-3">
            {topJobs.map((job,idx)=>{const tc=breakdownTotal(job.breakdown),profit=job.value-tc,margin=(profit/job.value*100).toFixed(1);return(
              <div key={job.id} className="flex items-center gap-3">
                <span className="w-6 h-6 rounded-full bg-brand-100 text-brand-700 text-xs font-black flex items-center justify-center flex-shrink-0">{idx+1}</span>
                <div className="flex-1 min-w-0"><p className="text-xs font-semibold text-gray-700 truncate">{job.client}</p><p className="text-xs text-gray-400">{job.num}</p></div>
                <div className="text-right"><p className="text-sm font-black text-emerald-600">{zar(profit)}</p><p className="text-xs text-gray-400">{margin}% margin</p></div>
                <div className="w-16 flex-shrink-0"><div className="bg-gray-100 rounded-full h-2"><div className="bg-emerald-400 h-2 rounded-full" style={{width:`${Math.min(parseFloat(margin),100)}%`}}/></div></div>
              </div>
            );})}
            {topJobs.length===0&&<p className="text-xs text-gray-400 text-center py-4">Open a job and enter its cost breakdown to see profit rankings here.</p>}
          </div>
        </div>
      </>)}

      {/* ── PAYMENTS TAB ── */}
      {reportTab==='payments'&&(<>
        {/* Summary cards */}
        <div className="grid grid-cols-2 lg:grid-cols-3 gap-3">
          <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4">
            <p className="text-xs text-emerald-600">Total Paid</p>
            <p className="text-xl font-black text-emerald-700 mt-1">{zar(totalPaid)}</p>
            <p className="text-xs text-emerald-500 mt-0.5">{paidJobs.length} invoice{paidJobs.length!==1?'s':''}</p>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4">
            <p className="text-xs text-amber-600">Outstanding</p>
            <p className="text-xl font-black text-amber-700 mt-1">{zar(totalPending)}</p>
            <p className="text-xs text-amber-500 mt-0.5">{pendingJobs.length} invoice{pendingJobs.length!==1?'s':''} pending</p>
          </div>
          <div className="bg-white border border-gray-200 rounded-2xl p-4">
            <p className="text-xs text-gray-400">Collection Rate</p>
            <p className="text-xl font-black text-gray-700 mt-1">
              {totalPaid+totalPending>0?((totalPaid/(totalPaid+totalPending))*100).toFixed(1)+'%':'—'}
            </p>
            <p className="text-xs text-gray-400 mt-0.5">of all invoices collected</p>
          </div>
        </div>

        {/* Payment Calendar */}
        <div className="bg-white rounded-2xl border border-gray-200 p-4">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-bold text-gray-700">📅 Payment Calendar</h3>
            <div className="flex items-center gap-2">
              <button onClick={()=>{ let m=calMonth-1,y=calYear; if(m<0){m=11;y--;} setCalMonth(m);setCalYear(y);}}
                className="w-7 h-7 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 text-sm font-bold">‹</button>
              <span className="text-xs font-bold text-gray-700 min-w-24 text-center">{monthName}</span>
              <button onClick={()=>{ let m=calMonth+1,y=calYear; if(m>11){m=0;y++;} setCalMonth(m);setCalYear(y);}}
                className="w-7 h-7 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 text-sm font-bold">›</button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-1 mb-1">
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>(
              <div key={d} className="text-center text-xs font-semibold text-gray-400 py-1">{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {Array.from({length:firstDay}).map((_,i)=><div key={'e'+i} className="h-14 rounded-lg"/>)}
            {Array.from({length:daysInMonth}).map((_,i)=>{
              const day=i+1;
              const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const payments=paymentsByDate[dateStr]||[];
              const isToday=day===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
              return(
                <div key={day} className={`h-14 rounded-xl p-1 border text-xs ${isToday?'border-brand-400 bg-brand-50':'border-gray-100 bg-gray-50'} ${payments.length>0?'border-emerald-300 bg-emerald-50':''}`}>
                  <span className={`font-bold text-xs ${isToday?'text-brand-600':payments.length?'text-emerald-700':'text-gray-400'}`}>{day}</span>
                  {payments.slice(0,2).map((j,pi)=>(
                    <div key={pi} className="truncate text-emerald-700 font-semibold leading-tight text-xs mt-0.5">{zar(j.value||0)}</div>
                  ))}
                  {payments.length>2&&<div className="text-emerald-500 text-xs">+{payments.length-2}</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Paid invoices list */}
        <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-100">
            <h3 className="text-sm font-bold text-gray-700">✅ Paid Invoices</h3>
          </div>
          {paidJobs.length===0?(
            <div className="p-8 text-center text-gray-400 text-sm">No payments recorded yet. Use "Mark Paid" on an invoice.</div>
          ):(
            <table className="w-full text-xs">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Invoice</th>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Client</th>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Paid Date</th>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Write-off</th>
                  <th className="px-4 py-2 text-right font-semibold text-gray-400">Amount</th>
                </tr>
              </thead>
              <tbody>
                {paidJobs.map(j=>(
                  <tr key={j.id} className="border-t border-gray-50 hover:bg-gray-50">
                    <td className="px-4 py-2.5 font-black text-brand-600">{j.invoiceNum}</td>
                    <td className="px-4 py-2.5 font-semibold text-gray-700">{j.client}</td>
                    <td className="px-4 py-2.5 text-gray-500">{j.paidAt||j.invoiceDate||'—'}</td>
                    <td className="px-4 py-2.5">
                      {j.writeOff?(
                        <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${j.writeOff==='warranty'?'bg-purple-100 text-purple-700':'bg-orange-100 text-orange-700'}`}>
                          {j.writeOff==='warranty'?'🛡️ Warranty':'🔧 Maintenance'}
                        </span>
                      ):<span className="text-gray-300">—</span>}
                    </td>
                    <td className="px-4 py-2.5 text-right font-black text-emerald-700">{zar(j.value||0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {/* Pending invoices */}
        {pendingJobs.length>0&&(
          <div className="bg-white rounded-2xl border border-amber-200 overflow-hidden">
            <div className="px-4 py-3 border-b border-amber-100 bg-amber-50">
              <h3 className="text-sm font-bold text-amber-700">⏳ Outstanding Invoices</h3>
            </div>
            <table className="w-full text-xs">
              <thead className="bg-gray-50 border-b border-gray-100">
                <tr>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Invoice</th>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Client</th>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Invoice Date</th>
                  <th className="px-4 py-2 text-left font-semibold text-gray-400">Due Date</th>
                  <th className="px-4 py-2 text-right font-semibold text-gray-400">Amount</th>
                </tr>
              </thead>
              <tbody>
                {pendingJobs.map(j=>(
                  <tr key={j.id} className="border-t border-gray-50 hover:bg-gray-50">
                    <td className="px-4 py-2.5 font-black text-brand-600">{j.invoiceNum}</td>
                    <td className="px-4 py-2.5 font-semibold text-gray-700">{j.client}</td>
                    <td className="px-4 py-2.5 text-gray-500">{j.invoiceDate||'—'}</td>

}
